<div class=\"lbl\">⟁ Force Style<\u002Fdiv>\n          <div class=\"chips\">\n            <span class=\"chip\" style=\"--cc:var(--f-jedi)\">Light Side<\u002Fspan>\n            <span class=\"chip\" style=\"--cc:var(--f-jedi)\">Guardian Path<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"chip-section\">\n          <div class=\"lbl\">⟁ Leadership<\u002Fdiv>\n          <div class=\"chips\">\n            <span class=\"chip\" style=\"--cc:var(--ink-faint)\">Solo Operative<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fdiv><!-- /summary-identity -->\n        <div id=\"summary-list\" style=\"display:none;\"><\u002Fdiv>\n      <\u002Faside>\n\n      <!-- WORK SURFACE -->\n      <main class=\"work-surface\" id=\"work-surface\" data-screen-label=\"Work Surface\">\n        <div id=\"work-content\"><\u002Fdiv>\n      <\u002Fmain>\n\n      <!-- DETAIL RAIL -->\n      <aside class=\"rail detail-rail\" id=\"detail-rail\" data-screen-label=\"Detail Rail\">\n        <div class=\"rail-head\"><span>◇ Build Analysis<\u002Fspan><span class=\"hint\" id=\"detail-hint\">awaiting target<\u002Fspan><\u002Fdiv>\n        <div id=\"detail-content\"><div class=\"detail-empty\">[ hover a tree or talent to inspect ]<\u002Fdiv><\u002Fdiv>\n      <\u002Faside>\n\n    <\u002Fdiv>\n\n    <!-- PROGRESSION RAIL -->\n    <div class=\"progression-rail\" data-screen-label=\"Progression Rail\">\n      <button class=\"pr-btn back\" id=\"pr-back\">‹ Back · Feat<\u002Fbutton>\n      <div class=\"pr-mid\">\n        <div class=\"pr-slots\">\n          <span class=\"cnt\" id=\"slot-cnt\">0<\u002Fspan>\n          <span class=\"of\">/ 2<\u002Fspan>\n          <span>Talents Selected<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"pr-pending\" id=\"pr-pending\"><\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"pr-btn next\" id=\"pr-next\" disabled=\"\">Next · Gear ›<\u002Fbutton>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<script>\n/* =================================================================\n * STATE\n * ================================================================= */\nconst CHAR = {\n  name: 'Kael Vorren',\n  build: 'Jedi 5 / Soldier 3',\n  level: 8,\n  archetype: 'LIGHTSABER DUELIST',\n  // Currently-owned talents (already committed before this level-up)\n  owned: new Set(['lightsaber-defense','presence','dirty-tactics','deflect','block','unreadable','weapon-focus']),\n  // External feat ownership (for prereqs like \"Weapon Focus\", \"Armor Proficiency\")\n  feats: new Set(['weapon-focus','armor-proficiency-light','persuasion-trained']),\n  // BAB for prereq checks\n  bab: 7,\n  // Allowed budget this level-up\n  slotsAllowed: 2,\n};\n\nconst S = {\n  activeTreeId: null,    // null = card grid; set = DAG view\n  hovered: null,         // hovered talent id (in tree view)\n  pending: new Set(),    // talents selected this session\n  filter: { legal: true, invested: false, search: '' },\n  mentorIdx: 0,\n  viewMode: 'graph',     // 'graph' | 'list' | 'both'\n};\n\n/* =================================================================\n * MENTOR DIALOGUES (talent step)\n * ================================================================= */\nconst MENTOR = [\n  '\"Talents are vocation-locked techniques. Picking here is louder than class. Choose what your hands will remember when the words fail.\"',\n  '\"A talent is a path. Each one branches into the next. Walk far enough and the path becomes the discipline.\"',\n  '\"The galaxy will judge you by what you do — but the Force will judge you by what you can do.\"',\n  '\"Some talents are doors that only open once another is opened first. Read the prereqs before you wonder where the path led.\"',\n  '\"Your Jedi training is not separate from your soldiering. The Force flows through the discipline of both.\"',\n];\n\n/* =================================================================\n * TREES — drawn from real SWSE compendium (talents.fixed.json)\n * ================================================================= */\nconst TREES = [\n  {\n    id: 'lightsaber-combat',\n    name: 'Lightsaber Combat',\n    nameAccent: 'Combat',\n    class: 'Jedi',\n    faction: 'jedi',\n    fantasy: 'The Lightsaber is the chosen weapon of the Jedi. Not as clumsy or random as a blaster — an elegant weapon for a more civilized combatant.',\n    role: 'Combat · Defensive · Reflexive',\n    locked: false,\n    talents: [\n      // Tier 0 — root abilities\n      { id:'deflect', name:'Deflect', tier:0, x:18, y:24, prereqs:[],\n        sym:'◇', benefit:'Negate a ranged attack with a Use the Force check vs the attack roll. -5 each additional use per round; activated lightsaber, aware, not flat-footed.',\n        desc:'A blade is more than steel — it is a meditation in motion.' },\n      { id:'block', name:'Block', tier:0, x:18, y:54, prereqs:[],\n        sym:'◈', benefit:'Negate a melee attack with a Use the Force check vs the attack roll. -5 each additional use per round; same activation constraints as Deflect.',\n        desc:'Foresight is not preventing the strike — it is being elsewhere when it lands.' },\n      { id:'lightsaber-defense', name:'Lightsaber Defense', tier:0, x:18, y:82, prereqs:[],\n        sym:'⬢', benefit:'+1 Reflex Defense while wielding an activated lightsaber, aware, and not flat-footed (max +3).',\n        desc:'Discipline of the blade is a discipline of the body.' },\n      { id:'precision', name:'Precision', tier:0, x:50, y:14, prereqs:[],\n        sym:'✦', benefit:'Against an adjacent opponent, on a successful lightsaber hit, reduce target speed by 2 squares until end of turn.',\n        desc:'Slow the enemy and the engagement becomes yours.' },\n      { id:'shoto-focus', name:'Shoto Focus', tier:0, x:50, y:88, prereqs:[],\n        sym:'⟁', benefit:'+2 attack with a shoto or guard shoto when wielding a one-handed lightsaber.',\n        desc:'The smaller blade is a question — the larger one, the answer.' },\n      { id:'lightsaber-throw', name:'Lightsaber Throw', tier:0, x:82, y:14, prereqs:[],\n        sym:'⊕', benefit:'Target within 6 squares — throw your lightsaber and pull it back as a swift action (DC 20 Use the Force).',\n        desc:'Distance is not a barrier — it is geometry the Force is happy to fold.' },\n      // Tier 1 — requires tier-0 + BAB\n      { id:'redirect-shot', name:'Redirect Shot', tier:1, x:50, y:42, prereqs:['deflect', 'bab5'],\n        sym:'⤴', benefit:'Once per round, redirect a blaster bolt you deflected at another target. Not vs autofire or non-blaster projectiles.',\n        desc:'The bolt does not know who it serves — only where it is sent.' },\n      { id:'riposte', name:'Riposte', tier:1, x:50, y:62, prereqs:['block', 'bab5'],\n        sym:'↺', benefit:'Once per encounter, after a successful Block you may make a lightsaber attack against the attacker.',\n        desc:'A perfect defense ends not in safety, but in answer.' },\n      // Tier 2 — capstone\n      { id:'precise-redirect', name:'Precise Redirect', tier:2, x:82, y:42, prereqs:['redirect-shot'],\n        sym:'★', benefit:'When you successfully redirect a blaster bolt and hit, deal +1 die of damage.',\n        desc:'Mastery is not new motion — it is the same motion, sharper.' },\n      // External-feat dependents\n      { id:'weapon-specialization', name:'Weapon Specialization', tier:1, x:82, y:64, prereqs:['feat:weapon-focus'],\n        sym:'⌬', benefit:'+2 melee damage with the chosen weapon.',\n        desc:'You stopped wielding the blade. The blade started wielding you.' },\n      { id:'cortosis-gauntlet-block', name:'Cortosis Block', tier:1, x:82, y:84, prereqs:['feat:armor-proficiency-light'],\n        sym:'⬡', benefit:'Use Block with cortosis gauntlets — on a successful Block, the targeted lightsaber is deactivated.',\n        desc:'Some weapons defeat the lightsaber not by parry, but by silence.' },\n    ],\n  },\n  {\n    id: 'influence',\n    name: 'Influence',\n    nameAccent: 'Influence',\n    class: 'Noble',\n    faction: 'noble-r',\n    fantasy: 'One of your greatest strengths is your ability to exert influence over your opponents — to bend wills with the precision of a blade.',\n    role: 'Control · Persuasion · Social Combat',\n    locked: false,\n    talents: [\n      { id:'presence', name:'Presence', tier:0, x:18, y:50, prereqs:[],\n        sym:'◉', benefit:'Use Persuasion as Intimidation as a standard action instead of full-round.',\n        desc:'The room shifts to accommodate you, not the other way around.' },\n      { id:'weaken-resolve', name:'Weaken Resolve', tier:1, x:50, y:22, prereqs:['presence'],\n        sym:'⊘', benefit:'If you deal damage exceeding the target\\'s threshold, free Persuasion vs Will Defense; target flees for one minute.',\n        desc:'Pain is a language. You translate it well.' },\n      { id:'demand-surrender', name:'Demand Surrender', tier:1, x:50, y:46, prereqs:['presence'],\n        sym:'⌖', benefit:'Once per encounter against a wounded opponent (≤half HP), Persuasion vs Will Defense; target cannot attack unless attacked.',\n        desc:'The hardest part of victory is letting the enemy keep their dignity.' },\n      { id:'intimidating-defense', name:'Intimidating Defense', tier:1, x:50, y:68, prereqs:['presence','feat:persuasion-trained'],\n        sym:'⛨', benefit:'Once per encounter, after opponent attacks you, Persuasion vs Will Defense; impose -5 on that attack.',\n        desc:'You are not defended by armor. You are defended by what they fear about you.' },\n      { id:'fluster', name:'Fluster', tier:1, x:50, y:88, prereqs:['presence','feat:persuasion-trained'],\n        sym:'⊠', benefit:'Once per encounter, Intimidation vs Will Defense; target may only take a swift action on their next turn.',\n        desc:'Confidence is the first thing they lose. Everything else follows.' },\n      { id:'improved-weaken-resolve', name:'Improved Weaken Resolve', tier:2, x:82, y:22, prereqs:['weaken-resolve'],\n        sym:'★', benefit:'As Weaken Resolve, but the target continues fleeing beyond the initial duration.',\n        desc:'Some wounds you carry. Others carry you out of the room.' },\n    ],\n  },\n  {\n    id: 'disgrace',\n    name: 'Disgrace',\n    nameAccent: 'Disgrace',\n    class: 'Noble',\n    faction: 'noble-c',\n    fantasy: 'Scandal fouls your family name, forcing you to live among the fringes of society — teaching you that honor is overrated when victory is on the line.',\n    role: 'Covert · Deception · Battlefield Trickery',\n    locked: false,\n    talents: [\n      { id:'unreadable', name:'Unreadable', tier:0, x:18, y:24, prereqs:[],\n        sym:'◐', benefit:'+5 Will Defense vs checks to read your emotions; when you feint in combat, the target is flat-footed against you.',\n        desc:'You wear a face the way most wear armor.' },\n      { id:'dirty-tactics', name:'Dirty Tactics', tier:0, x:18, y:54, prereqs:[],\n        sym:'⨯', benefit:'Once per encounter, allies in line of sight gain +4 flanking bonus to melee attacks.',\n        desc:'Honor died with the old houses. Tactics did not.' },\n      { id:'castigate', name:'Castigate', tier:0, x:18, y:84, prereqs:[],\n        sym:'⊘', benefit:'Persuasion vs Will Defense — impose -2 to all of target\\'s defenses until end of next turn.',\n        desc:'A surgical insult is more effective than any blade.' },\n      { id:'misplaced-loyalty', name:'Misplaced Loyalty', tier:1, x:54, y:46, prereqs:['dirty-tactics'],\n        sym:'⌬', benefit:'Once per turn, Persuasion vs Will Defense against all opponents in LoS; chosen target cannot attack you or one ally in 6 sq.',\n        desc:'Their hesitation is yours to inherit.' },\n      { id:'ambush', name:'Ambush', tier:1, x:54, y:78, prereqs:['dirty-tactics'],\n        sym:'⊛', benefit:'If you are not surprised, forgo your standard action so non-surprised allies in LoS gain extra move or reroll Initiative (better result).',\n        desc:'The strike that lands first decides the rest.' },\n      { id:'two-faced', name:'Two-Faced', tier:2, x:86, y:46, prereqs:['misplaced-loyalty'],\n        sym:'★', benefit:'After you attack: same attack as a reaction, OR opponent cannot attack you, OR +2 attack if they haven\\'t attacked.',\n        desc:'You write the meeting. They sign the consequences.' },\n    ],\n  },\n];\n\n/* =================================================================\n * UTILITIES\n * ================================================================= */\nconst $ = (s, root=document) => root.querySelector(s);\nconst $$ = (s, root=document) => Array.from(root.querySelectorAll(s));\nconst el = (tag, attrs={}, children) => {\n  const e = document.createElement(tag);\n  for (const [k,v] of Object.entries(attrs||{})) {\n    if (k === 'class') e.className = v;\n    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);\n    else if (k === 'html') e.innerHTML = v;\n    else e.setAttribute(k, v);\n  }\n  if (children) (Array.isArray(children)?children:[children]).forEach(c => {\n    if (c == null) return;\n    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);\n  });\n  return e;\n};\n\nconst findTree = id => TREES.find(t => t.id === id);\nconst findTalent = (treeId, talentId) => findTree(treeId)?.talents.find(t => t.id === talentId);\n\n/* prereq satisfaction: all upstream talents owned/pending OR external feat owned */\nfunction prereqsMet(treeId, talent) {\n  return talent.prereqs.every(p => {\n    if (p.startsWith('feat:')) return CHAR.feats.has(p.slice(5));\n    if (p === 'bab5') return CHAR.bab >= 5;\n    return CHAR.owned.has(p) || S.pending.has(p);\n  });\n}\nfunction isLegal(treeId, talent) {\n  if (CHAR.owned.has(talent.id) || S.pending.has(talent.id)) return false;\n  if (S.pending.size >= CHAR.slotsAllowed) return false;\n  return prereqsMet(treeId, talent);\n}\nfunction nodeState(treeId, talent) {\n  if (CHAR.owned.has(talent.id)) return 'owned';\n  if (S.pending.has(talent.id)) return 'pending';\n  if (prereqsMet(treeId, talent)) {\n    return S.pending.size >= CHAR.slotsAllowed ? 'locked' : 'legal';\n  }\n  return 'locked';\n}\n\n/* count how many talents in a tree are owned/legal/total */\nfunction treeStats(tree) {\n  let owned = 0, legal = 0;\n  for (const t of tree.talents) {\n    if (CHAR.owned.has(t.id) || S.pending.has(t.id)) owned++;\n    else if (prereqsMet(tree.id, t)) legal++;\n  }\n  return { owned, legal, total: tree.talents.length };\n}\n\n/* =================================================================\n * MENTOR\n * =================================================================*/\nfunction renderMentor() {\n  $('#mentor-quote').textContent = MENTOR[S.mentorIdx];\n}\n$('#mentor-prev').addEventListener('click', () => { S.mentorIdx = (S.mentorIdx - 1 + MENTOR.length) % MENTOR.length; renderMentor(); });\n$('#mentor-next').addEventListener('click', () => { S.mentorIdx = (S.mentorIdx + 1) % MENTOR.length; renderMentor(); });\n\n/* =================================================================\n * SUMMARY RAIL\n * ================================================================= */\nfunction renderSummary() {\n  const inTree = S.activeTreeId != null;\n  const showList = inTree && S.viewMode === 'both';\n  const ident = $('#summary-identity');\n  const listC = $('#summary-list');\n  const headLbl = $('#summary-head-label');\n\n  if (showList) {\n    ident.style.display = 'none';\n    listC.style.display = 'block';\n    headLbl.textContent = '≡ ' + findTree(S.activeTreeId).name;\n    listC.innerHTML = '';\n    listC.appendChild(renderTalentList(findTree(S.activeTreeId)));\n  } else {\n    ident.style.display = '';\n    listC.style.display = 'none';\n    headLbl.textContent = '◆ Build Identity';\n  }\n\n  // Always refresh distribution rows (only visible when identity is shown)\n  const rows = $('#dist-rows');\n  rows.innerHTML = '';\n  TREES.forEach(t => {\n    const st = treeStats(t);\n    const row = el('div', { class:'dist-row' });\n    row.appendChild(el('div', { class:'nm' }, t.name));\n    row.appendChild(el('div', { class:'ct' }, String(st.owned)));\n    const bar = el('div', { class:'dist-bar' });\n    const fill = el('div', { class:'dist-fill', style:`width:${(st.owned/Math.max(1,st.total))*100}%; --ftk: var(--f-${t.faction})` });\n    bar.appendChild(fill);\n    row.appendChild(bar);\n    rows.appendChild(row);\n  });\n  const totalOwned = TREES.reduce((s,t)=>s+treeStats(t).owned,0);\n  const totalAll   = TREES.reduce((s,t)=>s+t.talents.length,0);\n  $('#dist-total').textContent = `${totalOwned}/${totalAll}`;\n}\n\n/* Talent list — used in summary rail (both mode) and work surface (list mode) */\nfunction renderTalentList(tree) {\n  const wrap = el('div', { class:'tlist', style:`--cc: var(--f-${tree.faction})` });\n  const tiers = [...new Set(tree.talents.map(t => t.tier))].sort((a,b)=>a-b);\n  const tierLabels = { 0:'Tier 0 · Root', 1:'Tier 1 · Branch', 2:'Tier 2 · Capstone' };\n  tiers.forEach(tier => {\n    wrap.appendChild(el('div', { class:'tlist-tier-head' }, tierLabels[tier] || `Tier ${tier}`));\n    tree.talents.filter(t => t.tier === tier).forEach(t => {\n      const state = nodeState(tree.id, t);\n      const item = el('div', {\n        class: `tlist-item state-${state}`,\n        'data-id': t.id,\n        onmouseenter: () => { S.hovered = t.id; applyHoverState(tree); updateDetailForTalent(tree, t); },\n        onmouseleave: () => { S.hovered = null; applyHoverState(tree); clearDetail(); },\n        onclick: () => onTalentClick(tree, t),\n      });\n      const orb = el('div', { class:'tlist-orb' }, el('span', { class:'tlist-sym' }, t.sym));\n      const info = el('div', { class:'tlist-info' });\n      info.appendChild(el('div', { class:'tlist-name' }, t.name));\n      const prereqText = t.prereqs.length > 0\n        ? `${t.prereqs.length} prereq${t.prereqs.length>1?'s':''}`\n        : 'No prereqs';\n      info.appendChild(el('div', { class:'tlist-meta' }, prereqText));\n      const stateLbl = el('div', { class:'tlist-state' }, state.toUpperCase());\n      item.appendChild(orb);\n      item.appendChild(info);\n      item.appendChild(stateLbl);\n      wrap.appendChild(item);\n    });\n  });\n  return wrap;\n}\n\n/* =================================================================\n * PROGRESSION RAIL\n * ================================================================= */\nfunction renderProgression() {\n  $('#slot-cnt').textContent = S.pending.size;\n  const pen = $('#pr-pending');\n  pen.innerHTML = '';\n  S.pending.forEach(id => {\n    let talent, tree;\n    for (const t of TREES) {\n      const x = t.talents.find(tt=>tt.id===id);\n      if (x) { talent = x; tree = t; break; }\n    }\n    if (!talent) return;\n    const chip = el('span', { class:'pending-chip', style:`--cc:var(--f-${tree.faction})` },\n      [talent.name, el('span', { class:'x', title:'Remove',\n        onclick: e => { e.stopPropagation(); S.pending.delete(id); render(); } }, '✕')]);\n    pen.appendChild(chip);\n  });\n  const next = $('#pr-next');\n  next.disabled = S.pending.size < CHAR.slotsAllowed;\n  next.classList.toggle('ready', S.pending.size >= CHAR.slotsAllowed);\n}\n\n/* =================================================================\n * WORK SURFACE — router\n * ================================================================= */\nfunction renderWork() {\n  const root = $('#work-content');\n  root.innerHTML = '';\n  if (S.activeTreeId == null) {\n    root.appendChild(renderCardGrid());\n  } else {\n    root.appendChild(renderTreeView(findTree(S.activeTreeId)));\n  }\n}\n\n/* ---------- CARD GRID ---------- */\nfunction renderCardGrid() {\n  const wrap = el('div', {});\n\n  // Header\n  const head = el('div', { class:'ws-head' });\n  const left = el('div', { class:'ws-h-l' }, [\n    el('div', {}, [\n      el('div', { class:'ws-title' }, 'Select a Talent Tree'),\n      el('div', { class:'ws-sub' }, '08 · TECHNIQUE  ·  '+S.pending.size+' of '+CHAR.slotsAllowed+' talents pending'),\n    ]),\n  ]);\n  const right = el('div', { class:'ws-sub' }, '◇ Click any tree to open its constellation');\n  head.appendChild(left);\n  head.appendChild(right);\n  wrap.appendChild(head);\n\n  // Grid\n  const grid = el('div', { class:'tc-grid' });\n  // Filter trees\n  const filtered = TREES.filter(t => {\n    if (S.filter.invested) {\n      const st = treeStats(t);\n      if (st.owned === 0) return false;\n    }\n    if (S.filter.search) {\n      const q = S.filter.search.toLowerCase();\n      const inTree = t.name.toLowerCase().includes(q) || t.fantasy.toLowerCase().includes(q);\n      const inTalent = t.talents.some(x => x.name.toLowerCase().includes(q));\n      if (!inTree && !inTalent) return false;\n    }\n    return true;\n  });\n  filtered.forEach(t => grid.appendChild(makeCard(t)));\n  wrap.appendChild(grid);\n  return wrap;\n}\n\nfunction makeCard(tree) {\n  const st = treeStats(tree);\n\n  const card = el('div', { class:'tcard'+(tree.locked?' locked':''), 'data-faction':tree.faction, 'data-id':tree.id,\n    onclick: () => { if (!tree.locked) openTree(tree.id); },\n    onmouseenter: () => updateDetailForTree(tree),\n    onmouseleave: () => clearDetail(),\n  });\n\n  // Top strip\n  const strip = el('div', { class:'tc-strip' });\n  strip.appendChild(el('span', { class:'tc-class' }, tree.class + ' · ' + tree.role.split('·')[0].trim()));\n  strip.appendChild(el('span', { class:'tc-tag '+(tree.locked?'locked-tag':st.owned?'invested-tag':'') }, tree.locked?'Locked':(st.owned?`${st.owned} invested`:'Available')));\n  card.appendChild(strip);\n\n  // Body\n  const body = el('div', { class:'tc-body' });\n  body.appendChild(el('div', { class:'tc-name', html: tree.name.replace(tree.nameAccent, `<b>${tree.nameAccent}<\u002Fb>`) }));\n  body.appendChild(el('div', { class:'tc-fantasy' }, tree.fantasy));\n\n  // Stats\n  const meta = el('div', { class:'tc-meta-row' });\n  meta.appendChild(metaStat('Talents', String(st.total)));\n  meta.appendChild(metaStat('Owned', String(st.owned)));\n  meta.appendChild(metaStat('Legal', st.legal > 0 ? String(st.legal) : '—'));\n  body.appendChild(meta);\n\n  // Mini-map\n  body.appendChild(makeMinimap(tree));\n\n  card.appendChild(body);\n\n  // CTA\n  card.appendChild(el('div', { class:'tc-cta' }, [\n    el('span', {}, tree.locked ? 'Locked · Prestige Required' : 'Open Constellation'),\n    el('span', { class:'arr' }, '→'),\n  ]));\n\n  // Trace\n  card.appendChild(el('div', { class:'tc-trace' }));\n\n  return card;\n}\n\nfunction metaStat(k, v) {\n  const c = el('div', { class:'tc-stat' });\n  c.appendChild(el('div', { class:'k' }, k));\n  c.appendChild(el('div', { class:'v' }, v));\n  return c;\n}\n\nfunction makeMinimap(tree) {\n  const w = el('div', { class:'tc-minimap' });\n  w.appendChild(el('div', { class:'tc-minimap-lbl' }, 'Constellation'));\n  const ns = 'http://www.w3.org/2000/svg';\n  const svg = document.createElementNS(ns,'svg');\n  svg.setAttribute('viewBox','0 0 100 50');\n  svg.setAttribute('preserveAspectRatio','none');\n  // Connection lines first\n  for (const t of tree.talents) {\n    for (const p of t.prereqs) {\n      if (p.startsWith('feat:') || p === 'bab5') continue;\n      const par = tree.talents.find(x => x.id === p);\n      if (!par) continue;\n      const line = document.createElementNS(ns,'line');\n      const owned = CHAR.owned.has(par.id) || CHAR.owned.has(t.id);\n      line.setAttribute('class', 'conn'+(owned?' owned':''));\n      line.setAttribute('x1', par.x); line.setAttribute('y1', par.y/2);\n      line.setAttribute('x2', t.x); line.setAttribute('y2', t.y/2);\n      svg.appendChild(line);\n    }\n  }\n  for (const t of tree.talents) {\n    const c = document.createElementNS(ns,'circle');\n    const owned = CHAR.owned.has(t.id);\n    const legal = !owned && prereqsMet(tree.id, t);\n    c.setAttribute('cx', t.x); c.setAttribute('cy', t.y/2); c.setAttribute('r', 2.4);\n    c.setAttribute('class', owned?'owned':legal?'legal':'locked');\n    svg.appendChild(c);\n  }\n  w.appendChild(svg);\n  return w;\n}\n\n/* ---------- TREE DAG VIEW ---------- */\nfunction renderTreeView(tree) {\n  const wrap = el('div', { class:'tree-view', style:`--cc: var(--f-${tree.faction})` });\n\n  // Header with back button + view toggle\n  const head = el('div', { class:'ws-head' });\n  const left = el('div', { class:'ws-h-l' }, [\n    el('button', { class:'ws-back', onclick: () => closeTree() }, [\n      el('span', { class:'arr' }, '‹'),\n      el('span', {}, 'All Trees'),\n    ]),\n    el('div', {}, [\n      el('div', { class:'ws-title' }, tree.name + ' Talent Tree'),\n      el('div', { class:'ws-sub' }, `${tree.class} · ${tree.role} · ${tree.talents.length} nodes`),\n    ]),\n  ]);\n  // View-mode toggle\n  const toggle = el('div', { class:'view-toggle' });\n  [['graph','◈ Graph'],['list','≡ List'],['both','⧒ Both']].forEach(([m, lbl]) => {\n    toggle.appendChild(el('button', {\n      class: 'vt-btn'+(S.viewMode===m?' active':''),\n      onclick: () => { S.viewMode = m; render(); },\n    }, lbl));\n  });\n  left.appendChild(toggle);\n  const st = treeStats(tree);\n  const right = el('div', { class:'ws-sub' }, [\n    el('span', { class:'ws-counter', style:`color:var(--f-${tree.faction})` }, `${st.owned}/${tree.talents.length}`),\n    el('span', { style:'margin-left:8px;' }, 'invested'),\n  ]);\n  head.appendChild(left); head.appendChild(right);\n  wrap.appendChild(head);\n\n  // Body — either DAG board or full list, based on viewMode\n  if (S.viewMode === 'list') {\n    wrap.appendChild(renderTalentList(tree));\n  } else {\n    // Board\n    const board = el('div', { class:'tv-board' });\n\n  // SVG connections layer\n  const ns = 'http://www.w3.org/2000/svg';\n  const svg = document.createElementNS(ns,'svg');\n  svg.setAttribute('class','tv-svg');\n  svg.setAttribute('viewBox','0 0 1000 540');\n  svg.setAttribute('preserveAspectRatio','none');\n\n  // Draw connections with curves — tagged with from/to so hover can light them up later\n  for (const t of tree.talents) {\n    for (const p of t.prereqs) {\n      if (p.startsWith('feat:') || p === 'bab5') continue;\n      const par = tree.talents.find(x => x.id === p);\n      if (!par) continue;\n      const x1 = par.x*10, y1 = par.y*5.4;\n      const x2 = t.x*10,  y2 = t.y*5.4;\n      const cx = (x1+x2)/2;\n      const d = `M ${x1} ${y1} C ${cx} ${y1}, ${cx} ${y2}, ${x2} ${y2}`;\n      const path = document.createElementNS(ns,'path');\n      const met = CHAR.owned.has(par.id) || S.pending.has(par.id);\n      path.setAttribute('class','conn'+(met?' met':' unmet'));\n      path.setAttribute('d', d);\n      path.dataset.from = par.id;\n      path.dataset.to = t.id;\n      svg.appendChild(path);\n    }\n  }\n  board.appendChild(svg);\n\n  // Nodes — built once. Hover updates classes directly on existing DOM (no flicker).\n  tree.talents.forEach(t => {\n    const state = nodeState(tree.id, t);\n    const node = el('div', { class:`tnode ${state}`, style:`left:${t.x}%; top:${t.y}%;`,\n      'data-id': t.id,\n      onmouseenter: () => { S.hovered = t.id; applyHoverState(tree); updateDetailForTalent(tree, t); },\n      onmouseleave: () => { S.hovered = null; applyHoverState(tree); clearDetail(); },\n      onclick: () => onTalentClick(tree, t),\n    });\n    const orb = el('div', { class:'tnode-orb' }, [\n      el('span', { class:'tnode-icon' }, t.sym),\n      el('span', { class:'tnode-tier' }, String(t.tier)),\n    ]);\n    node.appendChild(orb);\n    node.appendChild(el('div', { class:'tnode-label' }, t.name));\n\n    board.appendChild(node);\n  });\n\n  wrap.appendChild(board);\n  } // end if viewMode\n\n  // Legend (always visible)\n  wrap.appendChild(el('div', { class:'tv-legend' }, [\n    legendItem('owned','Owned'),\n    legendItem('legal','Legal'),\n    legendItem('pending','Pending'),\n    legendItem('locked','Locked'),\n    el('span', { style:'flex:1;'}),\n    el('span', {}, 'Hover a node · click to commit · 2 slots this level-up'),\n  ]));\n\n  return wrap;\n}\n\nfunction legendItem(cls, lbl) {\n  return el('span', { class:'tv-leg-item' }, [el('span', { class:`tv-leg-dot ${cls}` }), lbl]);\n}\n\n/* =================================================================\n * INTERACTIONS\n * ================================================================= */\nfunction openTree(id) {\n  S.activeTreeId = id; S.hovered = null;\n  render();\n}\nfunction closeTree() {\n  S.activeTreeId = null; S.hovered = null;\n  clearDetail(); render();\n}\n\n/* Apply hover state without rebuilding the DOM — surgical class toggles only */\nfunction applyHoverState(tree) {\n  const hovId = S.hovered;\n  const hov = hovId ? tree.talents.find(x => x.id === hovId) : null;\n  // Graph nodes\n  document.querySelectorAll('.tv-board .tnode').forEach(el => {\n    el.classList.remove('hovered','upstream','downstream');\n    if (!hov) return;\n    const id = el.dataset.id;\n    if (id === hovId) el.classList.add('hovered');\n    else if (hov.prereqs.includes(id)) el.classList.add('upstream');\n    else {\n      const t = tree.talents.find(x => x.id === id);\n      if (t && t.prereqs.includes(hovId)) el.classList.add('downstream');\n    }\n  });\n  // List items (summary rail in both mode, or work surface in list mode)\n  document.querySelectorAll('.tlist-item').forEach(el => {\n    el.classList.remove('hovered','upstream','downstream');\n    if (!hov) return;\n    const id = el.dataset.id;\n    if (id === hovId) el.classList.add('hovered');\n    else if (hov.prereqs.includes(id)) el.classList.add('upstream');\n    else {\n      const t = tree.talents.find(x => x.id === id);\n      if (t && t.prereqs.includes(hovId)) el.classList.add('downstream');\n    }\n  });\n  // Connections\n  document.querySelectorAll('.tv-svg path.conn').forEach(p => {\n    p.classList.remove('highlight');\n    if (!hov) return;\n    if (p.dataset.from === hovId || p.dataset.to === hovId) p.classList.add('highlight');\n  });\n}\n\nfunction onTalentClick(tree, talent) {\n  const state = nodeState(tree.id, talent);\n  if (state === 'pending') {\n    S.pending.delete(talent.id);\n  } else if (state === 'legal') {\n    if (S.pending.size >= CHAR.slotsAllowed) return;\n    S.pending.add(talent.id);\n    // Ripple\n    const n = document.querySelector(`.tnode[onclick]`); // (visual only — simplified)\n  } else {\n    return;\n  }\n  render();\n}\n\n/* =================================================================\n * DETAIL RAIL CONTENT\n * ================================================================= */\nfunction updateDetailForTree(tree) {\n  $('#detail-hint').textContent = tree.name.toLowerCase();\n  const root = $('#detail-content');\n  const st = treeStats(tree);\n\n  root.innerHTML = '';\n  root.appendChild(el('div', { class:'dr-pname' }, tree.name));\n  root.appendChild(el('div', { class:'dr-pmeta', style:`--cc:var(--f-${tree.faction})` }, [\n    el('span', { class:'role-tag' }, tree.class),\n    el('span', { class:'tier-tag' }, `${st.total} nodes`),\n    el('span', { class:'role-tag' }, st.owned ? `${st.owned} owned` : 'No investment'),\n  ]));\n\n  root.appendChild(el('div', { class:'dr-section' }, [\n    el('div', { class:'dr-sl' }, 'Fantasy'),\n    el('div', { class:'dr-desc' }, tree.fantasy),\n  ]));\n\n  root.appendChild(el('div', { class:'dr-section' }, [\n    el('div', { class:'dr-sl' }, 'Role'),\n    el('div', { class:'dr-benefit', style:`--cc:var(--f-${tree.faction})` }, tree.role),\n  ]));\n\n  if (st.legal > 0) {\n    root.appendChild(el('div', { class:'dr-section' }, [\n      el('div', { class:'dr-sl' }, 'Currently Available'),\n      el('div', { class:'unlocks-list' }, tree.talents\n        .filter(t => !CHAR.owned.has(t.id) && !S.pending.has(t.id) && prereqsMet(tree.id, t))\n        .slice(0,4)\n        .map(t => el('div', { class:'unlock', style:`--cc:var(--f-${tree.faction})` },\n          [el('span', { class:'arr' }, '◌'), el('span', {}, t.name)]))),\n    ]));\n  }\n}\n\nfunction updateDetailForTalent(tree, talent) {\n  $('#detail-hint').textContent = talent.name.toLowerCase();\n  const root = $('#detail-content');\n  const state = nodeState(tree.id, talent);\n  const tierLabels = ['Tier 0 · Root', 'Tier 1 · Branch', 'Tier 2 · Capstone'];\n\n  root.innerHTML = '';\n  root.appendChild(el('div', { class:'dr-pname' }, talent.name));\n  root.appendChild(el('div', { class:'dr-pmeta', style:`--cc:var(--f-${tree.faction})` }, [\n    el('span', { class:'role-tag' }, tree.class),\n    el('span', { class:'tier-tag' }, tierLabels[talent.tier] || `Tier ${talent.tier}`),\n    el('span', { class:'role-tag' }, state.toUpperCase()),\n  ]));\n\n  // Prerequisites\n  if (talent.prereqs.length > 0) {\n    const list = el('div', { class:'prereq-list' });\n    talent.prereqs.forEach(p => {\n      let label, met;\n      if (p.startsWith('feat:')) {\n        const f = p.slice(5);\n        label = 'Feat: ' + f.split('-').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');\n        met = CHAR.feats.has(f);\n      } else if (p === 'bab5') {\n        label = 'Base Attack Bonus +5';\n        met = CHAR.bab >= 5;\n      } else {\n        const t = tree.talents.find(x => x.id === p);\n        label = 'Talent: ' + (t ? t.name : p);\n        met = CHAR.owned.has(p) || S.pending.has(p);\n      }\n      list.appendChild(el('div', { class:'prereq '+(met?'met':'unmet'), style:`--cc:var(--f-${tree.faction})` }, [\n        el('span', { class:'marker' }, met?'✓':'✕'),\n        el('span', {}, label),\n      ]));\n    });\n    root.appendChild(el('div', { class:'dr-section' }, [\n      el('div', { class:'dr-sl' }, 'Prerequisites'),\n      list,\n    ]));\n  } else {\n    root.appendChild(el('div', { class:'dr-section' }, [\n      el('div', { class:'dr-sl' }, 'Prerequisites'),\n      el('div', { class:'prereq met', style:`--cc:var(--f-${tree.faction})` },\n        [el('span', { class:'marker' }, '◇'), el('span', {}, 'None — root node')]),\n    ]));\n  }\n\n  // Benefit\n  root.appendChild(el('div', { class:'dr-section' }, [\n    el('div', { class:'dr-sl' }, 'Benefit'),\n    el('div', { class:'dr-benefit', style:`--cc:var(--f-${tree.faction})` }, talent.benefit),\n  ]));\n\n  // Description\n  if (talent.desc) {\n    root.appendChild(el('div', { class:'dr-section' }, [\n      el('div', { class:'dr-sl' }, 'Description'),\n      el('div', { class:'dr-desc' }, talent.desc),\n    ]));\n  }\n\n  // Downstream unlocks\n  const downstream = tree.talents.filter(t => t.prereqs.includes(talent.id));\n  if (downstream.length > 0) {\n    root.appendChild(el('div', { class:'dr-section' }, [\n      el('div', { class:'dr-sl' }, 'Unlocks'),\n      el('div', { class:'unlocks-list' }, downstream.map(t =>\n        el('div', { class:'unlock', style:`--cc:var(--f-${tree.faction})` },\n          [el('span', { class:'arr' }, '→'), el('span', {}, t.name)]))),\n    ]));\n  }\n}\n\nfunction clearDetail() {\n  $('#detail-hint').textContent = 'awaiting target';\n  $('#detail-content').innerHTML = '<div class=\"detail-empty\">[ hover a tree or talent to inspect ]<\u002Fdiv>';\n}\n\n/* =================================================================\n * FILTERS / UTILITY\n * ================================================================= */\n$('#search').addEventListener('input', e => { S.filter.search = e.target.value; renderWork(); });\n$('#filter-legal').addEventListener('click', e => { S.filter.legal = !S.filter.legal; e.currentTarget.classList.toggle('on', S.filter.legal); });\n$('#filter-invested').addEventListener('click', e => { S.filter.invested = !S.filter.invested; e.currentTarget.classList.toggle('on', S.filter.invested); renderWork(); });\n\n/* keyboard nav */\ndocument.addEventListener('keydown', e => {\n  if (e.key === 'Escape' && S.activeTreeId) { closeTree(); return; }\n  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); $('#search').focus(); }\n});\n\n/* =================================================================\n * MASTER RENDER\n * ================================================================= */\nfunction render() {\n  renderMentor();\n  renderSummary();\n  renderWork();\n  renderProgression();\n}\n\n/* clock */\nfunction tickClock(){const d=new Date();$('#clock').textContent=`${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}:${String(d.getUTCSeconds()).padStart(2,'0')} UTC`;}\ntickClock();setInterval(tickClock,1000);\n\nrender();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
