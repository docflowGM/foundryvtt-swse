  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"15b9985c-2a86-40b2-aa6c-f3662c4f839c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"79371dec-7ac5-4cf1-9f3b-cd6834d6fb49\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n/* ===============================================================\n * TOKENS — reused from Progression Engine v2 (theme stays global)\n * =============================================================== */\n:root {\n  --accent-h: 190; --accent-c: 0.17; --accent-l: 0.82;\n  --accent:     oklch(var(--accent-l) var(--accent-c) var(--accent-h));\n  --accent-dim: oklch(0.32 0.08 var(--accent-h));\n\n  --bg:     oklch(0.10 0.03 285);\n  --screen: oklch(0.13 0.055 278);\n  --screen-2: oklch(0.18 0.07 272);\n  --ink:       oklch(0.94 0.04 var(--accent-h));\n  --ink-dim:   oklch(0.72 0.06 var(--accent-h));\n  --ink-faint: oklch(0.50 0.05 var(--accent-h));\n  --pos:  oklch(0.82 0.19 145);\n  --neg:  oklch(0.70 0.22 25);\n  --zero: oklch(0.88 0.17 95);\n\n  --font-body:    'Space Grotesk', system-ui, sans-serif;\n  --font-mono:    'JetBrains Mono', ui-monospace, monospace;\n  --font-display: 'VT323', monospace;\n  --font-syne:    'Syne', sans-serif;\n\n  --anim: 1;          /* respects user motion settings — 0=off, 1=normal */\n  --scan: 0.025;\n  --pad: 18px;\n}\n\n/* Faction palettes — layered on top of theme, never replacing */\n:root {\n  --f-jedi:   oklch(0.78 0.18 220);  /* luminous sapphire */\n  --f-jedi-2: oklch(0.66 0.16 215);\n  --f-noble-r: oklch(0.82 0.16 80);  /* refined gold */\n  --f-noble-r2: oklch(0.62 0.12 78);\n  --f-noble-c: oklch(0.66 0.14 165); /* covert teal */\n  --f-noble-c2: oklch(0.52 0.13 160);\n  --f-sith:   oklch(0.65 0.27 22);   /* sith crimson */\n  --f-mil:    oklch(0.78 0.16 75);   /* military amber */\n  --f-scout:  oklch(0.74 0.16 55);   /* scout rust */\n  --f-crim:   oklch(0.66 0.14 170);  /* criminal teal */\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin:0; padding:0; background:#05050a; color:var(--ink); font-family:var(--font-body); min-height:100vh; overflow-x:auto; }\nbody::before {\n  content:''; position:fixed; inset:0; z-index:-2;\n  background:\n    radial-gradient(ellipse at 28% 18%, oklch(0.18 0.10 320/0.55), transparent 55%),\n    radial-gradient(ellipse at 82% 88%, oklch(0.18 0.10 200/0.50), transparent 55%),\n    linear-gradient(180deg,#060612 0%,#020205 100%);\n}\nbody::after {\n  content:''; position:fixed; inset:0; pointer-events:none; z-index:-1;\n  background-image:\n    linear-gradient(to right, oklch(1 0 0/0.015) 1px, transparent 1px),\n    linear-gradient(to bottom, oklch(1 0 0/0.015) 1px, transparent 1px);\n  background-size: 48px 48px;\n}\n\n/* ===============================================================\n * DATAPAD CHROME (lifted from PE v2)\n * =============================================================== */\n.stage { min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:36px 20px; }\n\n.datapad {\n  width:min(1440px, 100%); position:relative;\n  padding:18px 18px 16px;\n  background: linear-gradient(180deg,#1a1923 0%,#0d0c15 50%,#080810 100%);\n  clip-path: polygon(\n    0 22px, 22px 0,\n    calc(100% - 60px) 0, calc(100% - 44px) 16px, calc(100% - 22px) 16px, 100% 38px,\n    100% calc(100% - 22px), calc(100% - 22px) 100%,\n    22px 100%, 0 calc(100% - 22px)\n  );\n  box-shadow:\n    inset 0 1px 0 oklch(1 0 0/0.06),\n    inset 0 0 0 1px oklch(0 0 0/0.6),\n    0 40px 80px oklch(0 0 0/0.8),\n    0 0 100px oklch(var(--accent-l) var(--accent-c) var(--accent-h)/0.10);\n}\n.rivet { position:absolute; width:5px; height:5px; border-radius:50%; background:radial-gradient(circle at 35% 35%, #5a5a6e 0%, #1a1a22 70%);}\n.rivet.tl{top:9px;left:14px;}.rivet.tr{top:9px;right:14px;}.rivet.bl{bottom:9px;left:14px;}.rivet.br{bottom:9px;right:14px;}\n.bezel-label{position:absolute;top:3px;left:50px;font-family:var(--font-mono);font-size:9px;letter-spacing:.32em;color:oklch(0.42 0.03 260);}\n.bezel-serial{position:absolute;top:3px;right:80px;font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;color:oklch(0.42 0.03 260);}\n\n.screen {\n  position:relative;\n  background: radial-gradient(ellipse at 28% 8%, var(--screen-2) 0%, var(--screen) 50%, oklch(0.07 0.04 278) 100%);\n  border:1px solid oklch(0.3 0.04 260/0.6); border-radius:8px;\n  padding:14px;\n  overflow:hidden;\n}\n.screen::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:5;background:repeating-linear-gradient(0deg,transparent 0 3px,oklch(1 0 0/var(--scan)) 3px 4px);}\n.screen::after{content:'';position:absolute;left:0;right:0;top:0;height:60%;pointer-events:none;z-index:4;background:linear-gradient(180deg,oklch(0.95 0.18 220/0.025),transparent);}\n\n/* ===============================================================\n * SHELL LAYOUT — Mentor → Step → Utility → 3-body → Progression\n * =============================================================== */\n.hud{display:flex;align-items:center;justify-content:space-between;padding:4px 10px 8px;margin-bottom:8px;border-bottom:1px solid oklch(0.85 0.18 200/0.18);font-family:var(--font-mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-dim);}\n.hud-l,.hud-r{display:flex;gap:14px;align-items:center;}\n.hud-title{font-family:var(--font-display);font-size:18px;letter-spacing:.32em;color:var(--accent);text-shadow:0 0 10px oklch(0.85 0.18 200/0.5);}\n.hud .pill{display:inline-flex;gap:6px;align-items:center;}\n.hud .dot{width:6px;height:6px;border-radius:50%;background:var(--pos);box-shadow:0 0 6px var(--pos);animation:lpulse calc(1.4s / var(--anim)) ease-in-out infinite;}\n.hud .dot.warn{background:var(--zero);box-shadow:0 0 6px var(--zero);}\n.hud .dot.hot{background:var(--neg);box-shadow:0 0 6px var(--neg);}\n@keyframes lpulse{0%,100%{opacity:.4;}50%{opacity:1;}}\n\n/* Mentor rail (top, horizontal) */\n.mentor-rail{\n  display:grid;grid-template-columns:56px 1fr auto;gap:14px;align-items:center;\n  padding:10px 14px;margin-bottom:10px;\n  background: linear-gradient(90deg, oklch(0.18 0.06 280/0.6) 0%, oklch(0.10 0.04 278/0.4) 100%);\n  border:1px solid oklch(0.85 0.18 200/0.18);\n  border-left:3px solid var(--accent);\n  position:relative;overflow:hidden;\n}\n.mentor-rail::before{content:'';position:absolute;left:0;right:0;top:0;bottom:0;background:radial-gradient(ellipse at 8% 50%, oklch(0.85 0.18 200/0.08), transparent 40%);pointer-events:none;}\n.mentor-portrait{width:56px;height:56px;border:1px solid oklch(0.85 0.18 200/0.4);position:relative;\n  background:radial-gradient(circle at 40% 30%, oklch(0.85 0.18 200/0.2), oklch(0.08 0.04 278) 70%);\n  display:flex;align-items:center;justify-content:center;}\n.mentor-portrait::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0 3px,oklch(0.85 0.18 200/0.08) 3px 4px);pointer-events:none;}\n.mentor-portrait svg{width:40px;height:40px;color:var(--accent);position:relative;z-index:1;}\n.mentor-text{font-family:var(--font-body);font-size:13px;color:var(--ink);line-height:1.45;}\n.mentor-text .lbl{font-family:var(--font-mono);font-size:8.5px;letter-spacing:.28em;color:var(--accent);text-transform:uppercase;margin-bottom:4px;}\n.mentor-text .lbl b{color:var(--ink-dim);margin-left:8px;font-weight:400;}\n.mentor-text .quote{font-style:italic;color:var(--ink-dim);}\n.mentor-cycle{display:flex;gap:4px;align-items:center;}\n.mentor-cycle button{width:22px;height:22px;border:1px solid oklch(0.85 0.18 200/0.3);background:oklch(0 0 0/0.4);color:var(--ink-faint);cursor:pointer;font-family:var(--font-mono);font-size:11px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .15s;}\n.mentor-cycle button:hover{color:var(--accent);border-color:var(--accent);}\n\n/* Step rail (horizontal stepper) */\n.step-rail{\n  display:grid;grid-template-columns:repeat(9, 1fr);gap:5px;\n  padding:10px 4px 10px;margin-bottom:6px;\n}\n.step{\n  position:relative;padding:8px 6px 8px 10px;\n  background:oklch(0 0 0/0.3);border:1px solid oklch(0.85 0.18 200/0.08);\n  font-family:var(--font-mono);transition:all .25s;cursor:default;\n  clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);\n}\n.step .num{font-family:var(--font-display);font-size:18px;color:var(--ink-faint);letter-spacing:.04em;line-height:1;}\n.step .lbl{font-size:7.5px;letter-spacing:.24em;color:var(--ink-faint);text-transform:uppercase;margin-top:2px;}\n.step .nm{font-size:9.5px;color:var(--ink-dim);font-weight:600;margin-top:1px;text-transform:uppercase;letter-spacing:.04em;}\n.step.done{border-color:oklch(0.82 0.19 145/0.3);background:oklch(0.82 0.19 145/0.06);}\n.step.done .num{color:var(--pos);}\n.step.done::before{content:'✓';position:absolute;top:6px;right:8px;color:var(--pos);font-size:10px;font-weight:700;}\n.step.active{\n  border-color:var(--accent);background:linear-gradient(180deg, oklch(0.85 0.18 200/0.14) 0%, oklch(0.85 0.18 200/0.04) 100%);\n  box-shadow:0 0 20px oklch(0.85 0.18 200/0.2);\n}\n.step.active .num,.step.active .lbl,.step.active .nm{color:var(--accent);}\n.step.active::after{content:'';position:absolute;left:10%;right:10%;bottom:-1px;height:2px;background:var(--accent);box-shadow:0 0 8px var(--accent);}\n\n/* Utility rail */\n.utility-rail{\n  display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center;\n  padding:9px 12px;margin-bottom:12px;\n  background:oklch(0 0 0/0.3);border:1px solid oklch(0.85 0.18 200/0.12);\n}\n.search-wrap{position:relative;}\n.search-wrap input{\n  width:100%;padding:7px 10px 7px 28px;\n  background:oklch(0 0 0/0.4);border:1px solid oklch(0.85 0.18 200/0.2);color:var(--ink);\n  font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;outline:none;\n}\n.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 10px oklch(0.85 0.18 200/0.3);}\n.search-wrap::before{content:'◌';position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-family:var(--font-display);font-size:13px;}\n.search-wrap .kbd{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:8px;color:var(--ink-faint);letter-spacing:.1em;padding:2px 5px;border:1px solid oklch(1 0 0/0.1);}\n.util-toggle{\n  display:inline-flex;gap:6px;align-items:center;cursor:pointer;\n  font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);\n  padding:6px 10px;background:oklch(0 0 0/0.4);border:1px solid oklch(1 0 0/0.08);\n  user-select:none;transition:all .15s;\n  clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);\n}\n.util-toggle:hover{color:var(--accent);border-color:oklch(0.85 0.18 200/0.3);}\n.util-toggle.on{color:var(--accent);background:oklch(0.85 0.18 200/0.12);border-color:oklch(0.85 0.18 200/0.45);box-shadow:0 0 10px oklch(0.85 0.18 200/0.2);}\n.util-toggle .sw{width:8px;height:8px;border:1px solid currentColor;display:inline-block;}\n.util-toggle.on .sw{background:currentColor;box-shadow:0 0 6px currentColor;}\n.util-sort{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;color:var(--ink-faint);text-transform:uppercase;padding:6px 10px;background:oklch(0 0 0/0.4);border:1px solid oklch(1 0 0/0.08);cursor:pointer;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);}\n\n/* Three-body grid */\n.three-body{\n  display:grid;grid-template-columns:260px 1fr 310px;gap:12px;\n  margin-bottom:10px;\n}\n\n/* Common rail framing */\n.rail{\n  background:oklch(0 0 0/0.32);border:1px solid oklch(0.85 0.18 200/0.14);\n  padding:14px;position:relative;overflow:hidden;\n}\n.rail-head{display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);padding-bottom:8px;margin-bottom:10px;border-bottom:1px dashed oklch(0.85 0.18 200/0.22);}\n.rail-head .hint{color:var(--ink-faint);font-size:8px;letter-spacing:.15em;}\n.rail-led{width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 4px var(--accent);animation:lpulse calc(1.3s/var(--anim)) ease-in-out infinite;}\n\n/* ===============================================================\n * SUMMARY RAIL (build identity)\n * =============================================================== */\n.identity-banner{\n  position:relative;padding:12px 12px;margin-bottom:12px;\n  background:linear-gradient(135deg, oklch(0.85 0.18 200/0.10) 0%, oklch(0.55 0.26 300/0.08) 100%);\n  border:1px solid oklch(0.85 0.18 200/0.25);\n  overflow:hidden;\n}\n.identity-banner::before{content:'';position:absolute;left:-30px;top:-30px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle, oklch(0.85 0.18 200/0.18), transparent 60%);}\n.id-tag{font-family:var(--font-mono);font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-faint);}\n.id-arch{font-family:var(--font-syne);font-weight:800;font-size:19px;letter-spacing:.04em;color:var(--accent);line-height:1.1;margin-top:3px;text-shadow:0 0 12px oklch(0.85 0.18 200/0.4);}\n.id-char{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--ink-dim);margin-top:6px;}\n.id-mc{font-family:var(--font-mono);font-size:8.5px;letter-spacing:.18em;color:var(--ink-faint);text-transform:uppercase;margin-top:2px;}\n\n/* Distribution graph */\n.dist{margin-bottom:14px;}\n.dist-head{display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px;}\n.dist-row{display:grid;grid-template-columns:1fr 24px;gap:6px;align-items:center;padding:3px 0;}\n.dist-row .nm{font-family:var(--font-mono);font-size:9px;color:var(--ink-dim);letter-spacing:.04em;}\n.dist-row .ct{font-family:var(--font-display);font-size:14px;color:var(--accent);text-align:right;line-height:1;letter-spacing:.04em;}\n.dist-bar{grid-column:1/-1;height:4px;background:oklch(0 0 0/0.6);position:relative;overflow:hidden;}\n.dist-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg, var(--ftk, var(--accent)), color-mix(in oklch, var(--ftk, var(--accent)) 30%, transparent));box-shadow:0 0 6px var(--ftk, var(--accent));}\n\n.chip-section{margin-bottom:14px;}\n.chip-section .lbl{font-family:var(--font-mono);font-size:8px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px;}\n.chips{display:flex;flex-wrap:wrap;gap:5px;}\n.chip{\n  font-family:var(--font-mono);font-size:8px;letter-spacing:.15em;text-transform:uppercase;\n  padding:3px 7px;background:oklch(0 0 0/0.4);border:1px solid var(--cc, oklch(0.85 0.18 200/0.3));\n  color:var(--cc, var(--ink-dim));\n}\n.chip.pending{\n  border-style:dashed;animation:chipPulse calc(2s/var(--anim)) ease-in-out infinite;\n}\n@keyframes chipPulse{0%,100%{box-shadow:0 0 0 0 var(--cc, oklch(0.85 0.18 200/0.3));}50%{box-shadow:0 0 0 4px color-mix(in oklch, var(--cc, var(--accent)) 0%, transparent);}}\n\n/* ===============================================================\n * DETAIL RAIL\n * =============================================================== */\n.detail-empty{font-family:var(--font-mono);font-size:9px;letter-spacing:.18em;color:var(--ink-faint);text-transform:uppercase;padding:30px 8px;text-align:center;opacity:0.5;}\n.dr-pname{font-family:var(--font-syne);font-weight:700;font-size:17px;color:var(--ink);letter-spacing:.01em;line-height:1.2;text-wrap:balance;}\n.dr-pmeta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-family:var(--font-mono);font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);margin-top:6px;margin-bottom:12px;}\n.dr-pmeta .sep{color:var(--ink-faint);opacity:.4;}\n.dr-pmeta .tier-tag{color:var(--cc, var(--accent));padding:2px 6px;border:1px solid var(--cc, var(--accent));}\n.dr-pmeta .role-tag{color:var(--ink-dim);padding:2px 6px;border:1px solid oklch(1 0 0/0.1);}\n\n.dr-section{margin-bottom:12px;}\n.dr-sl{font-family:var(--font-mono);font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px;}\n.dr-benefit{font-family:var(--font-mono);font-size:10px;line-height:1.55;color:var(--ink);letter-spacing:.01em;padding:9px 10px;background:oklch(0 0 0/0.4);border-left:2px solid var(--cc, var(--accent));}\n.dr-desc{font-family:var(--font-body);font-size:11px;line-height:1.55;color:var(--ink-dim);font-style:italic;text-wrap:pretty;}\n\n.prereq-list{display:flex;flex-direction:column;gap:4px;}\n.prereq{\n  display:flex;align-items:center;gap:8px;\n  font-family:var(--font-mono);font-size:9.5px;letter-spacing:.02em;color:var(--ink-dim);\n  padding:5px 8px;background:oklch(0 0 0/0.3);border-left:2px solid var(--cc, oklch(1 0 0/0.1));\n}\n.prereq .marker{width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1;flex-shrink:0;font-weight:700;}\n.prereq.met{color:var(--ink);}\n.prereq.met .marker{color:var(--pos);}\n.prereq.unmet{opacity:.55;border-left-color:var(--neg);}\n.prereq.unmet .marker{color:var(--neg);}\n\n.unlocks-list{display:flex;flex-direction:column;gap:4px;}\n.unlock{\n  display:flex;align-items:center;gap:8px;padding:4px 8px;\n  font-family:var(--font-mono);font-size:9px;color:var(--ink-faint);letter-spacing:.04em;\n  background:oklch(0 0 0/0.25);border:1px dashed oklch(1 0 0/0.08);\n}\n.unlock .arr{color:var(--cc, var(--accent));font-size:11px;}\n\n.tree-card-preview{\n  margin-top:12px;padding:10px;\n  background:oklch(0 0 0/0.4);border:1px solid var(--cc, oklch(0.85 0.18 200/0.3));\n  display:flex;flex-direction:column;gap:6px;\n}\n.tcp-name{font-family:var(--font-syne);font-weight:700;font-size:14px;color:var(--cc, var(--accent));letter-spacing:.04em;}\n.tcp-meta{font-family:var(--font-mono);font-size:8px;letter-spacing:.2em;color:var(--ink-faint);text-transform:uppercase;}\n\n/* ===============================================================\n * PROGRESSION RAIL (bottom)\n * =============================================================== */\n.progression-rail{\n  display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;\n  padding:14px 18px;\n  background:linear-gradient(180deg, oklch(0 0 0/0.4), oklch(0 0 0/0.6));\n  border:1px solid oklch(0.85 0.18 200/0.18);border-top:2px solid var(--accent);\n  position:relative;\n}\n.progression-rail::before{content:'';position:absolute;left:30px;right:30px;top:-2px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);box-shadow:0 0 12px var(--accent);}\n.pr-btn{\n  padding:11px 22px;font-family:var(--font-mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;transition:all .2s;\n  background:oklch(0 0 0/0.5);border:1px solid oklch(0.85 0.18 200/0.3);color:var(--ink-dim);\n  clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);\n}\n.pr-btn:hover{color:var(--accent);border-color:var(--accent);box-shadow:0 0 14px oklch(0.85 0.18 200/0.25);}\n.pr-btn.next{background:oklch(0.85 0.18 200/0.16);border-color:var(--accent);color:var(--accent);text-shadow:0 0 8px oklch(0.85 0.18 200/0.5);}\n.pr-btn.next:disabled{opacity:.35;cursor:not-allowed;background:oklch(0 0 0/0.4);border-color:oklch(1 0 0/0.1);color:var(--ink-faint);text-shadow:none;box-shadow:none;}\n.pr-btn.next.ready{animation:nextReady calc(2.4s/var(--anim)) ease-in-out infinite;}\n@keyframes nextReady{0%,100%{box-shadow:0 0 0 0 oklch(0.85 0.18 200/0.5);}50%{box-shadow:0 0 0 8px oklch(0.85 0.18 200/0);}}\n.pr-mid{display:flex;align-items:center;gap:14px;justify-content:center;}\n.pr-slots{display:flex;gap:6px;align-items:center;font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-dim);}\n.pr-slots .cnt{font-family:var(--font-display);font-size:24px;color:var(--accent);letter-spacing:.04em;line-height:1;text-shadow:0 0 10px oklch(0.85 0.18 200/0.5);}\n.pr-slots .of{font-family:var(--font-display);font-size:14px;color:var(--ink-faint);}\n.pr-pending{display:flex;gap:5px;}\n.pending-chip{\n  font-family:var(--font-mono);font-size:8px;letter-spacing:.15em;text-transform:uppercase;\n  padding:4px 9px;background:color-mix(in oklch, var(--cc, var(--accent)) 8%, transparent);\n  border:1px dashed var(--cc, var(--accent));color:var(--cc, var(--accent));\n  animation:pendingPulse calc(2s/var(--anim)) ease-in-out infinite;\n  position:relative;\n}\n.pending-chip .x{margin-left:6px;opacity:.6;cursor:pointer;}\n.pending-chip .x:hover{opacity:1;color:var(--neg);}\n@keyframes pendingPulse{0%,100%{box-shadow:0 0 0 0 color-mix(in oklch,var(--cc,var(--accent)) 30%,transparent);}50%{box-shadow:0 0 10px 0 color-mix(in oklch,var(--cc,var(--accent)) 30%,transparent);}}\n\n/* ===============================================================\n * VIEW MODE TOGGLE (graph / list / both)\n * =============================================================== */\n.view-toggle{\n  display:inline-flex;background:oklch(0 0 0/0.4);border:1px solid oklch(0.85 0.18 200/0.25);\n  clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);\n}\n.vt-btn{\n  padding:7px 12px;font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;\n  background:transparent;border:none;color:var(--ink-faint);cursor:pointer;transition:all .2s;\n  border-right:1px solid oklch(1 0 0/0.06);\n}\n.vt-btn:last-child{border-right:none;}\n.vt-btn:hover{color:var(--ink-dim);background:oklch(0.85 0.18 200/0.06);}\n.vt-btn.active{color:var(--accent);background:oklch(0.85 0.18 200/0.14);text-shadow:0 0 8px oklch(0.85 0.18 200/0.5);}\n\n/* ===============================================================\n * TALENT LIST (sidebar in both mode, or full work-surface in list mode)\n * =============================================================== */\n.tlist{display:flex;flex-direction:column;gap:6px;animation:cardsIn calc(0.4s/var(--anim)) ease-out;}\n.tlist-tier-head{\n  font-family:var(--font-mono);font-size:8px;letter-spacing:.3em;text-transform:uppercase;\n  color:var(--ink-faint);padding:10px 4px 4px;display:flex;align-items:center;gap:6px;\n}\n.tlist-tier-head::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,oklch(1 0 0/0.1),transparent);}\n.tlist-tier-head:first-child{padding-top:0;}\n\n.tlist-item{\n  --cc: var(--accent);\n  display:grid;grid-template-columns:30px 1fr auto;gap:8px;align-items:center;\n  padding:7px 9px;background:oklch(0 0 0/0.35);border:1px solid oklch(1 0 0/0.06);\n  border-left:2px solid color-mix(in oklch, var(--cc) 40%, transparent);\n  cursor:pointer;transition:transform .2s, background .2s, border-color .2s, box-shadow .25s;\n  position:relative;\n}\n.tlist-item:hover{background:oklch(0 0 0/0.55);transform:translateX(3px);border-left-color:var(--cc);}\n\n.tlist-item.state-owned   {border-left-color:var(--pos);color:var(--pos);}\n.tlist-item.state-legal   {border-left-color:var(--cc);color:var(--cc);}\n.tlist-item.state-pending {border-left-color:var(--zero);color:var(--zero);background:oklch(0.88 0.17 95/0.06);}\n.tlist-item.state-locked  {border-left-color:color-mix(in oklch,var(--neg) 60%,transparent);color:color-mix(in oklch,var(--neg) 75%,var(--ink-faint));opacity:.72;}\n\n.tlist-item.hovered{\n  background:oklch(0.88 0.17 95/0.12);border-color:var(--zero);\n  box-shadow:0 0 14px oklch(0.88 0.17 95/0.35);\n}\n.tlist-item.upstream{\n  border-color:oklch(0.88 0.17 95/0.4);background:oklch(0.88 0.17 95/0.05);\n}\n.tlist-item.downstream{\n  border-color:color-mix(in oklch, var(--cc) 60%, transparent);background:color-mix(in oklch, var(--cc) 5%, transparent);\n}\n\n.tlist-orb{\n  width:30px;height:30px;display:flex;align-items:center;justify-content:center;\n  background:radial-gradient(circle at 30% 30%, color-mix(in oklch, currentColor 28%, oklch(0.07 0.03 278)) 0%, oklch(0.06 0.03 278) 80%);\n  border:1.5px solid currentColor;border-radius:50%;flex-shrink:0;\n}\n.tlist-sym{font-family:var(--font-display);font-size:16px;color:currentColor;line-height:1;text-shadow:0 0 6px currentColor;}\n.tlist-info{min-width:0;}\n.tlist-name{font-family:var(--font-body);font-size:11px;color:var(--ink);font-weight:600;letter-spacing:.01em;line-height:1.2;}\n.tlist-item.state-locked .tlist-name{color:var(--ink-dim);}\n.tlist-meta{font-family:var(--font-mono);font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);margin-top:2px;}\n.tlist-state{\n  font-family:var(--font-mono);font-size:7px;letter-spacing:.22em;text-transform:uppercase;\n  padding:3px 6px;border:1px solid currentColor;color:currentColor;line-height:1;white-space:nowrap;\n}\n\n/* List in summary-rail context — slightly more compact */\n.summary-rail .tlist{max-height:660px;overflow-y:auto;padding-right:4px;}\n.summary-rail .tlist-item{padding:6px 8px;}\n.summary-rail .tlist-orb{width:26px;height:26px;}\n.summary-rail .tlist-sym{font-size:14px;}\n\n/* List in work-surface (list-only mode) — 2-column grid */\n.work-surface .tlist{\n  display:grid;grid-template-columns:repeat(2, 1fr);gap:8px;\n}\n.work-surface .tlist-tier-head{grid-column:1/-1;}\n\n/* ===============================================================\n * WORK SURFACE\n * =============================================================== */\n.work-surface{\n  position:relative;min-height:580px;\n  background:radial-gradient(ellipse at 50% 30%, oklch(0.18 0.07 270/0.5) 0%, oklch(0.10 0.04 278/0.5) 60%);\n  border:1px solid oklch(0.85 0.18 200/0.15);\n  padding:18px;overflow:hidden;\n}\n.work-surface::before{\n  content:'';position:absolute;inset:0;pointer-events:none;\n  background:\n    radial-gradient(ellipse at 20% 10%, oklch(0.85 0.18 200/0.06), transparent 50%),\n    radial-gradient(ellipse at 80% 90%, oklch(0.65 0.26 320/0.06), transparent 55%);\n}\n\n.ws-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:14px;position:relative;z-index:2;}\n.ws-h-l{display:flex;align-items:center;gap:14px;}\n.ws-title{font-family:var(--font-syne);font-weight:700;font-size:17px;letter-spacing:.04em;color:var(--ink);}\n.ws-sub{font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);}\n.ws-counter{font-family:var(--font-display);font-size:20px;color:var(--accent);letter-spacing:.05em;text-shadow:0 0 10px oklch(0.85 0.18 200/0.5);}\n.ws-back{\n  font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-dim);\n  padding:7px 12px;background:oklch(0 0 0/0.5);border:1px solid oklch(1 0 0/0.12);cursor:pointer;transition:all .15s;\n  display:inline-flex;align-items:center;gap:7px;\n  clip-path:polygon(5px 0,100% 0,calc(100% - 5px) 100%,0 100%);\n}\n.ws-back:hover{color:var(--accent);border-color:var(--accent);}\n.ws-back .arr{font-size:13px;}\n\n/* ===============================================================\n * TREE CARD GRID (cards view)\n * =============================================================== */\n.tc-grid{\n  display:grid;grid-template-columns:repeat(3, 1fr);gap:16px;\n  animation:cardsIn calc(0.5s/var(--anim)) cubic-bezier(.16,1,.3,1);\n  position:relative;z-index:1;\n}\n@keyframes cardsIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}\n\n.tcard{\n  --cc:var(--accent);\n  position:relative;overflow:hidden;cursor:pointer;\n  border:1px solid color-mix(in oklch, var(--cc) 35%, oklch(0.3 0.04 270/0.6));\n  background:linear-gradient(160deg, color-mix(in oklch, var(--cc) 8%, oklch(0.07 0.03 278)) 0%, oklch(0.10 0.04 278) 100%);\n  padding:0;transition:transform .35s cubic-bezier(.4,0,.2,1), box-shadow .35s, border-color .35s;\n  box-shadow:0 0 0 0 transparent, inset 0 0 0 1px color-mix(in oklch,var(--cc) 10%,transparent);\n}\n.tcard[data-faction=\"jedi\"]    { --cc: var(--f-jedi); }\n.tcard[data-faction=\"jedi\"]    { --cc-2: var(--f-jedi-2); }\n.tcard[data-faction=\"noble-r\"] { --cc: var(--f-noble-r); --cc-2: var(--f-noble-r2); }\n.tcard[data-faction=\"noble-c\"] { --cc: var(--f-noble-c); --cc-2: var(--f-noble-c2); }\n.tcard[data-faction=\"sith\"]    { --cc: var(--f-sith); }\n.tcard[data-faction=\"mil\"]     { --cc: var(--f-mil); }\n.tcard[data-faction=\"scout\"]   { --cc: var(--f-scout); }\n.tcard[data-faction=\"crim\"]    { --cc: var(--f-crim); }\n\n.tcard:hover{\n  transform:translateY(-5px);\n  box-shadow: 0 14px 30px oklch(0 0 0/0.4),\n              0 0 35px color-mix(in oklch,var(--cc) 35%,transparent),\n              inset 0 0 0 1px color-mix(in oklch,var(--cc) 30%,transparent);\n  border-color: color-mix(in oklch,var(--cc) 60%,transparent);\n}\n.tcard.locked{cursor:not-allowed;opacity:.55;filter:saturate(0.3);}\n.tcard.locked:hover{transform:none;box-shadow:none;}\n\n/* Card top strip */\n.tc-strip{\n  height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;\n  padding:0 12px;position:relative;\n  background:linear-gradient(90deg, color-mix(in oklch,var(--cc) 22%,oklch(0.05 0.03 278)) 0%, color-mix(in oklch,var(--cc) 8%,transparent) 100%);\n  border-bottom:1px solid color-mix(in oklch,var(--cc) 40%,transparent);\n  overflow:hidden;\n}\n.tc-strip::before{content:'';position:absolute;left:0;right:0;top:0;height:2px;background:var(--cc);box-shadow:0 1px 8px var(--cc);}\n.tc-strip::after{\n  content:'';position:absolute;inset:0;\n  background:repeating-linear-gradient(90deg, transparent 0 12px, color-mix(in oklch,var(--cc) 5%,transparent) 12px 14px);\n  animation: stripeFlow calc(8s / var(--anim)) linear infinite;\n}\n@keyframes stripeFlow{from{background-position:0 0;}to{background-position:48px 0;}}\n.tc-class{\n  font-family:var(--font-mono);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;\n  color:color-mix(in oklch, var(--cc) 70%, var(--ink));position:relative;z-index:1;\n}\n.tc-tag{\n  font-family:var(--font-mono);font-size:7.5px;letter-spacing:.22em;text-transform:uppercase;\n  color:var(--cc);padding:3px 7px;border:1px solid var(--cc);position:relative;z-index:1;\n  background:oklch(0 0 0/0.4);\n}\n.tc-tag.locked-tag{color:var(--neg);border-color:var(--neg);}\n.tc-tag.invested-tag{background: color-mix(in oklch,var(--cc) 20%, transparent);}\n\n/* Card body */\n.tc-body{padding:14px 14px 12px;display:flex;flex-direction:column;gap:8px;position:relative;}\n\n.tc-name{\n  font-family:var(--font-syne);font-weight:700;font-size:21px;letter-spacing:.02em;\n  color:var(--ink);line-height:1.1;text-wrap:balance;\n}\n.tc-name b{color:var(--cc);}\n\n.tc-fantasy{font-family:var(--font-body);font-size:11.5px;line-height:1.5;color:var(--ink-dim);font-style:italic;text-wrap:pretty;}\n\n.tc-meta-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px;}\n.tc-stat{padding:6px 8px;background:oklch(0 0 0/0.4);border:1px solid oklch(1 0 0/0.06);position:relative;}\n.tc-stat .k{font-family:var(--font-mono);font-size:7px;letter-spacing:.25em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:2px;}\n.tc-stat .v{font-family:var(--font-display);font-size:18px;color:var(--cc);letter-spacing:.04em;line-height:1;}\n.tc-stat .v small{font-family:var(--font-mono);font-size:9px;color:var(--ink-faint);letter-spacing:.05em;}\n\n/* Card mini-map */\n.tc-minimap{\n  margin-top:6px;padding:10px;background:oklch(0 0 0/0.4);border:1px solid oklch(1 0 0/0.05);\n  position:relative;overflow:hidden;\n}\n.tc-minimap-lbl{font-family:var(--font-mono);font-size:7px;letter-spacing:.25em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px;}\n.tc-minimap svg{width:100%;height:50px;display:block;}\n.tc-minimap circle.owned{fill:var(--cc);opacity:.95;}\n.tc-minimap circle.legal{fill:none;stroke:var(--cc);stroke-width:1.4;opacity:.85;}\n.tc-minimap circle.locked{fill:oklch(0.30 0.04 270);stroke:none;opacity:.65;}\n.tc-minimap line.conn{stroke:color-mix(in oklch,var(--cc) 35%,transparent);stroke-width:1;}\n.tc-minimap line.conn.owned{stroke:var(--cc);stroke-width:1.4;}\n\n/* Card hover edge tracing — hidden by default, only paints corner traces on hover */\n.tc-trace{\n  position:absolute;inset:0;pointer-events:none;\n  opacity:0;transition:opacity .25s;\n  background:\n    linear-gradient(90deg, var(--cc), transparent 30%, transparent 70%, var(--cc)) top/100% 1px no-repeat,\n    linear-gradient(180deg, var(--cc), transparent 30%, transparent 70%, var(--cc)) right/1px 100% no-repeat,\n    linear-gradient(-90deg, var(--cc), transparent 30%, transparent 70%, var(--cc)) bottom/100% 1px no-repeat,\n    linear-gradient(0deg, var(--cc), transparent 30%, transparent 70%, var(--cc)) left/1px 100% no-repeat;\n}\n.tcard:hover .tc-trace{\n  opacity:.85;\n  animation:traceShimmer calc(1.6s/var(--anim)) ease-in-out infinite;\n}\n@keyframes traceShimmer{0%,100%{opacity:.45;}50%{opacity:.95;}}\n\n/* Open card CTA */\n.tc-cta{\n  display:flex;align-items:center;justify-content:space-between;\n  padding:9px 14px;border-top:1px solid oklch(1 0 0/0.06);\n  background:color-mix(in oklch, var(--cc) 6%, transparent);\n  font-family:var(--font-mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase;\n  color:var(--cc);transition:all .2s;\n}\n.tcard:hover .tc-cta{background:color-mix(in oklch, var(--cc) 14%, transparent);letter-spacing:.32em;}\n.tc-cta .arr{transition:transform .25s;}\n.tcard:hover .tc-cta .arr{transform:translateX(4px);}\n\n/* ===============================================================\n * TREE DAG VIEW (selected tree)\n * =============================================================== */\n.tree-view{\n  position:relative;min-height:520px;\n  animation:treeIn calc(0.55s/var(--anim)) cubic-bezier(.16,1,.3,1);\n}\n@keyframes treeIn{from{opacity:0;transform:scale(0.96);}to{opacity:1;transform:scale(1);}}\n\n.tv-board{\n  position:relative;width:100%;height:540px;\n  background:\n    radial-gradient(ellipse at 50% 40%, color-mix(in oklch, var(--cc, var(--accent)) 8%, transparent) 0%, transparent 60%),\n    radial-gradient(ellipse at 50% 50%, oklch(0 0 0/0.3), transparent 70%);\n  border:1px solid oklch(1 0 0/0.05);\n  overflow:hidden;\n}\n/* depth grid */\n.tv-board::before{\n  content:'';position:absolute;inset:0;pointer-events:none;opacity:.5;\n  background-image:\n    linear-gradient(to right, oklch(1 0 0/0.025) 1px, transparent 1px),\n    linear-gradient(to bottom, oklch(1 0 0/0.025) 1px, transparent 1px);\n  background-size:48px 48px;\n  mask-image: radial-gradient(ellipse at 50% 50%, black 30%, transparent 80%);\n}\n.tv-board::after{\n  content:'';position:absolute;inset:0;pointer-events:none;\n  background:radial-gradient(ellipse at 50% 50%, transparent 0%, transparent 60%, oklch(0 0 0/0.55) 100%);\n}\n\n/* SVG connections layer */\n.tv-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;overflow:visible;}\n.tv-svg path.conn{\n  fill:none;stroke-width:1.4;\n  stroke:color-mix(in oklch, var(--cc, var(--accent)) 25%, transparent);\n  stroke-dasharray:3 4;\n}\n.tv-svg path.conn.unmet{\n  stroke: color-mix(in oklch, var(--neg) 55%, transparent);\n  stroke-width:1.6;\n  stroke-dasharray:3 5;\n  filter: drop-shadow(0 0 3px color-mix(in oklch, var(--neg) 40%, transparent));\n}\n.tv-svg path.conn.met{\n  stroke:var(--cc, var(--accent));\n  stroke-width:1.8;\n  stroke-dasharray:6 4;\n  animation: flow calc(2s/var(--anim)) linear infinite;\n  filter: drop-shadow(0 0 4px var(--cc, var(--accent)));\n}\n@keyframes flow{from{stroke-dashoffset:0;}to{stroke-dashoffset:-10;}}\n.tv-svg path.conn.highlight{\n  stroke:var(--zero); stroke-width:2.2;\n  stroke-dasharray:4 2;\n  filter: drop-shadow(0 0 6px var(--zero));\n  animation: flow calc(1s/var(--anim)) linear infinite;\n}\n\n/* Talent node */\n.tnode{\n  --node-color: var(--cc, var(--accent));\n  position:absolute;width:88px;\n  display:flex;flex-direction:column;align-items:center;gap:5px;\n  z-index:3;cursor:pointer;\n  transform:translate(-50%,-50%);\n  transition:transform .25s cubic-bezier(.16,1,.3,1), filter .2s;\n}\n.tnode:hover{transform:translate(-50%,-50%) scale(1.07);z-index:5;}\n\n.tnode-orb{\n  position:relative;width:54px;height:54px;\n  background:radial-gradient(circle at 30% 30%, color-mix(in oklch,var(--node-color) 14%,oklch(0.08 0.04 278)) 0%, oklch(0.06 0.03 278) 80%);\n  border:2px solid color-mix(in oklch,var(--node-color) 55%,transparent);\n  border-radius:50%;\n  display:flex;align-items:center;justify-content:center;\n  transition:all .25s;\n}\n.tnode-orb::before{\n  content:'';position:absolute;inset:-4px;border-radius:50%;\n  border:1px solid color-mix(in oklch,var(--node-color) 25%,transparent);\n  opacity:.7;\n}\n.tnode-icon{font-family:var(--font-display);font-size:22px;color:var(--node-color);text-shadow:0 0 8px var(--node-color);}\n.tnode-tier{\n  position:absolute;top:-6px;right:-6px;\n  width:18px;height:18px;border-radius:50%;\n  background:color-mix(in oklch,var(--node-color) 30%,oklch(0.06 0.03 278));\n  border:1px solid var(--node-color);\n  font-family:var(--font-mono);font-size:9px;color:var(--node-color);\n  display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1;\n}\n\n/* States: owned, legal, locked, pending, hovered */\n/* OWNED — green, with bright pulse */\n.tnode.owned .tnode-orb{\n  background:radial-gradient(circle at 30% 30%, color-mix(in oklch, var(--pos) 50%, oklch(0.10 0.04 278)) 0%, color-mix(in oklch, var(--pos) 12%, oklch(0.08 0.03 278)) 80%);\n  border-color:var(--pos);\n  box-shadow:\n    0 0 20px color-mix(in oklch,var(--pos) 55%,transparent),\n    inset 0 0 14px color-mix(in oklch,var(--pos) 25%,transparent);\n}\n.tnode.owned .tnode-icon{color:var(--ink);text-shadow:0 0 12px var(--pos);}\n.tnode.owned .tnode-tier{background:color-mix(in oklch,var(--pos) 30%,oklch(0.06 0.03 278));border-color:var(--pos);color:var(--pos);}\n.tnode.owned .tnode-orb::after{\n  content:'';position:absolute;inset:0;border-radius:50%;\n  animation:ownedPulse calc(2.4s/var(--anim)) ease-in-out infinite;\n}\n@keyframes ownedPulse{\n  0%,100%{box-shadow:0 0 0 0 color-mix(in oklch,var(--pos) 60%,transparent);}\n  50%{box-shadow:0 0 0 10px color-mix(in oklch,var(--pos) 0%,transparent);}\n}\n\n.tnode.legal .tnode-orb{\n  border-color:var(--node-color);\n  box-shadow:0 0 14px color-mix(in oklch,var(--node-color) 30%,transparent);\n}\n.tnode.legal .tnode-orb::after{\n  content:'';position:absolute;inset:-6px;border-radius:50%;\n  border:1px dashed var(--node-color);\n  animation:legalSpin calc(8s/var(--anim)) linear infinite, legalFade calc(2.2s/var(--anim)) ease-in-out infinite;\n}\n@keyframes legalSpin{to{transform:rotate(360deg);}}\n@keyframes legalFade{0%,100%{opacity:.4;}50%{opacity:.9;}}\n\n/* LOCKED — red, prereqs not met */\n.tnode.locked .tnode-orb{\n  background:radial-gradient(circle at 30% 30%, color-mix(in oklch,var(--neg) 12%,oklch(0.08 0.02 270)) 0%, oklch(0.08 0.02 270) 80%);\n  border-color:color-mix(in oklch, var(--neg) 60%, transparent);\n  box-shadow:0 0 10px color-mix(in oklch,var(--neg) 25%,transparent);\n}\n.tnode.locked .tnode-icon{color:color-mix(in oklch,var(--neg) 70%,var(--ink-faint));text-shadow:0 0 6px color-mix(in oklch,var(--neg) 35%,transparent);}\n.tnode.locked .tnode-tier{background:oklch(0.08 0.02 270);border-color:color-mix(in oklch,var(--neg) 50%,transparent);color:color-mix(in oklch,var(--neg) 70%,var(--ink-faint));}\n.tnode.locked .tnode-orb::before{\n  content:'';position:absolute;inset:-4px;border-radius:50%;\n  border:1px dashed color-mix(in oklch,var(--neg) 35%,transparent);\n  opacity:.7;\n}\n\n.tnode.pending .tnode-orb{\n  border-color:var(--zero);\n  background:radial-gradient(circle at 30% 30%, oklch(0.88 0.17 95/0.3) 0%, color-mix(in oklch,var(--node-color) 10%,oklch(0.08 0.03 278)) 80%);\n  box-shadow:0 0 22px oklch(0.88 0.17 95/0.5);\n  animation:pendingNode calc(1.6s/var(--anim)) ease-in-out infinite;\n}\n@keyframes pendingNode{0%,100%{box-shadow:0 0 22px oklch(0.88 0.17 95/0.5);}50%{box-shadow:0 0 36px oklch(0.88 0.17 95/0.7),0 0 50px oklch(0.88 0.17 95/0.3);}}\n.tnode.pending .tnode-icon{color:var(--zero);text-shadow:0 0 14px var(--zero);}\n.tnode.pending .tnode-tier{background:var(--zero);color:#050510;border-color:var(--zero);}\n\n.tnode.hovered .tnode-orb{\n  border-color:var(--zero);\n  box-shadow:0 0 24px var(--zero), 0 0 50px oklch(0.88 0.17 95/0.4);\n  animation: hoverPulse calc(1.6s/var(--anim)) ease-in-out infinite;\n}\n@keyframes hoverPulse{\n  0%,100%{box-shadow:0 0 22px var(--zero), 0 0 40px oklch(0.88 0.17 95/0.3);}\n  50%{box-shadow:0 0 32px var(--zero), 0 0 70px oklch(0.88 0.17 95/0.6);}\n}\n.tnode.hovered .tnode-icon{color:var(--zero);text-shadow:0 0 14px var(--zero);}\n\n.tnode.upstream .tnode-orb{\n  border-color:var(--zero);\n  box-shadow:0 0 18px oklch(0.88 0.17 95/0.5);\n  animation: upstreamPulse calc(2s/var(--anim)) ease-in-out infinite;\n}\n@keyframes upstreamPulse{\n  0%,100%{box-shadow:0 0 14px oklch(0.88 0.17 95/0.4);}\n  50%{box-shadow:0 0 22px oklch(0.88 0.17 95/0.7);}\n}\n\n.tnode.downstream .tnode-orb{\n  border-color:color-mix(in oklch, var(--node-color) 70%, var(--zero));\n  box-shadow:0 0 14px color-mix(in oklch, var(--node-color) 60%, transparent);\n  animation: downstreamPulse calc(2.4s/var(--anim)) ease-in-out infinite;\n}\n@keyframes downstreamPulse{\n  0%,100%{box-shadow:0 0 10px color-mix(in oklch, var(--node-color) 55%, transparent);}\n  50%{box-shadow:0 0 20px color-mix(in oklch, var(--node-color) 75%, transparent);}\n}\n\n.tnode-label{\n  font-family:var(--font-mono);font-size:8.5px;letter-spacing:.06em;text-align:center;\n  color:var(--ink);line-height:1.2;text-transform:uppercase;font-weight:500;\n  max-width:96px;text-wrap:balance;\n  text-shadow:0 0 6px oklch(0.05 0.03 278);\n}\n.tnode.locked .tnode-label{color:var(--ink-faint);}\n\n/* Selection ripple effect (transient on click) */\n.tnode-ripple{\n  position:absolute;top:27px;left:50%;transform:translateX(-50%);\n  width:54px;height:54px;border-radius:50%;\n  border:2px solid var(--zero);pointer-events:none;\n  animation:ripple calc(.8s/var(--anim)) ease-out forwards;\n}\n@keyframes ripple{from{transform:translateX(-50%) scale(1);opacity:.8;}to{transform:translateX(-50%) scale(2.4);opacity:0;}}\n\n/* Legend (bottom of tree) */\n.tv-legend{\n  display:flex;gap:14px;justify-content:center;align-items:center;flex-wrap:wrap;\n  margin-top:10px;padding:8px 14px;\n  font-family:var(--font-mono);font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);\n  background:oklch(0 0 0/0.3);border:1px solid oklch(1 0 0/0.05);\n}\n.tv-leg-item{display:inline-flex;align-items:center;gap:5px;}\n.tv-leg-dot{width:8px;height:8px;border-radius:50%;}\n.tv-leg-dot.owned{background:var(--pos);box-shadow:0 0 6px var(--pos);}\n.tv-leg-dot.legal{border:1.5px dashed var(--cc, var(--accent));background:transparent;}\n.tv-leg-dot.locked{background:color-mix(in oklch, var(--neg) 70%, oklch(0.08 0.02 270));box-shadow:0 0 5px color-mix(in oklch, var(--neg) 40%, transparent);}\n.tv-leg-dot.pending{background:var(--zero);box-shadow:0 0 6px var(--zero);}\n\n/* ===============================================================\n * GLOBAL ANIMATIONS / MOTION\n * =============================================================== */\n@media (prefers-reduced-motion: reduce) {\n  :root{--anim:0.001;}\n  *,*::before,*::after{animation-duration:.001s!important;transition-duration:.001s!important;}\n}\n\n::-webkit-scrollbar{width:6px;height:6px;}\n::-webkit-scrollbar-track{background:oklch(0 0 0/0.3);}\n::-webkit-scrollbar-thumb{background:oklch(0.85 0.18 200/0.25);}\n::-webkit-scrollbar-thumb:hover{background:oklch(0.85 0.18 200/0.5);}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"stage\"><div class=\"datapad\">\n  <div class=\"rivet tl\"><\u002Fdiv><div class=\"rivet tr\"><\u002Fdiv><div class=\"rivet bl\"><\u002Fdiv><div class=\"rivet br\"><\u002Fdiv>\n  <div class=\"bezel-label\">DATAPAD // MK-VII · NEURAL-LINK READY<\u002Fdiv>\n  <div class=\"bezel-serial\">SN 4471-ΘΞΛ-00827<\u002Fdiv>\n\n  <div class=\"screen\">\n    <!-- HUD -->\n    <div class=\"hud\">\n      <div class=\"hud-l\">\n        <span class=\"pill\"><span class=\"dot\"><\u002Fspan>LINK<\u002Fspan>\n        <span class=\"pill\"><span class=\"dot warn\"><\u002Fspan>ARCHIVE<\u002Fspan>\n        <span>ENC · AES-2048<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"hud-title\">PROGRESSION ENGINE<\u002Fdiv>\n      <div class=\"hud-r\">\n        <span>SESSION CGN-09823<\u002Fspan>\n        <span class=\"pill\"><span class=\"dot hot\"><\u002Fspan><span id=\"clock\">00:00 UTC<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- MENTOR RAIL -->\n    <div class=\"mentor-rail\" id=\"mentor-rail\" data-screen-label=\"Mentor Rail\">\n      <div class=\"mentor-portrait\">\n        <svg viewBox=\"0 0 100 100\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\">\n          <circle cx=\"50\" cy=\"34\" r=\"16\"><\u002Fcircle>\n          <path d=\"M22 88 Q22 58 50 58 Q78 58 78 88\"><\u002Fpath>\n          <path d=\"M14 50 L86 50\" stroke-dasharray=\"2 4\" opacity=\"0.4\"><\u002Fpath>\n          <path d=\"M50 8 L50 96\" stroke-dasharray=\"2 4\" opacity=\"0.4\"><\u002Fpath>\n          <circle cx=\"50\" cy=\"50\" r=\"40\" opacity=\"0.3\"><\u002Fcircle>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"mentor-tex
