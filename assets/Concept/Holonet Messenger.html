<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Holocom — Messenger + Job Board</title>
<meta name="viewport" content="width=1440"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<template id="__bundler_thumbnail" data-bg-color="#05050a">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#05050a"/>
    <rect x="60" y="60" width="320" height="680" rx="8" fill="#0d0c15" stroke="#7fdfe644" stroke-width="1"/>
    <rect x="400" y="60" width="580" height="680" rx="8" fill="#0d0c15" stroke="#7fdfe622" stroke-width="1"/>
    <rect x="1000" y="60" width="140" height="680" rx="8" fill="#0d0c15" stroke="#7fdfe622" stroke-width="1"/>
    <text x="600" y="420" text-anchor="middle" font-family="monospace" font-size="48" fill="#7fdfe6" opacity=".3">✉</text>
  </svg>
</template>
<style>
/* ── Reset + Tokens ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#05050a;color:var(--ink);font-family:var(--font-body);overflow-x:hidden}
:root{
  --accent:oklch(.82 .17 190);--accent-dim:oklch(.32 .08 190);
  --bg:oklch(.10 .03 285);--screen:oklch(.13 .055 278);--screen-2:oklch(.18 .07 272);
  --ink:oklch(.94 .04 190);--ink-dim:oklch(.72 .06 190);--ink-faint:oklch(.50 .05 190);
  --pos:oklch(.82 .19 145);--neg:oklch(.70 .22 25);--zero:oklch(.88 .17 95);
  --f-jedi:oklch(.78 .18 220);--f-noble-r:oklch(.82 .16 80);--f-noble-c:oklch(.66 .14 165);
  --f-sith:oklch(.65 .27 22);--f-mil:oklch(.78 .16 75);--f-scout:oklch(.74 .16 55);
  --f-crim:oklch(.66 .14 170);--f-jedi-2:oklch(.66 .16 215);
  --font-body:'Space Grotesk',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  --font-display:'VT323',monospace;
  --font-syne:'Syne',sans-serif;
}
body::before{content:'';position:fixed;inset:0;z-index:-2;background:
  radial-gradient(ellipse at 28% 18%,oklch(.18 .10 320/.55),transparent 55%),
  radial-gradient(ellipse at 82% 88%,oklch(.18 .10 200/.50),transparent 55%),
  linear-gradient(180deg,#060612 0%,#020205 100%)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:-1;
  background-image:linear-gradient(to right,oklch(1 0 0/.015) 1px,transparent 1px),
    linear-gradient(to bottom,oklch(1 0 0/.015) 1px,transparent 1px);
  background-size:48px 48px}

/* ── Datapad Chrome ── */
.stage{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:28px 16px}
.datapad{width:min(1440px,100%);position:relative;padding:18px 18px 16px;
  background:linear-gradient(180deg,#1a1923 0%,#0d0c15 50%,#080810 100%);
  clip-path:polygon(0 22px,22px 0,calc(100% - 60px) 0,calc(100% - 44px) 16px,calc(100% - 22px) 16px,100% 38px,100% calc(100% - 22px),calc(100% - 22px) 100%,22px 100%,0 calc(100% - 22px));
  box-shadow:inset 0 1px 0 oklch(1 0 0/.06),inset 0 0 0 1px oklch(0 0 0/.6),0 40px 80px oklch(0 0 0/.8),0 0 100px oklch(.82 .17 190/.10)}
.rivet{position:absolute;width:5px;height:5px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#5a5a6e,#1a1a22 70%)}
.rivet.tl{top:9px;left:14px}.rivet.tr{top:9px;right:14px}.rivet.bl{bottom:9px;left:14px}.rivet.br{bottom:9px;right:14px}
.bezel-label{position:absolute;top:3px;left:50px;font-family:var(--font-mono);font-size:9px;letter-spacing:.32em;color:oklch(.42 .03 260);text-transform:uppercase}
.bezel-serial{position:absolute;top:3px;right:80px;font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;color:oklch(.42 .03 260)}
.screen{position:relative;height:calc(100vh - 90px);min-height:640px;
  background:radial-gradient(ellipse at 28% 8%,var(--screen-2),var(--screen) 50%,oklch(.07 .04 278));
  border:1px solid oklch(.3 .04 260/.6);border-radius:8px;padding:12px;
  overflow:hidden;display:flex;flex-direction:column}
.screen::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:5;
  background:repeating-linear-gradient(0deg,transparent 0 3px,oklch(1 0 0/.022) 3px 4px)}

/* ── HUD ── */
.hud{display:flex;align-items:center;justify-content:space-between;padding:4px 10px 10px;
  border-bottom:1px solid oklch(.85 .18 200/.18);margin-bottom:10px;flex-shrink:0}
.hud-l,.hud-r{display:flex;gap:12px;align-items:center}
.hud-title{font-family:var(--font-display);font-size:20px;letter-spacing:.36em;color:var(--accent);text-shadow:0 0 14px oklch(.85 .18 200/.5)}
.hud-pill{display:inline-flex;gap:6px;align-items:center;font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint)}
.hud-dot{width:6px;height:6px;border-radius:50%;background:var(--pos);box-shadow:0 0 6px var(--pos);animation:pulse 1.4s ease-in-out infinite;flex-shrink:0}
.hud-dot.gm{background:var(--f-noble-r);box-shadow:0 0 6px var(--f-noble-r)}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ── View-as toggle ── */
.viewas{display:inline-flex;border:1px solid oklch(.85 .18 200/.2);overflow:hidden}
.viewas button{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  padding:6px 14px;background:transparent;color:var(--ink-faint);border:0;cursor:pointer;transition:all .15s}
.viewas button.on{color:var(--accent);background:oklch(.85 .18 200/.14)}
.viewas button.on.gm{color:var(--f-noble-r);background:oklch(.82 .16 80/.14)}

/* ── Shell layout ── */
.shell{display:grid;grid-template-columns:56px 1fr;gap:10px;flex:1;min-height:0}

/* ── App rail ── */
.applist{display:flex;flex-direction:column;gap:6px;background:oklch(0 0 0/.3);
  border:1px solid oklch(.85 .18 200/.12);border-radius:6px;padding:8px 5px}
.appbtn{position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;
  border:1px solid transparent;background:transparent;color:var(--ink-faint);
  font-family:var(--font-mono);font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;
  cursor:pointer;transition:all .15s;border-radius:5px}
.appbtn .ic{font-family:var(--font-display);font-size:22px;line-height:1}
.appbtn:hover{color:var(--accent);background:oklch(.85 .18 200/.06)}
.appbtn.on{color:var(--accent);background:oklch(.85 .18 200/.12);border-color:oklch(.85 .18 200/.28);
  box-shadow:inset 0 0 14px oklch(.85 .18 200/.15)}
.appbtn .pip{position:absolute;top:5px;right:5px;min-width:14px;height:14px;padding:0 3px;
  border-radius:7px;background:var(--accent);color:#0c0c14;font-family:var(--font-mono);
  font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:700}

/* ── Main area ── */
.main-area{min-height:0;height:100%;overflow:hidden}

/* ── Messenger Surface ── */
.ms-root{display:grid;grid-template-columns:268px 1fr;gap:10px;height:100%;min-height:0}
.ms-root.info-open{grid-template-columns:268px 1fr 288px}

/* ── Thread List ── */
.hl-tlist{display:flex;flex-direction:column;height:100%;min-height:0;
  background:oklch(0 0 0/.28);border:1px solid oklch(.85 .18 200/.13);border-radius:8px;overflow:hidden}
.hl-tlist-top{padding:12px 12px 10px;border-bottom:1px solid oklch(.85 .18 200/.12);flex-shrink:0}
.hl-tlist-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hl-tlist-scroll{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:oklch(.85 .18 200/.2) transparent}
.hl-cat{margin-bottom:10px}
.hl-cat-label{font-family:var(--font-mono);font-size:8px;letter-spacing:.3em;text-transform:uppercase;
  color:var(--ink-faint);padding:2px 4px;margin-bottom:4px}
.hl-titem{display:grid;grid-template-columns:22px 1fr;gap:8px;align-items:start;width:100%;
  padding:9px 10px;background:oklch(0 0 0/.2);border:1px solid oklch(.85 .18 200/.1);
  border-radius:10px;text-align:left;color:var(--ink);cursor:pointer;margin-bottom:5px;
  transition:all .18s;position:relative;overflow:hidden}
.hl-titem::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,oklch(.85 .18 200/.08),transparent);transform:translateX(-120%);transition:transform .4s;pointer-events:none}
.hl-titem:hover{border-color:oklch(.85 .18 200/.36);background:oklch(.85 .18 200/.07);transform:translateY(-1px);box-shadow:0 4px 14px oklch(0 0 0/.3)}
.hl-titem:hover::after{transform:translateX(120%)}
.hl-titem.on{border-color:oklch(.85 .18 200/.5);background:linear-gradient(135deg,oklch(.85 .18 200/.12),oklch(.85 .18 200/.04));box-shadow:0 0 18px oklch(.85 .18 200/.14),inset 3px 0 0 var(--accent)}
.hl-titem.gm-priv{border-color:oklch(.82 .16 80/.3);box-shadow:inset 3px 0 0 var(--f-noble-r)}
.hl-titem-icon{font-family:var(--font-display);font-size:16px;color:var(--ink-faint);line-height:1.4;text-align:center}
.hl-titem.on .hl-titem-icon{color:var(--accent)}
.hl-titem-body{min-width:0;display:flex;flex-direction:column;gap:3px}
.hl-titem-top{display:flex;justify-content:space-between;align-items:center;gap:6px}
.hl-titem-title{font-family:var(--font-body);font-size:12.5px;font-weight:600;color:var(--ink);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hl-titem-right{display:flex;gap:5px;align-items:center;flex-shrink:0}
.hl-titem-time{font-family:var(--font-mono);font-size:8.5px;color:var(--ink-faint)}
.hl-titem-preview{font-size:11px;color:var(--ink-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.hl-titem-chips{display:flex;gap:4px;flex-wrap:wrap}

/* ── Invite card ── */
.hl-invite{background:oklch(0 0 0/.35);border:1px solid oklch(.88 .17 95/.45);border-radius:12px;
  padding:12px;margin-bottom:10px;animation:invitePulse 2.2s ease-in-out infinite}
@keyframes invitePulse{0%,100%{box-shadow:0 0 0 0 oklch(.88 .17 95/.2)}50%{box-shadow:0 0 0 5px oklch(.88 .17 95/.06)}}
.hl-invite-badge{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.hl-pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--zero);box-shadow:0 0 8px var(--zero);animation:pulse 1.2s ease-in-out infinite;flex-shrink:0}
.hl-invite-from{display:flex;align-items:center;gap:8px;margin-bottom:6px}

/* ── Search ── */
.hl-search-wrap{position:relative}
.hl-search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-family:var(--font-display);font-size:13px;pointer-events:none}
.hl-search{width:100%;padding:7px 10px 7px 28px;background:oklch(0 0 0/.35);border:1px solid oklch(.85 .18 200/.18);color:var(--ink);font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;border-radius:6px;outline:none}
.hl-search:focus{border-color:var(--accent);box-shadow:0 0 10px oklch(.85 .18 200/.2)}

/* ── Conversation ── */
.hl-conv{display:flex;flex-direction:column;height:100%;min-height:0;
  background:oklch(0 0 0/.22);border:1px solid oklch(.85 .18 200/.12);border-radius:8px;overflow:hidden}
.hl-conv.terminal{font-family:var(--font-mono)}
.hl-conv-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.hl-conv-header{padding:12px 14px;border-bottom:1px solid oklch(.85 .18 200/.14);flex-shrink:0;
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
  background:linear-gradient(135deg,oklch(.85 .18 200/.06),transparent)}
.hl-conv-header-left{min-width:0}
.hl-messages{flex:1;overflow-y:auto;padding:14px 14px 10px;display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:oklch(.85 .18 200/.2) transparent}

/* ── Message bubbles ── */
.hl-msg{display:flex;gap:9px;align-items:flex-end;max-width:100%}
.hl-msg.own{flex-direction:row-reverse;margin-left:14%}
.hl-msg-bubble{padding:9px 12px;border-radius:16px;border:1px solid oklch(.85 .18 200/.13);
  background:linear-gradient(135deg,oklch(.19 .035 275/.9),oklch(.10 .02 280/.8));
  max-width:100%;word-break:break-word;line-height:1.5;font-size:13px}
.hl-msg.own .hl-msg-bubble{border-radius:16px 16px 4px 16px}
.hl-msg:not(.own) .hl-msg-bubble{border-radius:16px 16px 16px 4px}
.hl-msg-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.hl-msg-text{color:var(--ink);line-height:1.5;font-size:13px}

/* Terminal style messages */
.hl-msg.terminal{flex-direction:column;gap:2px}
.hl-msg-term-meta{font-size:10px;letter-spacing:.1em;color:var(--ink-faint);margin-bottom:2px}
.hl-msg-term-body{font-size:12px;color:var(--ink);padding-left:8px;border-left:2px solid oklch(.85 .18 200/.3)}

/* System / pin messages */
.hl-sys-msg{display:flex;align-items:center;gap:0;margin:4px 0}
.hl-sys-line{flex:1;height:1px;background:oklch(.85 .18 200/.1)}
.hl-pin-msg{display:flex;align-items:center;gap:8px;padding:6px 12px;
  background:oklch(.88 .17 95/.06);border:1px solid oklch(.88 .17 95/.2);
  border-radius:8px;margin:2px 0}

/* Credit card */
.hl-credit-card{position:relative;background:linear-gradient(135deg,oklch(.82 .19 145/.12),oklch(0 0 0/.3));
  border:1px solid oklch(.82 .19 145/.35);border-radius:12px;padding:14px;overflow:hidden}
.hl-credit-card-shimmer{position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,oklch(.82 .19 145/.15) 50%,transparent 70%);
  transform:translateX(-100%);animation:shimmer .8s ease forwards;pointer-events:none}
@keyframes shimmer{to{transform:translateX(200%)}}

/* Attach card */
.hl-attach-card{background:oklch(0 0 0/.3);border:1px solid var(--accent, oklch(.85 .18 200/.2));
  border-radius:12px;padding:11px;flex:1;min-width:0}

/* Job embed */
.hl-job-embed{background:linear-gradient(135deg,oklch(.82 .16 80/.08),oklch(0 0 0/.3));
  border:1px solid oklch(.82 .16 80/.3);border-radius:12px;padding:12px;width:100%;max-width:480px}

/* ── Composer ── */
.hl-composer{padding:10px 12px 12px;border-top:1px solid oklch(.85 .18 200/.14);
  background:oklch(0 0 0/.2);flex-shrink:0}
.hl-persona-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;
  padding:5px 8px;background:oklch(.82 .16 80/.08);border:1px solid oklch(.82 .16 80/.2);border-radius:7px}
.hl-persona-select{flex:1;background:transparent;border:0;color:var(--f-noble-r);
  font-family:var(--font-mono);font-size:11px;cursor:pointer;outline:none}
.hl-composer-input-row{display:flex;gap:8px;align-items:flex-end}
.hl-composer-ta{flex:1;background:oklch(0 0 0/.35);border:1px solid oklch(.85 .18 200/.2);color:var(--ink);
  padding:9px 12px;border-radius:10px;font-family:var(--font-body);font-size:13px;resize:none;outline:none;
  line-height:1.4;min-height:54px;max-height:120px;transition:border-color .15s}
.hl-composer-ta:focus{border-color:oklch(.85 .18 200/.45);box-shadow:0 0 12px oklch(.85 .18 200/.15)}
.hl-attach-preview{display:flex;align-items:center;gap:8px;padding:6px 10px;
  background:oklch(.85 .18 200/.08);border:1px solid oklch(.85 .18 200/.2);border-radius:8px;margin-bottom:7px;font-family:var(--font-mono);font-size:11px}
.hl-attach-btn{width:38px;height:38px;border-radius:10px;border:1px solid oklch(.85 .18 200/.22);
  background:oklch(.85 .18 200/.08);color:var(--accent);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.hl-attach-btn:hover{background:oklch(.85 .18 200/.18);border-color:oklch(.85 .18 200/.45)}
.hl-send-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;
  border:1px solid oklch(.85 .18 200/.38);background:linear-gradient(135deg,oklch(.85 .18 200/.18),oklch(.85 .18 200/.08));
  color:var(--accent);font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;
  cursor:pointer;flex-shrink:0;transition:all .15s;white-space:nowrap;height:38px}
.hl-send-btn:hover:not(:disabled){background:linear-gradient(135deg,oklch(.85 .18 200/.28),oklch(.85 .18 200/.14));box-shadow:0 0 16px oklch(.85 .18 200/.2)}
.hl-send-btn:disabled{opacity:.45;cursor:default}
.hl-attach-menu{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-top:8px;
  padding:8px;background:oklch(0 0 0/.4);border:1px solid oklch(.85 .18 200/.14);border-radius:10px}
.hl-attach-opt{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;
  background:oklch(.85 .18 200/.06);border:1px solid oklch(.85 .18 200/.12);border-radius:8px;
  cursor:pointer;color:var(--ink-dim);font-family:var(--font-mono);font-size:8px;
  letter-spacing:.1em;text-transform:uppercase;transition:all .15s}
.hl-attach-opt:hover{background:oklch(.85 .18 200/.14);color:var(--accent);border-color:oklch(.85 .18 200/.38)}
.hl-attach-opt-icon{font-family:var(--font-display);font-size:20px;color:var(--accent);line-height:1}

/* ── Thread Info Panel ── */
.hl-info-panel,.hl-gm-panel{display:flex;flex-direction:column;gap:0;height:100%;
  background:oklch(0 0 0/.3);border:1px solid oklch(.85 .18 200/.14);border-radius:8px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:oklch(.85 .18 200/.18) transparent}
.hl-gm-panel{border-color:oklch(.82 .16 80/.25)}
.hl-info-header{display:flex;justify-content:space-between;align-items:center;
  padding:12px 14px;border-bottom:1px solid oklch(.85 .18 200/.12);flex-shrink:0}
.hl-gm-panel .hl-info-header{border-color:oklch(.82 .16 80/.2)}
.hl-info-section{padding:12px 14px;border-bottom:1px solid oklch(.85 .18 200/.08)}
.hl-gm-panel .hl-info-section{border-color:oklch(.82 .16 80/.1)}
.hl-info-label{font-family:var(--font-mono);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--accent);margin-bottom:8px}
.hl-info-person{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid oklch(.85 .18 200/.07)}
.hl-info-person:last-of-type{border-bottom:0}
.hl-radio-row{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;font-size:12px}
.hl-radio-row input{accent-color:var(--accent)}
.hl-action-btn{width:100%;padding:8px 10px;background:oklch(0 0 0/.3);border:1px solid oklch(.85 .18 200/.15);
  color:var(--ink-dim);font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;text-align:left;border-radius:7px;transition:all .15s;margin-bottom:5px}
.hl-action-btn:hover{border-color:oklch(.85 .18 200/.35);color:var(--ink)}
.hl-action-btn.warn{color:var(--neg);border-color:oklch(.70 .22 25/.2)}
.hl-action-btn.warn:hover{background:oklch(.70 .22 25/.08)}
.hl-action-btn.gm{color:var(--f-noble-r);border-color:oklch(.82 .16 80/.2)}
.hl-action-btn.gm:hover{background:oklch(.82 .16 80/.08)}

/* ── Avatar ── */
.hl-avatar{border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── Shared chips + buttons ── */
.hl-badge{min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--accent);
  color:#0c0c14;font-family:var(--font-mono);font-size:9px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center}
.hl-chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;
  border:1px solid oklch(.85 .18 200/.2);color:var(--ink-faint);font-family:var(--font-mono);
  font-size:8px;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}
.hl-chip.party{color:oklch(.82 .14 205);border-color:oklch(.82 .14 205/.28)}
.hl-chip.gm-vis{color:oklch(.82 .12 90);border-color:oklch(.82 .12 90/.28)}
.hl-chip.warn{color:var(--neg);border-color:oklch(.70 .22 25/.35)}
.hl-chip.locked{color:var(--ink-faint);border-color:oklch(.5 .05 190/.2)}
.hl-chip.muted{color:oklch(.5 .04 260);border-color:oklch(.5 .04 260/.2)}
.hl-label{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-dim)}
.hl-label.accent{color:var(--accent)}
.hl-ghost-btn{background:oklch(.85 .18 200/.07);border:1px solid oklch(.85 .18 200/.2);color:var(--accent);
  font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  padding:5px 10px;cursor:pointer;border-radius:7px;transition:all .15s;white-space:nowrap}
.hl-ghost-btn:hover,.hl-ghost-btn.on{background:oklch(.85 .18 200/.16);border-color:oklch(.85 .18 200/.45)}
.hl-btn-accent{background:linear-gradient(135deg,oklch(.85 .18 200/.22),oklch(.85 .18 200/.1));
  border:1px solid oklch(.85 .18 200/.45);color:var(--accent);font-family:var(--font-mono);
  font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:8px 14px;
  cursor:pointer;border-radius:9px;box-shadow:0 0 18px oklch(.85 .18 200/.1);transition:all .15s;white-space:nowrap}
.hl-btn-accent:hover{box-shadow:0 0 24px oklch(.85 .18 200/.2);border-color:oklch(.85 .18 200/.65)}
.hl-btn-accent:disabled{opacity:.4;cursor:default}
.hl-icon-btn{background:oklch(0 0 0/.3);border:1px solid oklch(.85 .18 200/.18);color:var(--ink-faint);
  font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  padding:6px 10px;cursor:pointer;border-radius:7px;transition:all .15s;white-space:nowrap}
.hl-icon-btn:hover,.hl-icon-btn.on{color:var(--accent);border-color:oklch(.85 .18 200/.38);background:oklch(.85 .18 200/.08)}
.hl-icon-btn.red{color:var(--neg);border-color:oklch(.70 .22 25/.3)}
.hl-icon-btn.red:hover{background:oklch(.70 .22 25/.1)}
.hl-select,.hl-input{width:100%;background:oklch(0 0 0/.38);border:1px solid oklch(.85 .18 200/.2);
  color:var(--ink);font-family:var(--font-mono);font-size:11px;padding:8px 10px;border-radius:7px;outline:none}
.hl-select:focus,.hl-input:focus{border-color:var(--accent)}
.hl-select option{background:#0d0c15}
.hl-viewas{display:inline-flex;border:1px solid oklch(.85 .18 200/.2);border-radius:7px;overflow:hidden}
.hl-viewas button{font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  padding:6px 11px;background:transparent;color:var(--ink-faint);border:0;cursor:pointer;transition:all .15s}
.hl-viewas button.on{color:var(--accent);background:oklch(.85 .18 200/.14)}

/* ── New thread modal ── */
.hl-modal-bg{position:fixed;inset:0;background:oklch(0 0 0/.7);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.hl-modal{background:linear-gradient(160deg,#1a1923,#0d0c15);border:1px solid oklch(.85 .18 200/.3);
  border-radius:14px;padding:18px;width:min(520px,92vw);max-height:80vh;overflow-y:auto;
  box-shadow:0 40px 80px oklch(0 0 0/.6),0 0 50px oklch(.85 .18 200/.1)}
.hl-recipient-row{display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:oklch(0 0 0/.2);border:1px solid oklch(.85 .18 200/.1);border-radius:10px;
  cursor:pointer;transition:all .15s}
.hl-recipient-row.on{border-color:oklch(.85 .18 200/.42);background:oklch(.85 .18 200/.08)}

/* ── Hijack overlay ── */
.hl-hijack-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
  background:oklch(.10 .05 20/.95);animation:hijackFlash .4s ease}
@keyframes hijackFlash{0%{opacity:0;filter:saturate(0)}30%{opacity:1;filter:saturate(2) brightness(1.5)}100%{opacity:1;filter:none}}
.hl-hijack-content{text-align:center;padding:40px}
.hl-hijack-glitch{font-family:var(--font-display);font-size:52px;letter-spacing:.3em;color:var(--neg);
  text-shadow:0 0 30px var(--neg),2px 0 var(--accent),-2px 0 var(--f-noble-r);
  animation:glitch 1.2s ease-in-out infinite}
@keyframes glitch{0%,100%{text-shadow:0 0 30px var(--neg),2px 0 var(--accent),-2px 0 var(--f-noble-r)}
  25%{text-shadow:0 0 30px var(--neg),-3px 0 var(--accent),3px 0 var(--f-noble-r)}
  50%{text-shadow:0 0 50px var(--neg),0 0 var(--accent),0 0 var(--f-noble-r)}
  75%{text-shadow:0 0 30px var(--neg),4px 0 var(--accent),-4px 0 var(--f-noble-r)}}

/* ── Job Board ── */
.jb-root{display:flex;flex-direction:column;height:100%;min-height:0}
.jb-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;
  padding:0 2px 10px;border-bottom:1px solid oklch(.85 .18 200/.14);margin-bottom:10px;flex-shrink:0;flex-wrap:wrap}
.jb-toolbar-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.jb-title{display:flex;align-items:center}
.jb-filters{display:flex;gap:5px}
.jb-filter{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  padding:5px 11px;background:oklch(0 0 0/.3);border:1px solid oklch(.85 .18 200/.15);
  color:var(--ink-faint);border-radius:6px;cursor:pointer;transition:all .15s}
.jb-filter.on{color:var(--accent);background:oklch(.85 .18 200/.12);border-color:oklch(.85 .18 200/.38)}
.jb-content{flex:1;display:grid;grid-template-columns:1fr;gap:10px;min-height:0;overflow:hidden}
.jb-content.has-detail{grid-template-columns:1fr 320px}
.jb-cards{overflow-y:auto;padding-right:4px;scrollbar-width:thin;scrollbar-color:oklch(.85 .18 200/.2) transparent}
.jb-cards.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;align-content:start}
.jb-cards.list{display:flex;flex-direction:column;gap:6px}

/* Card - grid */
.jb-card{text-align:left;background:linear-gradient(160deg,oklch(.14 .035 280/.8),oklch(0 0 0/.4));
  border:1px solid oklch(.85 .18 200/.14);border-radius:12px;padding:14px;cursor:pointer;
  display:flex;flex-direction:column;gap:8px;transition:all .2s;
  box-shadow:0 4px 14px oklch(0 0 0/.2)}
.jb-card:hover,.jb-card.on{border-color:color-mix(in oklch,var(--card-color,.82 .17 190) 60%,transparent);
  background:linear-gradient(160deg,color-mix(in oklch,var(--card-color) 8%,oklch(.14 .035 280)),oklch(0 0 0/.4));
  transform:translateY(-2px);box-shadow:0 8px 22px oklch(0 0 0/.3),0 0 20px color-mix(in oklch,var(--card-color) 12%,transparent)}
.jb-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.jb-card-poster{display:flex;gap:8px;align-items:center}
.jb-card-avatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;font-family:var(--font-display);font-size:18px;flex-shrink:0}
.jb-card-title{font-family:var(--font-syne);font-weight:800;font-size:14px;color:var(--ink);line-height:1.2}
.jb-card-brief{font-size:11.5px;color:var(--ink-faint);line-height:1.5;flex:1}
.jb-card-footer{display:flex;justify-content:space-between;align-items:flex-end;
  padding-top:6px;border-top:1px solid oklch(.85 .18 200/.1)}

/* Card - list */
.jb-list-row{display:grid;grid-template-columns:1fr auto auto auto auto;gap:10px;align-items:center;
  padding:10px 14px;background:linear-gradient(135deg,oklch(.14 .035 280/.7),oklch(0 0 0/.3));
  border:1px solid oklch(.85 .18 200/.12);border-radius:10px;text-align:left;color:var(--ink);
  cursor:pointer;transition:all .18s;width:100%}
.jb-list-row:hover,.jb-list-row.on{border-color:oklch(.85 .18 200/.4);background:oklch(.85 .18 200/.06)}
.jb-list-title{font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--ink);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Job Detail */
.jb-detail{display:flex;flex-direction:column;gap:0;height:100%;
  background:oklch(0 0 0/.28);border:1px solid oklch(.85 .18 200/.16);border-radius:12px;padding:16px;
  overflow-y:auto;scrollbar-width:thin}
.jb-detail-rewards{display:flex;gap:10px;flex-wrap:wrap}
.jb-reward-block{background:oklch(0 0 0/.3);border:1px solid oklch(.85 .18 200/.12);
  border-radius:9px;padding:10px 14px;flex:1;min-width:80px}

/* Job composer form */
.jb-composer-form{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.jb-field{display:flex;flex-direction:column;gap:5px;font-family:var(--font-mono);font-size:9px;
  letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
</style>
</head>
