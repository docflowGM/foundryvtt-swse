<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Progression Engine — Datapad Chargen</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&family=IBM+Plex+Mono:wght@300;400;500;600&family=Major+Mono+Display&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent-h: 190;
    --accent-c: 0.17;
    --accent-l: 0.82;
    --accent: oklch(var(--accent-l) var(--accent-c) var(--accent-h));
    --accent-soft: oklch(0.55 var(--accent-c) var(--accent-h));
    --accent-dim: oklch(0.32 0.08 var(--accent-h));
    --accent-hot: oklch(0.75 0.2 calc(var(--accent-h) + 130));
    --accent-warm: oklch(0.80 0.16 calc(var(--accent-h) - 160));

    --bg: oklch(0.10 0.03 285);
    --bg-2: oklch(0.13 0.04 280);
    --bg-3: oklch(0.17 0.05 275);
    --screen: oklch(0.15 0.06 278);
    --screen-2: oklch(0.20 0.08 272);
    --ink: oklch(0.94 0.04 var(--accent-h));
    --ink-dim: oklch(0.72 0.06 var(--accent-h));
    --ink-faint: oklch(0.50 0.05 var(--accent-h));
    --danger: oklch(0.72 0.18 30);
    --pos: oklch(0.82 0.19 145);   /* green for positives */
    --neg: oklch(0.70 0.22 25);    /* red for negatives */
    --zero: oklch(0.88 0.17 95);   /* yellow for +0 / zero */

    --font-body: 'Space Grotesk', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --font-display: 'VT323', monospace;

    --density: 1;
    --gap: calc(14px * var(--density));
    --pad: calc(18px * var(--density));
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #05050a;
    color: var(--ink);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: auto;
  }

  /* Room backdrop — moody gradient + faint grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, oklch(0.18 0.10 320 / 0.5), transparent 55%),
      radial-gradient(ellipse at 80% 90%, oklch(0.18 0.10 200 / 0.45), transparent 55%),
      linear-gradient(180deg, #060612 0%, #020205 100%);
    z-index: -2;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(to right, oklch(1 0 0 / 0.015) 1px, transparent 1px),
      linear-gradient(to bottom, oklch(1 0 0 / 0.015) 1px, transparent 1px);
    background-size: 48px 48px;
    z-index: -1;
    pointer-events: none;
  }

  /* ===== Datapad bezel ===== */
  .stage {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .datapad {
    width: min(1360px, 100%);
    position: relative;
    padding: 18px 18px 52px;
    background:
      linear-gradient(180deg, #1a1923 0%, #0d0c15 50%, #080810 100%);
    clip-path: polygon(
      0 22px, 22px 0,
      calc(100% - 60px) 0, calc(100% - 44px) 16px, calc(100% - 22px) 16px, 100% 38px,
      100% calc(100% - 22px), calc(100% - 22px) 100%,
      22px 100%, 0 calc(100% - 22px)
    );
    box-shadow:
      inset 0 1px 0 oklch(1 0 0 / 0.06),
      inset 0 0 0 1px oklch(0 0 0 / 0.6),
      0 40px 80px oklch(0 0 0 / 0.8),
      0 0 80px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.08);
  }
  .datapad::before {
    /* brushed metal texture */
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(90deg, transparent 0 2px, oklch(1 0 0 / 0.008) 2px 3px),
      repeating-linear-gradient(0deg, transparent 0 40px, oklch(1 0 0 / 0.01) 40px 41px);
    clip-path: inherit;
    pointer-events: none;
  }

  /* Rivets */
  .rivet {
    position: absolute;
    width: 6px; height: 6px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #2a2a38, #060608);
    box-shadow: inset 0 0 0 1px oklch(0 0 0 / 0.6), 0 1px 0 oklch(1 0 0 / 0.05);
  }
  .rivet.tl { top: 10px; left: 32px; }
  .rivet.tr { top: 26px; right: 78px; }
  .rivet.bl { bottom: 12px; left: 32px; }
  .rivet.br { bottom: 12px; right: 32px; }

  /* Vent strip */
  .vent {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    bottom: 14px;
    width: 340px; height: 18px;
    background:
      repeating-linear-gradient(90deg,
        oklch(0 0 0 / 0.85) 0 2px,
        oklch(0.25 0.03 280) 2px 6px);
    border-radius: 3px;
    box-shadow: inset 0 2px 4px oklch(0 0 0 / 0.9);
    opacity: 0.7;
  }
  .power-led {
    position: absolute;
    bottom: 18px; right: 52px;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: 0.5; } }

  .bezel-label {
    position: absolute;
    top: 6px; left: 70px;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.4em;
    color: oklch(1 0 0 / 0.25);
    text-transform: uppercase;
  }
  .bezel-serial {
    position: absolute;
    bottom: 3px; right: 76px;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.25em;
    color: oklch(1 0 0 / 0.18);
  }

  /* ===== Screen ===== */
  .screen {
    position: relative;
    border-radius: 4px;
    background:
      radial-gradient(ellipse at 50% 30%, var(--screen-2) 0%, var(--screen) 45%, oklch(0.08 0.04 280) 100%);
    box-shadow:
      inset 0 0 0 1px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.25),
      inset 0 0 60px oklch(0 0 0 / 0.6),
      inset 0 0 120px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.08);
    overflow: hidden;
    min-height: 820px;
  }
  /* Scanlines */
  .screen::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      oklch(0 0 0 / 0) 0,
      oklch(0 0 0 / 0) 2px,
      oklch(0 0 0 / 0.18) 3px,
      oklch(0 0 0 / 0) 4px
    );
    pointer-events: none;
    z-index: 40;
    mix-blend-mode: multiply;
  }
  /* Vignette + curvature fake */
  .screen::after {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 55%, oklch(0 0 0 / 0.55) 100%);
    pointer-events: none;
    z-index: 41;
  }

  .screen-inner {
    position: relative;
    padding: 28px 34px;
    z-index: 2;
  }

  /* Hologram flicker overlay */
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    43% { opacity: 0.98; }
    44% { opacity: 0.85; }
    45% { opacity: 1; }
    70% { opacity: 0.97; }
  }
  .holo-root { animation: flicker 6s infinite; }

  /* ===== TOP HUD BAR ===== */
  .hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 6px 4px 14px;
    border-bottom: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.18);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .hud-left, .hud-right { display: flex; gap: 18px; align-items: center; }
  .hud .tag {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .hud .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .hud .dot.warn { background: var(--accent-warm); box-shadow: 0 0 8px var(--accent-warm); }
  .hud .dot.hot { background: var(--accent-hot); box-shadow: 0 0 8px var(--accent-hot); }
  .hud-title {
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-shadow: 0 0 10px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.6);
  }
  .hud-clock { font-variant-numeric: tabular-nums; }

  /* ===== STEPPER ===== */
  .stepper {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    padding: 16px 4px 18px;
  }
  .step {
    position: relative;
    padding: 10px 10px 10px 44px;
    background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.03);
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.18);
    clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
    cursor: pointer;
    transition: all 0.25s;
  }
  .step:hover { background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.08); }
  .step .step-num {
    position: absolute;
    top: 50%; left: 12px; transform: translateY(-50%);
    font-family: var(--font-display);
    font-size: 26px;
    color: var(--accent);
    text-shadow: 0 0 8px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.6);
    line-height: 1;
  }
  .step .step-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-dim);
    display: block;
  }
  .step .step-name {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
  .step.active {
    background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.14);
    border-color: var(--accent);
    box-shadow: 0 0 24px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.2);
  }
  .step.active .step-name { color: var(--accent); }
  .step.done { border-color: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.4); }
  .step.done .step-num::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    font-family: var(--font-body);
  }
  .step.done .step-num {
    color: transparent;
  }
  .step.done .step-num::after { color: var(--accent); }

  /* ===== MAIN LAYOUT ===== */
  .body {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 22px;
    margin-top: 10px;
  }

  /* ===== SUMMARY SIDEBAR ===== */
  .manifest {
    background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.03);
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.18);
    padding: 18px;
    position: relative;
  }
  .manifest::before {
    content: '';
    position: absolute; inset: 0;
    border-top: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.35);
    pointer-events: none;
    animation: scan 4s linear infinite;
  }
  @keyframes scan {
    0% { transform: translateY(0); opacity: 0.8; }
    100% { transform: translateY(100%); opacity: 0; }
  }
  .manifest h3 {
    margin: 0 0 14px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    border-bottom: 1px dashed oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.25);
    padding-bottom: 10px;
  }
  .manifest h3 small {
    float: right;
    color: var(--ink-faint);
    font-weight: 400;
  }

  .bust {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 50% 55%, oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.15), transparent 70%);
  }
  .bust svg { width: 82%; height: auto; animation: hoverdrift 5s ease-in-out infinite; }
  @keyframes hoverdrift {
    0%, 100% { transform: translateY(0) rotateY(0deg); }
    50% { transform: translateY(-3px); }
  }
  .bust .platform {
    position: absolute;
    bottom: 8px; left: 10%;
    width: 80%; height: 18px;
    background:
      radial-gradient(ellipse at center, oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.4), transparent 70%);
    filter: blur(4px);
  }
  .bust-ring {
    position: absolute;
    bottom: 14px; left: 50%; transform: translateX(-50%);
    width: 70%; height: 4px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: ringPulse 2.8s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%, 100% { transform: translateX(-50%) scaleX(1); opacity: 0.7; }
    50% { transform: translateX(-50%) scaleX(1.05); opacity: 1; }
  }

  .manifest-row {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px dotted oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.12);
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .manifest-row .k {
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 9px;
    align-self: center;
  }
  .manifest-row .v {
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .manifest-row .v.empty {
    color: var(--ink-faint);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
  }
  .manifest-row .v.accent { color: var(--accent); }

  .manifest-section {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px dashed oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.25);
  }
  .manifest-title {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .chip-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 8px;
    background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.08);
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.3);
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .chip.empty {
    color: var(--ink-faint);
    border-color: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.15);
    background: transparent;
  }

  /* ===== CANVAS (step content) ===== */
  .canvas {
    position: relative;
    background:
      linear-gradient(180deg, oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.025), transparent 40%);
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.18);
    padding: 22px 26px 26px;
    min-height: 520px;
  }
  .canvas-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding-bottom: 14px;
    border-bottom: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.18);
    margin-bottom: 18px;
  }
  .canvas-title {
    font-family: var(--font-display);
    font-size: 42px;
    letter-spacing: 0.12em;
    color: var(--ink);
    text-shadow:
      2px 0 0 oklch(var(--accent-l) var(--accent-c) calc(var(--accent-h) + 130) / 0.5),
      -2px 0 0 oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.5);
    line-height: 1;
    text-transform: uppercase;
  }
  .canvas-title-block small {
    display: block;
    margin-top: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .canvas-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-dim);
    text-align: right;
  }
  .canvas-meta .big {
    display: block;
    font-family: var(--font-display);
    font-size: 24px;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-shadow: 0 0 8px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.5);
  }

  /* ===== HOLO CARD GRID (species/class) ===== */
  .holo-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .holo-card {
    position: relative;
    aspect-ratio: 0.82;
    background:
      linear-gradient(180deg,
        oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.04) 0%,
        oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.01) 100%);
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.25);
    cursor: pointer;
    overflow: hidden;
    transition: all 0.25s;
    display: flex;
    flex-direction: column;
  }
  .holo-card::before {
    /* corner tabs */
    content: '';
    position: absolute;
    top: -1px; left: -1px;
    width: 14px; height: 14px;
    border-top: 2px solid var(--accent);
    border-left: 2px solid var(--accent);
  }
  .holo-card::after {
    content: '';
    position: absolute;
    bottom: -1px; right: -1px;
    width: 14px; height: 14px;
    border-bottom: 2px solid var(--accent);
    border-right: 2px solid var(--accent);
  }
  .holo-card:hover {
    background:
      linear-gradient(180deg,
        oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.10) 0%,
        oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.02) 100%);
    transform: translateY(-2px);
    box-shadow: 0 12px 30px oklch(0 0 0 / 0.5), 0 0 30px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.15);
  }
  .holo-card.selected {
    border-color: var(--accent);
    box-shadow:
      inset 0 0 0 1px var(--accent),
      0 0 40px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.3);
  }
  .holo-card .glyph {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 14px;
    border-bottom: 1px dashed oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.2);
  }
  .holo-card .glyph svg {
    width: 78%; height: auto;
    color: var(--accent);
    filter: drop-shadow(0 0 6px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.7));
    animation: glyphDrift 6s ease-in-out infinite;
  }
  @keyframes glyphDrift {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }
  .holo-card .glyph::before {
    /* horizontal scan line across glyph */
    content: '';
    position: absolute;
    left: 8px; right: 8px;
    height: 1px;
    background: var(--accent);
    opacity: 0.6;
    box-shadow: 0 0 8px var(--accent);
    animation: glyphScan 3s linear infinite;
  }
  @keyframes glyphScan {
    0% { top: 15%; opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { top: 85%; opacity: 0; }
  }
  .holo-card .meta {
    padding: 10px 12px 12px;
  }
  .holo-card .name {
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 0.18em;
    color: var(--ink);
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 4px;
  }
  .holo-card.selected .name { color: var(--accent); }
  .holo-card .tag {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .holo-card .id {
    position: absolute;
    top: 8px; right: 10px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 0.2em;
    opacity: 0.7;
  }

  /* Detail panel (species/class info) */
  .detail {
    margin-top: 20px;
    padding: 18px;
    background:
      linear-gradient(180deg, oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.03), transparent);
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.2);
    border-left: 3px solid var(--accent);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
  }
  .detail h4 {
    margin: 0 0 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .detail p {
    margin: 0 0 8px;
    line-height: 1.55;
    font-size: 13px;
    color: var(--ink-dim);
    text-wrap: pretty;
  }
  .detail ul {
    margin: 0; padding: 0; list-style: none;
  }
  .detail li {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 0;
    border-bottom: 1px dotted oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.12);
    color: var(--ink-dim);
    display: flex; justify-content: space-between;
  }
  .detail li b { color: var(--accent); font-weight: 500; }

  /* ===== IDENTITY STEP ===== */
  .identity-form {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 24px;
    margin-top: 10px;
  }
  .field-group {
    display: flex; flex-direction: column; gap: 18px;
  }
  .field {
    display: flex; flex-direction: column; gap: 8px;
  }
  .field label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .field .hint {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
  }
  .input {
    background: oklch(0 0 0 / 0.35);
    border: none;
    border-bottom: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.4);
    padding: 12px 12px 10px;
    color: var(--accent);
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 0.12em;
    outline: none;
    transition: all 0.2s;
    text-shadow: 0 0 6px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.6);
  }
  .input:focus {
    border-bottom-color: var(--accent);
    background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.04);
  }
  .input.small {
    font-size: 18px;
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
    width: 120px;
  }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .btn {
    background: transparent;
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.4);
    color: var(--ink);
    padding: 10px 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn:hover {
    background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.1);
    color: var(--accent);
  }
  .btn.primary {
    background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.15);
    border-color: var(--accent);
    color: var(--accent);
    text-shadow: 0 0 6px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.6);
  }
  .btn.primary:hover {
    background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.25);
  }
  .btn.ghost { border-color: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.2); color: var(--ink-dim); }
  .btn.danger { border-color: oklch(0.6 0.2 30 / 0.6); color: oklch(0.72 0.18 30); }
  .btn[disabled] { opacity: 0.3; cursor: not-allowed; }

  /* Identity stats readout */
  .readout {
    background: oklch(0 0 0 / 0.3);
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.2);
    padding: 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.8;
    color: var(--ink-dim);
  }
  .readout .ln { display: flex; justify-content: space-between; gap: 10px; }
  .readout .ln b { color: var(--accent); font-weight: 400; }
  .readout .hl { color: var(--accent); }

  /* ===== ABILITIES ===== */
  .ability-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-top: 12px;
  }
  .ability-cell {
    background:
      linear-gradient(180deg, oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.06), oklch(0 0 0 / 0.15));
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.22);
    padding: 14px 12px;
    position: relative;
    text-align: center;
  }
  .ability-cell::before {
    content: '';
    position: absolute;
    top: 0; left: 8px; right: 8px; height: 2px;
    background: var(--accent);
    opacity: 0.6;
    box-shadow: 0 0 6px var(--accent);
  }
  .ability-cell .ab-code {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .ability-cell .ab-name {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
  }
  .ability-cell .ab-val {
    font-family: var(--font-display);
    font-size: 48px;
    line-height: 1;
    color: var(--accent);
    margin: 10px 0 4px;
    text-shadow: 0 0 12px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.5);
  }
  .ability-cell .ab-mod {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
  }
  .ability-cell .ab-mod.pos { color: var(--pos); text-shadow: 0 0 8px oklch(0.82 0.19 145 / 0.5); }
  .ability-cell .ab-mod.neg { color: var(--neg); text-shadow: 0 0 8px oklch(0.70 0.22 25 / 0.5); }
  .ability-cell .ab-mod.zero { color: var(--zero); text-shadow: 0 0 8px oklch(0.88 0.17 95 / 0.5); }
  .ability-cell .ab-val.pos { color: var(--pos); text-shadow: 0 0 12px oklch(0.82 0.19 145 / 0.5); }
  .ability-cell .ab-val.neg { color: var(--neg); text-shadow: 0 0 12px oklch(0.70 0.22 25 / 0.5); }
  .ability-cell .ab-val.zero { color: var(--zero); text-shadow: 0 0 12px oklch(0.88 0.17 95 / 0.5); }
  .v.pos { color: var(--pos) !important; }
  .v.neg { color: var(--neg) !important; }
  .v.zero { color: var(--zero) !important; }
  .num-val.pos { color: var(--pos); text-shadow: 0 0 8px oklch(0.82 0.19 145 / 0.5); }
  .num-val.neg { color: var(--neg); text-shadow: 0 0 8px oklch(0.70 0.22 25 / 0.5); }
  .num-val.zero { color: var(--zero); text-shadow: 0 0 8px oklch(0.88 0.17 95 / 0.5); }
  .skill-mod.pos { color: var(--pos); }
  .skill-mod.neg { color: var(--neg); }
  .skill-mod.zero { color: var(--zero); }
  .ab-steppers {
    display: flex; justify-content: center; gap: 6px; margin-top: 10px;
  }
  .ab-step {
    width: 28px; height: 22px;
    background: transparent;
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.3);
    color: var(--accent);
    font-family: var(--font-display);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ab-step:hover { background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.15); }
  .ab-step:disabled { opacity: 0.2; cursor: not-allowed; }
  .ability-cell .racial {
    position: absolute;
    top: 6px; right: 8px;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.1em;
  }
  .ability-cell .racial.pos { color: var(--pos); }
  .ability-cell .racial.neg { color: var(--neg); }
  .ability-cell .racial.zero { color: var(--zero); }

  .budget-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 14px;
    background: oklch(0 0 0 / 0.3);
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.2);
    margin-top: 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .budget-bar .bar {
    flex: 1;
    height: 6px;
    background: oklch(0 0 0 / 0.5);
    position: relative;
    overflow: hidden;
  }
  .budget-bar .fill {
    position: absolute; inset: 0;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-hot));
    box-shadow: 0 0 10px var(--accent);
    transition: width 0.35s;
  }
  .budget-bar .num {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-shadow: 0 0 8px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.5);
  }
  .budget-bar .num.zero { color: var(--zero); text-shadow: 0 0 8px oklch(0.88 0.17 95 / 0.5); }
  .budget-bar .num.over { color: var(--neg); text-shadow: 0 0 8px oklch(0.70 0.22 25 / 0.5); }
  .budget-bar .num.pos { color: var(--pos); text-shadow: 0 0 8px oklch(0.82 0.19 145 / 0.5); }

  .method-row {
    display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .method-row .btn.active {
    background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.2);
    color: var(--accent);
    border-color: var(--accent);
  }

  /* ===== SKILLS ===== */
  .skills-layout {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .skill-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    background: oklch(0 0 0 / 0.2);
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.12);
    cursor: pointer;
    transition: all 0.15s;
  }
  .skill-row:hover { border-color: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.4); }
  .skill-row.on {
    background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.1);
    border-color: var(--accent);
  }
  .skill-row.locked {
    background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.06);
    border-color: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.3);
    border-left: 3px solid var(--accent-warm);
    cursor: not-allowed;
  }
  .skill-box {
    width: 16px; height: 16px;
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.4);
    position: relative;
    flex-shrink: 0;
  }
  .skill-row.on .skill-box {
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }
  .skill-row.on .skill-box::after {
    content: '';
    position: absolute; inset: 3px;
    background: oklch(0.1 0.03 285);
  }
  .skill-row.locked .skill-box {
    background: var(--accent-warm);
    border-color: var(--accent-warm);
    box-shadow: 0 0 6px var(--accent-warm);
  }
  .skill-name {
    flex: 1;
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--ink);
  }
  .skill-row.locked .skill-name { color: var(--ink-dim); }
  .skill-mod {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
  }
  .skill-row.on .skill-mod { color: var(--accent); }

  /* ===== FEATS / TALENTS ===== */
  .pick-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .pick {
    position: relative;
    padding: 14px 16px;
    background:
      linear-gradient(180deg, oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.04), transparent);
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.18);
    cursor: pointer;
    transition: all 0.2s;
  }
  .pick:hover { border-color: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.5); }
  .pick.on {
    border-color: var(--accent);
    background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.1);
    box-shadow: 0 0 24px oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.2);
  }
  .pick.on::before {
    content: '▸';
    position: absolute;
    top: 10px; right: 10px;
    font-family: var(--font-display);
    color: var(--accent);
    font-size: 20px;
    text-shadow: 0 0 6px var(--accent);
  }
  .pick .pick-name {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }
  .pick .pick-code {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .pick .pick-desc {
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--ink-dim);
    line-height: 1.5;
    text-wrap: pretty;
  }
  .pick .pick-prereq {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.15);
  }
  .pick.locked { opacity: 0.45; cursor: not-allowed; }
  .pick.locked .pick-prereq { color: var(--accent-warm); }

  /* ===== NARRATOR ===== */
  .narrator {
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 16px;
    align-items: start;
    padding: 14px 16px;
    margin: 0 0 14px;
    background: oklch(0 0 0 / 0.25);
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.22);
    border-left: 3px solid var(--accent);
    position: relative;
  }
  .narrator .av {
    width: 56px; height: 56px;
    border: 1px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 50% 40%, oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.25), transparent 60%);
    position: relative;
    overflow: hidden;
  }
  .narrator .av svg { width: 74%; color: var(--accent); filter: drop-shadow(0 0 4px var(--accent)); }
  .narrator .body-txt {
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--ink);
    line-height: 1.55;
    text-wrap: pretty;
  }
  .narrator .body-txt .who {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    display: block;
    margin-bottom: 4px;
  }
  .narrator .body-txt .who::before {
    content: '▸ ';
  }

  /* ===== FOOTER CONTROLS ===== */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 4px 4px;
    margin-top: 22px;
    border-top: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.18);
  }
  .controls .status {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .controls .status b { color: var(--accent); font-weight: 500; }

  /* ===== TWEAKS PANEL ===== */
  .tweaks {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%) translateX(120%);
    width: 280px;
    background: oklch(0.12 0.04 280);
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.3);
    padding: 18px;
    z-index: 200;
    transition: transform 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
    box-shadow: -20px 0 60px oklch(0 0 0 / 0.6);
  }
  .tweaks.open { transform: translateY(-50%) translateX(0); }
  .tweaks h3 {
    margin: 0 0 14px;
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    padding-bottom: 10px;
    border-bottom: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.3);
  }
  .tweaks label {
    display: block;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin: 12px 0 6px;
  }
  .swatch-row { display: flex; gap: 6px; }
  .swatch {
    width: 32px; height: 32px;
    border: 1px solid oklch(0 0 0 / 0.4);
    cursor: pointer;
    transition: all 0.2s;
  }
  .swatch:hover { transform: scale(1.08); }
  .swatch.active { outline: 2px solid white; outline-offset: 2px; }
  .tweaks select, .tweaks input[type=range] {
    width: 100%;
    background: oklch(0 0 0 / 0.4);
    color: var(--ink);
    border: 1px solid oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.3);
    padding: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  /* fade slide animation */
  .step-content { animation: slideIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: oklch(var(--accent-l) var(--accent-c) var(--accent-h) / 0.4); }
</style>

<div class="stage">
  <div class="datapad">
    <div class="rivet tl"></div>
    <div class="rivet tr"></div>
    <div class="rivet bl"></div>
    <div class="rivet br"></div>
    <div class="bezel-label">DATAPAD // MK-VII · NEURAL-LINK READY</div>
    <div class="bezel-serial" id="serial">SN 4471-ΘΞΛ-00827</div>
    <div class="vent"></div>
    <div class="power-led"></div>

    <div class="screen">
      <div class="screen-inner holo-root" id="app-root"></div>
    </div>
  </div>
</div>

<!-- Tweaks panel -->
<div class="tweaks" id="tweaks">
  <h3>Tweaks</h3>

  <label>Accent</label>
  <div class="swatch-row" id="accent-swatches"></div>

  <label>Font pair</label>
  <select id="font-pair">
    <option value="vt">VT323 + Space Grotesk (default)</option>
    <option value="mono">Major Mono + IBM Plex Mono</option>
    <option value="syne">VT323 + Syne</option>
    <option value="plex">VT323 + IBM Plex Mono</option>
  </select>

  <label>Density</label>
  <input type="range" id="density" min="0.85" max="1.15" step="0.05" value="1" />

  <label>Scanlines</label>
  <input type="range" id="scanlines" min="0" max="1" step="0.1" value="1" />
</div>

<script type="application/json" id="default-edits">
{"accent": "cyan", "font": "vt", "density": 1, "scanlines": 1}
</script>

<script>
/* ==========================================================
 * DATA — all original, system-neutral
 * ========================================================== */
const SPECIES = [

function loadTweaks() {
  try {
    const raw = localStorage.getItem(TWEAKS_LS);

  } catch {}
  return { accent: 'cyan', font: 'vt', density: 1, scanlines: 1 };

function saveTweaks() { try { localStorage.setItem(TWEAKS_LS, JSON.stringify(tweaks)); } catch {} }
function applyTweaks() {
  const a = ACCENTS[tweaks.accent] || ACCENTS.cyan;
  document.documentElement.style.setProperty('--accent-h', a.h);
  document.documentElement.style.setProperty('--accent-c', a.c);
  document.documentElement.style.setProperty('--accent-l', a.l);

  const f = FONT_PAIRS[tweaks.font] || FONT_PAIRS.vt;
  document.documentElement.style.setProperty('--font-display', f.display);
  document.documentElement.style.setProperty('--font-body', f.body);
  document.documentElement.style.setProperty('--font-mono', f.mono);

  document.documentElement.style.setProperty('--density', tweaks.density);
  document.documentElement.style.setProperty('--gap', `calc(14px * ${tweaks.density})`);
  document.documentElement.style.setProperty('--pad', `calc(18px * ${tweaks.density})`);

  // scanlines: swap screen ::before opacity via a style tag
  let sl = document.getElementById('scan-opacity');
  if (!sl) { sl = document.createElement('style'); sl.id='scan-opacity'; document.head.appendChild(sl); }
  sl.textContent = `.screen::before { opacity: ${tweaks.scanlines}; }`;

  saveTweaks();
}

/* ==========================================================
 * HELPERS
 * ========================================================== */
const $ = s => document.querySelector(s);
const el = (tag, attrs={}, children=[]) => {
  const n = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (v !== null && v !== undefined && v !== false) n.setAttribute(k, v);
  }
  (Array.isArray(children)?children:[children]).forEach(c => {
    if (c == null) return;
    if (typeof c === 'string') n.appendChild(document.createTextNode(c));
    else n.appendChild(c);
  });
  return n;
};

function modFrom(score) { return Math.floor((score - 10) / 2); }
function fmtMod(m) { return (m >= 0 ? '+' : '') + m; }
function signClass(n) { return n > 0 ? 'pos' : n < 0 ? 'neg' : 'zero'; }

function speciesById(id) { return SPECIES.find(s => s.id === id); }
function classById(id) { return CLASSES.find(c => c.id === id); }

function racialMods() {
  const s = speciesById(state.speciesId);
  if (!s) return {};
  const mods = {};
  if (s.abilities?.all) ['str','dex','con','int','wis','cha'].forEach(a => mods[a] = s.abilities.all);
  if (s.abilities?.any && state.abilityBonus) mods[state.abilityBonus] = (mods[state.abilityBonus]||0) + s.abilities.any;
  for (const [k,v] of Object.entries(s.abilities||{})) {
    if (k === 'all' || k === 'any' || k === 'custom') continue;
    mods[k] = (mods[k]||0) + v;
  }
  return mods;
}

function totalScore(ab) {
  const r = racialMods()[ab] || 0;
  return state.abilities[ab] + r;
}

function trainedAllowed() {
  const cls = classById(state.classId);
  if (!cls) return 0;
  let n = cls.trainedSkills;
  const intMod = modFrom(totalScore('int'));
  n += Math.max(0, intMod);
  const sp = speciesById(state.speciesId);
  if (sp?.id === 'ASC') n += 1; // versatile baseline bonus skill
  return n;
}

function stepIndex(id) { return STEPS.findIndex(s => s.id === id); }
function stepDone(id) {
  switch(id) {
    case 'identity':  return !!state.name && state.level >= 1;
    case 'species':   return !!state.speciesId && (speciesById(state.speciesId)?.abilities?.any ? !!state.abilityBonus : true);
    case 'class':     return !!state.classId;
    case 'abilities': return state.budget === 0;
    case 'skills':    return state.skills.length === trainedAllowed();
    case 'feats':     return !!state.feat;
    case 'talents':   return !!state.talent;
  }
  return false;
}

function canAdvance() { return stepDone(state.step); }

    el('b', {}, 'CGN-' + String(Math.abs(hashStr(state.name || 'anon'))).slice(0,5).padStart(5,'0'))
  ]));
  right.appendChild(el('span', { class: 'tag hud-clock' }, [el('span',{class:'dot hot'}), timeStr()]));
  const tweaksBtn = el('button', { class:'btn ghost', style:'padding:6px 12px;font-size:10px;', onclick: () => $('#tweaks').classList.toggle('open') }, 'Tweaks');
  right.appendChild(tweaksBtn);
  hud.appendChild(right);
  return hud;
}

function timeStr() {
  const d = new Date();
  const h = String(d.getUTCHours()).padStart(2,'0');
  const m = String(d.getUTCMinutes()).padStart(2,'0');
  return `${h}:${m} · UTC`;
}

function hashStr(s) {
  let h = 0; for (let i=0;i<s.length;i++) { h = ((h<<5)-h) + s.charCodeAt(i); h |= 0; }
  return h;
}

function renderStepper() {
  const wrap = el('div', { class: 'stepper' });
  STEPS.forEach((s, idx) => {

    const canGo = idx <= stepIndex(state.step) || stepDone(STEPS[idx-1]?.id);
    const node = el('div', {
      class: `step ${active?'active':''} ${done && !active ?'done':''}`,
      onclick: () => { if (canGo) { state.step = s.id; render(); } },
    }, [
      el('div', { class: 'step-num' }, s.num),
      el('span', { class: 'step-label' }, s.label),
      el('div', { class: 'step-name' }, s.name),
    ]);
    wrap.appendChild(node);
  });
  return wrap;
}

  return first[Math.floor(Math.random()*first.length)] + ' ' + last[Math.floor(Math.random()*last.length)];

function randomUnit() {
  const letters = 'ABCDEFGHJKMNPRSTVWX';

  return l()+l()+'-'+Math.floor(100+Math.random()*900)+'-'+l();
}

 * STEP: ABILITIES
 * ========================================================== */
function renderAbilities(root) {
  // method selector
  const methods = el('div', { class: 'method-row' });
  const ms = [
    { id:'pointbuy', label:'Point Buy · 25 PT' },
    { id:'array', label:'Standard Array' },
    { id:'standard', label:'Standard Roll · 4d6' },
    { id:'organic', label:'Organic Roll · In Order' },
  ];
  ms.forEach(m => {
    methods.appendChild(el('button', {
      class: 'btn ' + (state.method === m.id ? 'active' : ''),
      onclick: () => { applyMethod(m.id); render(); },
    }, m.label));
  });
  root.appendChild(methods);

  // ability grid
  const grid = el('div', { class: 'ability-grid' });
  ABILITIES.forEach(a => {
    const key = a.code.toLowerCase();
    const base = state.abilities[key];
    const racial = racialMods()[key] || 0;
    const total = base + racial;
    const mod = modFrom(total);
    const cell = el('div', { class: 'ability-cell' });
    if (racial) cell.appendChild(el('div', { class: 'racial ' + signClass(racial) }, fmtMod(racial)));
    cell.appendChild(el('div', { class: 'ab-code' }, a.code));
    cell.appendChild(el('div', { class: 'ab-name' }, a.name));
    cell.appendChild(el('div', { class: 'ab-val ' + signClass(mod) }, total));
    cell.appendChild(el('div', { class: 'ab-mod ' + signClass(mod) }, fmtMod(mod) + ' mod'));
    if (state.method === 'pointbuy') {
      const st = el('div', { class: 'ab-steppers' });
      st.appendChild(el('button', {
        class: 'ab-step',
        disabled: base <= 8 ? '' : null,
        onclick: () => { adjustAb(key, -1); render(); }
      }, '−'));
      st.appendChild(el('button', {
        class: 'ab-step',
        disabled: (base >= 18 || costToIncrease(base) > state.budget) ? '' : null,
        onclick: () => { adjustAb(key, +1); render(); }
      }, '+'));
      cell.appendChild(st);
    } else {
      cell.appendChild(el('div', { style:'margin-top:10px;font-family:var(--font-mono);font-size:9px;color:var(--ink-faint);letter-spacing:0.15em;' }, 'BASE ' + base));
    }
    grid.appendChild(cell);
  });
  root.appendChild(grid);

  // budget bar
  const bar = el('div', { class:'budget-bar' });
  if (state.method === 'pointbuy') {
    bar.appendChild(el('span', {}, 'Point Budget'));
    const b = el('div', { class: 'bar' });
    const pct = Math.max(0, Math.min(100, (1 - state.budget / 25) * 100));
    b.appendChild(el('div', { class: 'fill', style:`width:${pct}%` }));
    bar.appendChild(b);
    bar.appendChild(el('span', { class: 'num ' + (state.budget===0?'zero':state.budget<0?'over':'pos') }, String(state.budget) + ' PT'));
  } else {
    bar.appendChild(el('span', {}, 'Method — ' + state.method.toUpperCase()));
    bar.appendChild(el('div', { class: 'bar' }, [ el('div', { class: 'fill', style:'width:100%' }) ]));
    bar.appendChild(el('span', { class: 'num zero' }, 'LOCKED'));
  }
  root.appendChild(bar);
}

function costToIncrease(v) {
  // linear: 1 point up through 12; 2 through 14; 3 through 16; 4 through 18
  if (v < 12) return 1;
  if (v < 14) return 2;
  if (v < 16) return 3;
  return 4;
}
function refundFromDecrease(v) {
  // v is current value, we are going to v-1, so cost refunded is costToIncrease(v-1)
  return costToIncrease(v - 1);
}
function adjustAb(key, delta) {
  const current = state.abilities[key];
  if (delta > 0) {
    const cost = costToIncrease(current);
    if (state.budget >= cost && current < 18) {
      state.abilities[key] = current + 1;
      state.budget -= cost;
    }
  } else {
    if (current > 8) {
      const refund = refundFromDecrease(current);
      state.abilities[key] = current - 1;
      state.budget += refund;
    }
  }
}
function applyMethod(id) {
  state.method = id;
  if (id === 'pointbuy') {
    state.abilities = { str:8, dex:8, con:8, int:8, wis:8, cha:8 };
    state.budget = 25;
  } else if (id === 'array') {
    const arr = [15,14,13,12,10,8];
    const keys = ['str','dex','con','int','wis','cha'];
    keys.forEach((k,i) => state.abilities[k] = arr[i]);
    state.budget = 0;
  } else if (id === 'standard') {
    const rolls = () => {
      const d = [1,2,3,4].map(()=>1+Math.floor(Math.random()*6)).sort((a,b)=>b-a);
      return d[0]+d[1]+d[2];
    };
    ['str','dex','con','int','wis','cha'].forEach(k => state.abilities[k] = rolls());
    state.budget = 0;
  } else if (id === 'organic') {
    ['str','dex','con','int','wis','cha'].forEach(k => {
      state.abilities[k] = 3 + Math.floor(Math.random()*6) + Math.floor(Math.random()*6) + Math.floor(Math.random()*6);
    });
    state.budget = 0;
  }
}

  FEATS.forEach(f => {
    const on = state.feat === f.id;
    // simplistic prereq check (we just display them)
    const meetsPrereq = checkFeatPrereq(f);
    const row = el('div', {
      class: `pick ${on?'on':''} ${!meetsPrereq?'locked':''}`,
      onclick: () => { if (meetsPrereq) { state.feat = on ? null : f.id; render(); } },
    }, [
      el('div', { class:'pick-code' }, f.code),
      el('div', { class:'pick-name' }, f.name),
      el('div', { class:'pick-desc' }, f.desc),
      el('div', { class:'pick-prereq' }, 'PREREQ: ' + f.prereq),
    ]);
    grid.appendChild(row);
  });
  root.appendChild(grid);
}
function checkFeatPrereq(f) {
  if (f.prereq === 'None') return true;
  const m = f.prereq.match(/(Str|Dex|Con|Int|Wis|Cha) (\d+)/);
  if (m) {
    const k = m[1].toLowerCase();
    return totalScore(k) >= +m[2];
  }
  return true; // others we won't block
}

/* ==========================================================
 * STEP: TALENTS
 * ========================================================== */
function renderTalents(root) {
  if (!state.classId) {
    root.appendChild(el('div', { style:'padding:20px;color:var(--ink-faint);font-family:var(--font-mono);font-size:12px;' }, '[ select a vocation before imprinting a talent ]'));
    return;
  }
  const cls = classById(state.classId);
  const list = TALENTS[cls.id] || [];

  root.appendChild(el('div', { style:'margin-bottom:12px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.15em;color:var(--ink-dim);' }, [
    el('span', {}, 'VOCATION-LOCKED · ' + cls.name.toUpperCase() + '  ·  '),
    el('b', { style:'color:'+(state.talent?'var(--accent)':'var(--ink-dim)')+';' }, state.talent ? '1 / 1' : '0 / 1'),
  ]));

  const grid = el('div', { class: 'pick-grid' });
  list.forEach(t => {
    const on = state.talent === t.id;
    const row = el('div', {
      class: `pick ${on?'on':''}`,
      onclick: () => { state.talent = on ? null : t.id; render(); },
    }, [
      el('div', { class:'pick-code' }, t.code),
      el('div', { class:'pick-name' }, t.name),
      el('div', { class:'pick-desc' }, t.desc),
      el('div', { class:'pick-prereq' }, 'REQUIRES: ' + t.prereq),
    ]);
    grid.appendChild(row);
  });
  root.appendChild(grid);
}

/* ==========================================================
 * TWEAKS UI wiring
 * ========================================================== */
function initTweaks() {
  const sw = $('#accent-swatches');
  Object.entries(ACCENTS).forEach(([key, v]) => {
    const b = el('div', {
      class: 'swatch ' + (tweaks.accent === key ? 'active' : ''),
      style: `background:${v.color};`,
      title: key,
      onclick: () => { tweaks.accent = key; applyTweaks(); initTweaks(); postEditModeSet({ accent: key }); },
    });
    sw.innerHTML = ''; // rebuild
    // fallthrough — we'll rebuild outside
  });
  sw.innerHTML = '';
  Object.entries(ACCENTS).forEach(([key, v]) => {
    sw.appendChild(el('div', {
      class: 'swatch ' + (tweaks.accent === key ? 'active' : ''),
      style: `background:${v.color};`,
      title: key,
      onclick: () => { tweaks.accent = key; applyTweaks(); initTweaks(); postEditModeSet({ accent: key }); },
    }));
  });

  const fp = $('#font-pair');
  fp.value = tweaks.font;
  fp.onchange = e => { tweaks.font = e.target.value; applyTweaks(); postEditModeSet({ font: tweaks.font }); };

  const d = $('#density');
  d.value = tweaks.density;
  d.oninput = e => { tweaks.density = +e.target.value; applyTweaks(); postEditModeSet({ density: tweaks.density }); };

  const s = $('#scanlines');
  s.value = tweaks.scanlines;
  s.oninput = e => { tweaks.scanlines = +e.target.value; applyTweaks(); postEditModeSet({ scanlines: tweaks.scanlines }); };
}

/* ==========================================================
 * HOST EDIT MODE (Tweaks toolbar protocol)
 * ========================================================== */
window.addEventListener('message', e => {
  const d = e.data;
  if (!d || !d.type) return;
  if (d.type === '__activate_edit_mode') $('#tweaks').classList.add('open');
  if (d.type === '__deactivate_edit_mode') $('#tweaks').classList.remove('open');
});
function postEditModeSet(edits) {
  try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); } catch {}
}
try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}

/* ==========================================================
 * BOOT
 * ========================================================== */
applyTweaks();
initTweaks();
render();

// live clock tick
setInterval(() => {
  const el = document.querySelector('.hud-clock');
  if (el) el.innerHTML = `<span class="dot hot"></span>${timeStr()}`;
}, 30 * 1000);
</script>
