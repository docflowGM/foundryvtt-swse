<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Holopad Games — Concept</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="games-shell.css">
<link rel="stylesheet" href="games-tables.css">
</head>
<body>

<div class="stage">
  <div class="scaler" id="scaler">
    <div class="tablet">
      <div class="rivet tl"></div><div class="rivet tr"></div><div class="rivet bl"></div><div class="rivet br"></div>
      <div class="bezel-led a"></div><div class="bezel-led b"></div>
      <div class="bezel-serial">SN 7741-Δ-2206 · GAME CENTER 4.7.2</div>
      <div class="bezel-manu">CZERKA · DATAPAD MK-VII</div>

      <div class="screen">
        <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

        <!-- ===== HUD ===== -->
        <header class="hud">
          <div class="hud-left">
            <span class="tag"><span class="dot"></span> ONLINE</span>
            <span class="hud-title" id="hud-title">GAME CENTER</span>
            <span class="tag" id="hud-context"><span class="dot pink"></span> HOLOPAD SIDE TABLES</span>
          </div>
          <div class="hud-right">
            <span class="credit-chip">CR <b id="hud-credits">2,400</b></span>
            <span class="signal"><span></span><span></span><span></span><span></span></span>
            <span id="hud-clock">— : —</span>
            <button class="btn ghost sm" id="hud-home" style="display:none">▸ Library</button>
          </div>
        </header>

        <!-- ===== VIEWPORT ===== -->
        <div class="viewport">

          <!-- LIBRARY VIEW -->
          <section class="view is-active" id="view-library">
            <div class="library">
              <!-- left: game library -->
              <div class="lib-col">
                <div class="lib-head">
                  <div>
                    <span class="kicker">Installed Games</span>
                    <h3>Game Library</h3>
                  </div>
                  <span class="lib-count" id="lib-count">4</span>
                </div>
                <div class="lib-scroll" id="game-list"></div>
              </div>

              <!-- center: detail + configurator -->
              <div class="lib-col lib-col--mid">
                <div class="detail">
                  <div class="detail-scroll" id="detail-pane"></div>
                </div>
              </div>

              <!-- right: tables & invites -->
              <div class="lib-col">
                <div class="rail" id="rail-pane"></div>
              </div>
            </div>
          </section>

          <!-- PAZAAK VIEW -->
          <section class="view" id="view-pazaak"></section>

          <!-- SABACC VIEW -->
          <section class="view" id="view-sabacc"></section>

          <!-- HINTARO VIEW -->
          <section class="view" id="view-hintaro"></section>

          <!-- DEJARIK VIEW -->
          <section class="view" id="view-dejarik"></section>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="games-data.js"></script>
<script src="games-pazaak.js"></script>
<script src="games-sabacc.js"></script>
<script src="games-hintaro.js"></script>
<script src="games-dejarik.js"></script>
<script src="games-app.js"></script>
</body>
</html>
