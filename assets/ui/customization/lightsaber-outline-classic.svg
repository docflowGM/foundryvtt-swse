<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 640" role="img" aria-labelledby="title desc">
<title id="title">Classic lightsaber outline</title><desc id="desc">Emitter-aligned lightsaber preview. Blade color is controlled by --blade-color.</desc>
<style>.blade{stroke:var(--blade-color,#31b7ff);stroke-width:10;stroke-linecap:round;filter:url(#glow)}.side{stroke-width:7}.hilt{fill:url(#metal);stroke:#bdefff;stroke-opacity:.45;stroke-width:2}.cap{fill:#1d2632;stroke:#bdefff;stroke-opacity:.35;stroke-width:2}.switch{fill:#42e6ff;stroke:#eaffff;stroke-width:1}</style>
<defs><linearGradient id="metal" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#e8f7ff"/><stop offset=".45" stop-color="#596878"/><stop offset=".7" stop-color="#1c2530"/><stop offset="1" stop-color="#c0d0df"/></linearGradient><filter id="glow" x="-100%" y="-30%" width="300%" height="160%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<line x1="80" y1="36" x2="80" y2="296" class="blade"/><rect x="62" y="304" width="36" height="76" rx="8" class="hilt"/><rect x="56" y="292" width="48" height="20" rx="6" class="cap"/><rect x="58" y="372" width="44" height="20" rx="6" class="cap"/><circle cx="80" cy="338" r="5" class="switch"/></svg>