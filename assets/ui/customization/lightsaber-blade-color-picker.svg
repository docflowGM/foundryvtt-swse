<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <filter id="glow" x="-50%" y="-20%" width="200%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Each blade is clickable via data-color -->
  <g stroke-linecap="round">

    <!-- Blue -->
    <rect x="40" y="20" width="10" height="120" fill="#00BFFF" filter="url(#glow)" data-color="blue"/>
    <rect x="42" y="20" width="6" height="120" fill="#ffffff"/>

    <!-- Green -->
    <rect x="120" y="20" width="10" height="120" fill="#00FF7F" filter="url(#glow)" data-color="green"/>
    <rect x="122" y="20" width="6" height="120" fill="#ffffff"/>

    <!-- Red -->
    <rect x="200" y="20" width="10" height="120" fill="#FF4040" filter="url(#glow)" data-color="red"/>
    <rect x="202" y="20" width="6" height="120" fill="#ffffff"/>

    <!-- Purple -->
    <rect x="280" y="20" width="10" height="120" fill="#A070FF" filter="url(#glow)" data-color="purple"/>
    <rect x="282" y="20" width="6" height="120" fill="#ffffff"/>

    <!-- Yellow -->
    <rect x="360" y="20" width="10" height="120" fill="#FFD700" filter="url(#glow)" data-color="yellow"/>
    <rect x="362" y="20" width="6" height="120" fill="#ffffff"/>

    <!-- White -->
    <rect x="440" y="20" width="10" height="120" fill="#E0FFFF" filter="url(#glow)" data-color="white"/>
    <rect x="442" y="20" width="6" height="120" fill="#ffffff"/>

  </g>
</svg>
