<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Roll Icon</title>
  <desc id="desc">A holographic-style roll icon with a tilted d20 die inside a targeting frame.</desc>
  <defs>
    <linearGradient id="rollStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9DFFB5"/>
      <stop offset="100%" stop-color="#49E3A5"/>
    </linearGradient>
    <filter id="rollGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g fill="none" stroke="url(#rollStroke)" stroke-linecap="round" stroke-linejoin="round" filter="url(#rollGlow)">
    <path d="M12 20V12h8M52 20v-8h-8M12 44v8h8M52 44v8h-8" stroke-width="2.5"/>
    <polygon points="32,12 46,21 42,40 22,40 18,21" stroke-width="2.8"/>
    <path d="M32 12v14M18 21l14 5 14-5M22 40l10-14 10 14" stroke-width="2.2"/>
    <path d="M27.8 30.2h8.4M29.5 34h5" stroke-width="2"/>
    <circle cx="32" cy="32" r="24" opacity="0.15" stroke-width="1.2"/>
  </g>
</svg>
