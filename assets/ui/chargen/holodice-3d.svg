<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06131f"/>
      <stop offset="100%" stop-color="#02070d"/>
    </linearGradient>
    <linearGradient id="faceFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10334d" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#061825" stop-opacity=".05"/>
    </linearGradient>
    <linearGradient id="faceTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1ec7ff" stop-opacity=".20"/>
      <stop offset="100%" stop-color="#0b3850" stop-opacity=".05"/>
    </linearGradient>
    <linearGradient id="faceSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4460" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#071c29" stop-opacity=".04"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="0 0 0 0 0.12
                0 0 0 0 0.84
                0 0 0 0 1
                0 0 0 .85 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="1" fill="#8ff1ff" opacity=".08"/>
    </pattern>
    <style>
      .wire{fill:none;stroke:#67e6ff;stroke-width:3;stroke-linejoin:round;stroke-linecap:round}
      .wire2{fill:none;stroke:#c7fbff;stroke-opacity:.85;stroke-width:1.6;stroke-linejoin:round;stroke-linecap:round}
      .minor{fill:none;stroke:#67e6ff;stroke-opacity:.35;stroke-width:1.2}
      .glyph{fill:none;stroke:#88f0ff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow)}
      .pip{fill:#a2f5ff;filter:url(#glow)}
      .label{fill:#9feeff;font: 700 11px monospace;letter-spacing:2px}
    </style>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- holographic aura -->
  <g opacity=".45" filter="url(#softGlow)">
    <ellipse cx="252" cy="274" rx="170" ry="138" fill="#0aa9d8" opacity=".12"/>
    <ellipse cx="252" cy="274" rx="120" ry="94" fill="#50ecff" opacity=".10"/>
  </g>

  <!-- cube faces -->
  <polygon points="152,146 274,103 374,162 250,205" fill="url(#faceTop)" stroke="#6de8ff" stroke-opacity=".16"/>
  <polygon points="152,146 152,298 250,365 250,205" fill="url(#faceFront)" stroke="#6de8ff" stroke-opacity=".18"/>
  <polygon points="250,205 374,162 374,318 250,365" fill="url(#faceSide)" stroke="#6de8ff" stroke-opacity=".18"/>

  <!-- scan texture -->
  <polygon points="152,146 274,103 374,162 250,205" fill="url(#scan)" opacity=".14"/>
  <polygon points="152,146 152,298 250,365 250,205" fill="url(#scan)" opacity=".11"/>
  <polygon points="250,205 374,162 374,318 250,365" fill="url(#scan)" opacity=".10"/>

  <!-- major wireframe -->
  <g filter="url(#glow)">
    <polygon class="wire" points="152,146 274,103 374,162 250,205"/>
    <polygon class="wire" points="152,146 152,298 250,365 250,205"/>
    <polygon class="wire" points="250,205 374,162 374,318 250,365"/>
    <line class="wire" x1="152" y1="146" x2="250" y2="205"/>
    <line class="wire" x1="250" y1="205" x2="250" y2="365"/>
    <line class="wire" x1="374" y1="162" x2="250" y2="205"/>
  </g>

  <!-- secondary perspective lines -->
  <g>
    <polygon class="wire2" points="170,156 272,120 355,169 252,204"/>
    <polygon class="wire2" points="169,156 169,288 234,334 234,214"/>
    <polygon class="wire2" points="265,212 356,171 356,303 265,343"/>
    <line class="minor" x1="201" y1="129" x2="200" y2="319"/>
    <line class="minor" x1="232" y1="118" x2="232" y2="340"/>
    <line class="minor" x1="302" y1="115" x2="302" y2="342"/>
    <line class="minor" x1="335" y1="132" x2="335" y2="329"/>
    <line class="minor" x1="152" y1="196" x2="250" y2="252"/>
    <line class="minor" x1="152" y1="247" x2="250" y2="308"/>
    <line class="minor" x1="250" y1="259" x2="374" y2="217"/>
    <line class="minor" x1="250" y1="314" x2="374" y2="267"/>
    <line class="minor" x1="184" y1="135" x2="285" y2="188"/>
    <line class="minor" x1="218" y1="122" x2="318" y2="175"/>
    <line class="minor" x1="250" y1="110" x2="349" y2="164"/>
  </g>

  <!-- top face glyphs -->
  <g transform="translate(256 154) rotate(-20)">
    <circle r="23" class="glyph" opacity=".9"/>
    <path d="M-12 0 H12 M0 -12 V12" class="glyph"/>
    <path d="M-16 -16 L-9 -9 M16 16 L9 9 M16 -16 L9 -9 M-16 16 L-9 9" class="glyph" opacity=".65"/>
  </g>
  <g transform="translate(212 163) rotate(-20)">
    <path d="M-12 0 Q0 -12 12 0 Q0 12 -12 0 Z" class="glyph" opacity=".75"/>
    <path d="M-8 0 H8" class="glyph" opacity=".65"/>
  </g>
  <g transform="translate(310 145) rotate(-20)">
    <path d="M0 -13 L11 0 L0 13 L-11 0 Z" class="glyph" opacity=".75"/>
    <circle r="3" class="pip"/>
  </g>

  <!-- front face glyphs -->
  <g transform="translate(200 248)">
    <path d="M-30 -18 L0 -36 L30 -18 L30 18 L0 36 L-30 18 Z" class="glyph" opacity=".85"/>
    <path d="M-18 0 H18 M0 -18 V18" class="glyph" opacity=".55"/>
    <circle cx="0" cy="0" r="5" class="pip"/>
  </g>
  <g transform="translate(198 307)">
    <path d="M-18 -10 C-4 -22 4 -22 18 -10 C4 2 4 18 18 28 C4 24 -4 24 -18 28 C-4 18 -4 2 -18 -10 Z" class="glyph" opacity=".7"/>
  </g>

  <!-- side face glyphs -->
  <g transform="translate(319 240)">
    <path d="M-22 -22 L22 -22 L22 22 L-22 22 Z" class="glyph" opacity=".78"/>
    <path d="M-22 -22 L22 22 M22 -22 L-22 22" class="glyph" opacity=".5"/>
    <circle r="6" class="pip"/>
  </g>
  <g transform="translate(321 300)">
    <path d="M0 -24 L18 -8 L12 18 L-12 18 L-18 -8 Z" class="glyph" opacity=".7"/>
    <path d="M0 -10 V12 M-8 0 H8" class="glyph" opacity=".55"/>
  </g>

  <!-- tiny nonsense labels -->
  <text x="154" y="390" class="label" opacity=".75">HC-3D / CHANCE CUBE</text>
  <text x="154" y="408" class="label" opacity=".45">WIREFRAME DISPLAY / DICE NODE</text>

  <!-- subtle base reflection -->
  <ellipse cx="260" cy="402" rx="122" ry="24" fill="#46e6ff" opacity=".06"/>
  <ellipse cx="260" cy="404" rx="82" ry="12" fill="#b3f9ff" opacity=".08"/>
</svg>
