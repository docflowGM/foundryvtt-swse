  <text x="92" y="128" font-family="Orbitron, Arial, sans-serif" font-size="16" fill="#bff7ff">STAT</text>
  <text x="226" y="128" font-family="Orbitron, Arial, sans-serif" font-size="16" fill="#bff7ff">SCORE</text>
