<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#071522"/>
      <stop offset="1" stop-color="#020a12"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b2236" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#05121e" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f3551"/>
      <stop offset="0.5" stop-color="#134a70"/>
      <stop offset="1" stop-color="#0f3551"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="1" fill="#8fe8ff" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="720" height="420" fill="url(#bg)"/>
  <rect x="18" y="18" width="684" height="384" rx="12" fill="url(#panel)" stroke="#4ad7ff" stroke-opacity="0.75" stroke-width="2"/>
  <rect x="28" y="28" width="664" height="364" rx="8" fill="none" stroke="#9aefff" stroke-opacity="0.2"/>
  <rect x="18" y="18" width="684" height="384" rx="12" fill="url(#scan)" opacity="0.35"/>

  <!-- corner steel cuts -->
  <path d="M18 50 L18 18 L50 18" fill="none" stroke="#9aefff" stroke-width="3" opacity="0.7"/>
  <path d="M670 18 L702 18 L702 50" fill="none" stroke="#9aefff" stroke-width="3" opacity="0.7"/>
  <path d="M18 370 L18 402 L50 402" fill="none" stroke="#9aefff" stroke-width="3" opacity="0.7"/>
  <path d="M670 402 L702 402 L702 370" fill="none" stroke="#9aefff" stroke-width="3" opacity="0.7"/>

  <rect x="44" y="40" width="632" height="46" rx="6" fill="url(#header)" stroke="#7be8ff" stroke-opacity="0.5"/>
  <text x="360" y="70" text-anchor="middle" font-family="Orbitron, Eurostile, Arial, sans-serif" font-size="24" fill="#dffcff" letter-spacing="2">ATTRIBUTE TABLE</text>

