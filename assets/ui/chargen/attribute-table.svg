  <text x="366" y="293" font-family="Orbitron, Arial, sans-serif" font-size="18" fill="#ff5858" filter="url(#glow)">-1</text>
  <rect x="486" y="277" width="118" height="22" rx="11" fill="#ff5858" fill-opacity="0.12" stroke="#ff5858" stroke-opacity="0.5"/>
