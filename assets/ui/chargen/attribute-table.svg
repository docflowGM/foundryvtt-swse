  <rect x="54" y="360" width="612" height="18" rx="8" fill="#061019" stroke="#2bbde8" stroke-opacity="0.25"/>
  <text x="72" y="374" font-family="Orbitron, Arial, sans-serif" font-size="10" fill="#7ddfff" letter-spacing="2">CURRENT BUILD SNAPSHOT • VALUES AND STATUS UPDATE LIVE</text>
