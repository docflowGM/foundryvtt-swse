  <rect x="34" y="30" width="424" height="36" fill="url(#scanlines)"/>

  <rect x="14" y="32" width="5" height="32" rx="2" fill="#98F7FF" opacity="0.82"/>
  <path d="M32 24H116" stroke="#D4FFFF" stroke-opacity="0.44" stroke-width="1.8" stroke-linecap="round"/>
