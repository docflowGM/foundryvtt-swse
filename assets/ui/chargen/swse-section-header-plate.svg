<?xml version="1.0" encoding="UTF-8"?>
<svg width="520" height="96" viewBox="0 0 520 96" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="18" y1="10" x2="480" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08141D"/>
      <stop offset="0.5" stop-color="#0A1E2A"/>
      <stop offset="1" stop-color="#071018"/>
    </linearGradient>

    <linearGradient id="strokeGradient" x1="20" y1="18" x2="468" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9AF6FF"/>
      <stop offset="0.48" stop-color="#43CCFF"/>
      <stop offset="1" stop-color="#D0FFFF"/>
