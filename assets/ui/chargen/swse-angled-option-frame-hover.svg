<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="220" viewBox="0 0 960 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="48" y1="34" x2="878" y2="186" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#091720"/>
      <stop offset="0.52" stop-color="#0D2230"/>
      <stop offset="1" stop-color="#08131B"/>
    </linearGradient>

    <linearGradient id="innerGradient" x1="74" y1="54" x2="834" y2="166" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#103042" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#091721" stop-opacity="0.86"/>
    </linearGradient>

    <linearGradient id="strokeGradient" x1="54" y1="42" x2="876" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B9FBFF"/>
      <stop offset="0.4" stop-color="#66E7FF"/>
      <stop offset="0.72" stop-color="#35CBFF"/>
      <stop offset="1" stop-color="#C9FDFF"/>
    </linearGradient>

    <linearGradient id="accentGradient" x1="54" y1="174" x2="876" y2="174" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#30D7FF" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#95FAFF" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#30D7FF" stop-opacity="0.16"/>
    </linearGradient>

    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(492 110) rotate(180) scale(345 78)">
      <stop offset="0" stop-color="#5FEFFF" stop-opacity="0.18"/>
      <stop offset="0.58" stop-color="#1FCBFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#1FCBFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="outerGlow" x="-35%" y="-120%" width="170%" height="340%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#57E7FF" flood-opacity="0.56"/>
      <feDropShadow dx="0" dy="0" stdDeviation="13" flood-color="#0FBEFF" flood-opacity="0.24"/>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="panelClip">
      <path d="M56 40H848L904 96V124L848 180H56V40Z"/>
    </clipPath>

    <pattern id="scanlines" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="transparent"/>
      <rect y="0" width="6" height="1" fill="#D6FFFF" opacity="0.055"/>
      <rect y="3" width="6" height="1" fill="#86F3FF" opacity="0.038"/>
    </pattern>
  </defs>

  <path d="M56 40H848L904 96V124L848 180H56V40Z" fill="#08141C" opacity="0.91" filter="url(#outerGlow)"/>

  <path
    d="M56 40H848L904 96V124L848 180H56V40Z"
    fill="url(#bgGradient)"
    stroke="url(#strokeGradient)"
    stroke-width="5.1"
    stroke-linejoin="round"
  />

  <path
    d="M74 58H839L883 101V119L839 162H74V58Z"
    fill="url(#innerGradient)"
    stroke="#BDFBFF"
    stroke-opacity="0.28"
    stroke-width="1.65"
  />

  <rect x="74" y="58" width="809" height="104" fill="url(#coreGlow)" clip-path="url(#panelClip)"/>
  <rect x="74" y="58" width="809" height="104" fill="url(#scanlines)" clip-path="url(#panelClip)"/>

  <path d="M84 67H829L867 103" stroke="#E8FFFF" stroke-opacity="0.46" stroke-width="1.65" stroke-linecap="round"/>
  <path d="M84 153H829L867 117" stroke="#67E7FF" stroke-opacity="0.29" stroke-width="1.65" stroke-linecap="round"/>

  <rect x="48" y="62" width="7.5" height="95" rx="2" fill="#C6FDFF" opacity="0.94"/>
  <rect x="45" y="59" width="13" height="101" rx="4" fill="#48DEFF" opacity="0.18" filter="url(#softGlow)"/>

  <rect x="90" y="168" width="745" height="4.2" rx="2.1" fill="url(#accentGradient)"/>
  <path d="M846 41L902 96V124L846 179" stroke="#E9FFFF" stroke-opacity="0.54" stroke-width="2.3"/>

  <path d="M60 44H103" stroke="#EDFFFF" stroke-opacity="0.64" stroke-width="2.1" stroke-linecap="round"/>
  <path d="M60 176H103" stroke="#86F4FF" stroke-opacity="0.40" stroke-width="2.1" stroke-linecap="round"/>

  <!-- Hover-state prompt accent -->
  <path d="M811 96L826 110L811 124" stroke="#DFFFFF" stroke-opacity="0.78" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
