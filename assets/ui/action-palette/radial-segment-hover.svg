<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360" fill="none">
<defs>
  <linearGradient id="strokeGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#b8f7ff"/>
    <stop offset="28%" stop-color="#6dd7ff"/>
    <stop offset="68%" stop-color="#2a7fd0"/>
    <stop offset="100%" stop-color="#d7ffff"/>
  </linearGradient>
  <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#10253f" stop-opacity="0.94"/>
    <stop offset="55%" stop-color="#0a1730" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#06111f" stop-opacity="0.96"/>
  </linearGradient>
  <linearGradient id="innerGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#dbffff" stop-opacity="0.42"/>
    <stop offset="100%" stop-color="#5fc7ff" stop-opacity="0.08"/>
  </linearGradient>
  <radialGradient id="glowCore" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#bfffff" stop-opacity="0.38"/>
    <stop offset="55%" stop-color="#59c9ff" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#10375f" stop-opacity="0"/>
  </radialGradient>
  <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="7" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="hardGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="transparent"/>
    <rect width="8" height="1" fill="#d2ffff" opacity="0.06"/>
  </pattern>
</defs>
  <g transform="translate(180 180)">
    <path d="M 20 -144 A 145 145 0 0 1 130 -62 L 88 -42 A 98 98 0 0 0 14 -96 Z" fill="rgba(24,58,92,0.96)" stroke="#c4ffff" stroke-width="3.2" filter="url(#softGlow)"/>
    <path d="M 34 -126 A 126 126 0 0 1 109 -70" stroke="#d9ffff" stroke-opacity="0.72" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 51 -118 L 72 -86" stroke="#86e9ff" stroke-opacity="0.45" stroke-width="1.4"/>
    <path d="M 73 -106 L 96 -78" stroke="#86e9ff" stroke-opacity="0.28" stroke-width="1.2"/>
    <circle cx="108" cy="-79" r="3.5" fill="#cfffff" opacity="1" filter="url(#hardGlow)"/>
    <path d="M 12 -110 A 111 111 0 0 1 92 -54" stroke="#54c4ff" stroke-opacity="0.35" stroke-width="1.4" stroke-dasharray="4 8"/>
  </g>
</svg>
