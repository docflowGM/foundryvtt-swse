      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="transparent"/>
    <rect width="8" height="1" fill="#d2ffff" opacity="0.06"/>
  </pattern>
</defs>
