<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
<defs>
  <linearGradient id="strokeGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#b8f7ff"/>
    <stop offset="28%" stop-color="#6dd7ff"/>
    <stop offset="68%" stop-color="#2a7fd0"/>
    <stop offset="100%" stop-color="#d7ffff"/>
  </linearGradient>
  <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#10253f" stop-opacity="0.94"/>
    <stop offset="55%" stop-color="#0a1730" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#06111f" stop-opacity="0.96"/>
  </linearGradient>
  <linearGradient id="innerGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#dbffff" stop-opacity="0.42"/>
    <stop offset="100%" stop-color="#5fc7ff" stop-opacity="0.08"/>
  </linearGradient>
  <radialGradient id="glowCore" cx="50%" cy="50%" r="50%">
