<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640" fill="none">
<defs>
  <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#bff8ff"/>
    <stop offset="28%" stop-color="#67d5ff"/>
    <stop offset="68%" stop-color="#2c79cf"/>
    <stop offset="100%" stop-color="#dbffff"/>
  </linearGradient>
  <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#10233c" stop-opacity="0.94"/>
    <stop offset="55%" stop-color="#0a1730" stop-opacity="0.88"/>
    <stop offset="100%" stop-color="#06111f" stop-opacity="0.96"/>
  </linearGradient>
  <linearGradient id="warmFill" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3b2810" stop-opacity="0.94"/>
    <stop offset="55%" stop-color="#211709" stop-opacity="0.88"/>
    <stop offset="100%" stop-color="#140d05" stop-opacity="0.96"/>
  </linearGradient>
  <linearGradient id="redFill" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3a121b" stop-opacity="0.96"/>
    <stop offset="55%" stop-color="#240b11" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#15070b" stop-opacity="0.98"/>
  </linearGradient>
  <linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#103428" stop-opacity="0.96"/>
    <stop offset="55%" stop-color="#0c221a" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#08150f" stop-opacity="0.98"/>
  </linearGradient>
  <linearGradient id="innerGlow" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#dfffff" stop-opacity="0.40"/>
    <stop offset="100%" stop-color="#5bc5ff" stop-opacity="0.06"/>
  </linearGradient>
  <radialGradient id="glowCore" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#d8ffff" stop-opacity="0.38"/>
    <stop offset="55%" stop-color="#59c8ff" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#10365f" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="warnGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffe9ad" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#ffb953" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="dangerGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffb7cb" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#ff709a" stop-opacity="0"/>
  </radialGradient>
  <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="7" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="tinyGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="2.3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="scanlines" width="6" height="6" patternUnits="userSpaceOnUse">
    <rect width="6" height="6" fill="transparent"/>
    <rect width="6" height="1" fill="#cbffff" opacity="0.06"/>
  </pattern>
</defs>

  <circle cx="320" cy="320" r="312" fill="url(#glowCore)" opacity="0.65"/>
  <circle cx="320" cy="320" r="238" fill="rgba(4,11,21,0.16)" stroke="url(#panelStroke)" stroke-width="4" filter="url(#softGlow)"/>
  <circle cx="320" cy="320" r="194" stroke="#9cf2ff" stroke-opacity="0.22" stroke-width="2"/>
  <circle cx="320" cy="320" r="270" stroke="#8cefff" stroke-opacity="0.28" stroke-width="3" stroke-dasharray="10 18"/>
  <circle cx="320" cy="320" r="290" stroke="#68ccff" stroke-opacity="0.36" stroke-width="2" stroke-dasharray="28 22" transform="rotate(-14 320 320)"/>
  <circle cx="320" cy="320" r="308" stroke="url(#innerGlow)" stroke-width="1.5"/>
