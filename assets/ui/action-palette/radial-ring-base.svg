<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640" fill="none">
<defs>
  <linearGradient id="strokeGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#b8f7ff"/>
    <stop offset="28%" stop-color="#6dd7ff"/>
    <stop offset="68%" stop-color="#2a7fd0"/>
    <stop offset="100%" stop-color="#d7ffff"/>
  </linearGradient>
  <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#10253f" stop-opacity="0.94"/>
    <stop offset="55%" stop-color="#0a1730" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#06111f" stop-opacity="0.96"/>
  </linearGradient>
  <linearGradient id="innerGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#dbffff" stop-opacity="0.42"/>
    <stop offset="100%" stop-color="#5fc7ff" stop-opacity="0.08"/>
  </linearGradient>
  <radialGradient id="glowCore" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#bfffff" stop-opacity="0.38"/>
    <stop offset="55%" stop-color="#59c9ff" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#10375f" stop-opacity="0"/>
  </radialGradient>
  <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="7" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="hardGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="transparent"/>
    <rect width="8" height="1" fill="#d2ffff" opacity="0.06"/>
  </pattern>
</defs>
  <circle cx="320" cy="320" r="300" fill="url(#glowCore)" opacity="0.7"/>
  <circle cx="320" cy="320" r="238" fill="rgba(3,8,18,0.2)" stroke="url(#strokeGrad)" stroke-width="4" filter="url(#softGlow)"/>
  <circle cx="320" cy="320" r="192" stroke="#99f3ff" stroke-opacity="0.22" stroke-width="2"/>
  <circle cx="320" cy="320" r="268" stroke="#8befff" stroke-opacity="0.28" stroke-width="3" stroke-dasharray="10 18"/>
  <circle cx="320" cy="320" r="286" stroke="#65cfff" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="30 22" transform="rotate(-14 320 320)"/>
  <path d="M320 28v32M320 580v32M28 320h32M580 320h32M114 114l22 22M504 504l22 22M526 114l-22 22M136 504l-22 22" stroke="#aef9ff" stroke-opacity="0.62" stroke-width="4" stroke-linecap="round"/>
