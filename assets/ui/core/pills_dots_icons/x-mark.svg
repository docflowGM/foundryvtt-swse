<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="panelStroke" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8DE8FF"/>
      <stop offset="0.3" stop-color="#54B9FF"/>
      <stop offset="0.65" stop-color="#2A6AB8"/>
      <stop offset="1" stop-color="#A7F7FF"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F2238" stop-opacity="0.92"/>
      <stop offset="0.55" stop-color="#0A1730" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#07111F" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0" y1="0" x2="160" y2="160">
      <stop stop-color="#B5F9FF" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#56BCFF" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="transparent"/>
      <rect y="0" width="6" height="1" fill="#C9FFFF" opacity="0.06"/>
    </pattern>
    
  </defs>
  
    <rect x="0" y="0" width="160" height="160" rx="18" fill="#06101B"/>
    <path d="M28 8 H62 l18 0 26 18 H132 l16 16 V120 l-18 18 H92 l-22 0 -26 -18 H28 l-16 -16 V38 l18 -18 Z" fill="url(#panelFill)" stroke="url(#panelStroke)" stroke-width="3.5"/>
    <path d="M56 36 H88 l20 0 14 10 H106 l12 12 V102 l-12 12 H54 l-12 -12 V56 l12 -12 Z" fill="rgba(6,17,27,0.82)" stroke="url(#innerGlow)" stroke-width="1.5"/>
    <rect x="24" y="24" width="112" height="112" rx="12" fill="url(#scanlines)" opacity="0.35"/>
    <circle cx="114" cy="32" r="4" fill="#99F6FF" filter="url(#tinyGlow)"/>
    <circle cx="100" cy="32" r="2" fill="#53B9FF"/>
    
    
<circle cx="80" cy="80" r="44" fill="#0A1730" stroke="url(#panelStroke)" stroke-width="3"/>
<path d="M58 58 l44 44 M102 58 l-44 44" stroke="#87EBFF" stroke-width="8" stroke-linecap="round" filter="url(#tinyGlow)"/>

</svg>