<?xml version='1.0' encoding='utf-8'?>
<ns0:svg xmlns:ns0="http://www.w3.org/2000/svg" width="280" height="100" viewBox="0 0 280 100" fill="none">
  <ns0:defs>
    <ns0:linearGradient id="panelStroke" x1="0" y1="0" x2="280" y2="100" gradientUnits="userSpaceOnUse">
      <ns0:stop stop-color="#8DE8FF" />
      <ns0:stop offset="0.3" stop-color="#54B9FF" />
      <ns0:stop offset="0.65" stop-color="#2A6AB8" />
      <ns0:stop offset="1" stop-color="#A7F7FF" />
    </ns0:linearGradient>
    <ns0:linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <ns0:stop stop-color="#0F2238" stop-opacity="0.92" />
      <ns0:stop offset="0.55" stop-color="#0A1730" stop-opacity="0.85" />
      <ns0:stop offset="1" stop-color="#07111F" stop-opacity="0.95" />
    </ns0:linearGradient>
    <ns0:linearGradient id="innerGlow" x1="0" y1="0" x2="280" y2="100">
      <ns0:stop stop-color="#B5F9FF" stop-opacity="0.4" />
      <ns0:stop offset="1" stop-color="#56BCFF" stop-opacity="0.05" />
    </ns0:linearGradient>
    <ns0:filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <ns0:feGaussianBlur stdDeviation="8" result="blur" />
      <ns0:feMerge><ns0:feMergeNode in="blur" /><ns0:feMergeNode in="SourceGraphic" /></ns0:feMerge>
    </ns0:filter>
    <ns0:filter id="tinyGlow" x="-20%" y="-20%" width="140%" height="140%">
      <ns0:feGaussianBlur stdDeviation="2" result="blur" />
      <ns0:feMerge><ns0:feMergeNode in="blur" /><ns0:feMergeNode in="SourceGraphic" /></ns0:feMerge>
    </ns0:filter>
    <ns0:pattern id="scanlines" width="6" height="6" patternUnits="userSpaceOnUse">
      <ns0:rect width="6" height="6" fill="transparent" />
      <ns0:rect y="0" width="6" height="1" fill="#C9FFFF" opacity="0.06" />
    </ns0:pattern>
    
  </ns0:defs>
  
    <ns0:rect x="0" y="0" width="280" height="100" rx="18" fill="#06101B" />
