<ns0:svg xmlns:ns0="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" fill="none">
  <ns0:defs>
    <ns0:linearGradient id="panelStroke" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <ns0:stop stop-color="#8DE8FF" />
      <ns0:stop offset="0.3" stop-color="#54B9FF" />
      <ns0:stop offset="0.65" stop-color="#2A6AB8" />
      <ns0:stop offset="1" stop-color="#A7F7FF" />
    </ns0:linearGradient>
    <ns0:linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="720" gradientUnits="userSpaceOnUse">
      <ns0:stop stop-color="#0F2238" stop-opacity="0.92" />
      <ns0:stop offset="0.55" stop-color="#0A1730" stop-opacity="0.85" />
      <ns0:stop offset="1" stop-color="#07111F" stop-opacity="0.95" />
