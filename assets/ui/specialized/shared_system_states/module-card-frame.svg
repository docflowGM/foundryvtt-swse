<svg xmlns="http://www.w3.org/2000/svg" width="220" height="80" viewBox="0 0 220 80">
    
    <defs>
      <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#9de1ff" stop-opacity="0.95"/>
        <stop offset="60%" stop-color="#4cb0ff" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#1b4f9a" stop-opacity="0.7"/>
      </linearGradient>
      <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0f233d" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#06111f" stop-opacity="0.35"/>
      </linearGradient>
      <linearGradient id="glowLine" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#7fd8ff" stop-opacity="0"/>
        <stop offset="50%" stop-color="#7fd8ff" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#7fd8ff" stop-opacity="0"/>
      </linearGradient>
      <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <pattern id="scan" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
        <rect x="0" y="0" width="8" height="1" fill="#b4e6ff" opacity="0.06"/>
      </pattern>
      
    </defs>
    
    <rect x="0" y="0" width="220" height="80" fill="transparent"/>
    
    <path d="M 14 2 H 206 L 218 14 V 66 L 206 78 H 14 L 2 66 V 14 Z"
          fill="url(#fill)" stroke="url(#edge)" stroke-width="2"/>
    <path d="M 22 10 H 198 L 210 22 V 58 L 198 70 H 22 L 10 58 V 22 Z"
          fill="none" stroke="#8fdcff" stroke-opacity="0.25" stroke-width="1"/>
    <rect x="8" y="8" width="204" height="64" fill="url(#scan)" opacity="0.35"/>
    <line x1="18" y1="68" x2="202" y2="68" stroke="url(#glowLine)" stroke-width="2" filter="url(#glow)"/>
    <rect x="16" y="16" width="58" height="18" rx="6" fill="#0b1830" stroke="#67c4ff" stroke-opacity="0.35"/><rect x="84" y="18" width="120" height="8" rx="4" fill="#0b1830" stroke="#67c4ff" stroke-opacity="0.25"/><rect x="16" y="46" width="188" height="12" rx="6" fill="#081222" stroke="#67c4ff" stroke-opacity="0.2"/>
    </svg>