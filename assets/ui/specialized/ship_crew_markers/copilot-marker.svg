<svg xmlns="http://www.w3.org/2000/svg" width="120" height="40" viewBox="0 0 120 40">
    
    <defs>
      <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#9de1ff" stop-opacity="0.95"/>
        <stop offset="60%" stop-color="#4cb0ff" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#1b4f9a" stop-opacity="0.7"/>
      </linearGradient>
      <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0f233d" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#06111f" stop-opacity="0.35"/>
      </linearGradient>
      <linearGradient id="glowLine" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#7fd8ff" stop-opacity="0"/>
        <stop offset="50%" stop-color="#7fd8ff" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#7fd8ff" stop-opacity="0"/>
      </linearGradient>
      <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <pattern id="scan" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
        <rect x="0" y="0" width="8" height="1" fill="#b4e6ff" opacity="0.06"/>
      </pattern>
      
    </defs>
    
    <rect x="0" y="0" width="120" height="40" fill="transparent"/>
    <path d="M 8 2 H 104 L 118 20.0 L 104 38 H 8 L 2 20.0 Z" fill="url(#fill)" stroke="url(#edge)" stroke-width="2"/>
    <path d="M 8 2 H 104 L 118 20.0 L 104 38 H 8 L 2 20.0 Z" fill="none" stroke="#9ae4ff" stroke-opacity="0.18" stroke-width="5" filter="url(#glow)"/>
    <circle cx="34" cy="20" r="8" fill="none" stroke="#9ae4ff" stroke-width="2"/><circle cx="50" cy="20" r="8" fill="none" stroke="#64c0ff" stroke-width="2"/>
