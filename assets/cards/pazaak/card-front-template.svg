<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040e18"/>
      <stop offset="100%" stop-color="#071a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39f7ff" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#39f7ff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#39f7ff" stop-opacity="0.12"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39f7ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#39f7ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="300" height="420" rx="14" fill="url(#bg)"/>

  <!-- Scan lines -->
  <g opacity="0.07" stroke="#39f7ff" stroke-width="0.5">
    <line x1="0" y1="42" x2="300" y2="42"/>
    <line x1="0" y1="84" x2="300" y2="84"/>
    <line x1="0" y1="126" x2="300" y2="126"/>
    <line x1="0" y1="168" x2="300" y2="168"/>
    <line x1="0" y1="210" x2="300" y2="210"/>
    <line x1="0" y1="252" x2="300" y2="252"/>
    <line x1="0" y1="294" x2="300" y2="294"/>
    <line x1="0" y1="336" x2="300" y2="336"/>
    <line x1="0" y1="378" x2="300" y2="378"/>
  </g>

  <!-- Vertical scan lines -->
  <g opacity="0.04" stroke="#39f7ff" stroke-width="0.5">
    <line x1="50" y1="0" x2="50" y2="420"/>
    <line x1="100" y1="0" x2="100" y2="420"/>
    <line x1="150" y1="0" x2="150" y2="420"/>
    <line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="250" y1="0" x2="250" y2="420"/>
  </g>

  <!-- Gradient overlay -->
  <rect width="300" height="420" rx="14" fill="url(#glow)"/>

  <!-- Center glow -->
  <ellipse cx="150" cy="210" rx="120" ry="160" fill="url(#center-glow)"/>

  <!-- Border glow (inner) -->
  <rect x="2" y="2" width="296" height="416" rx="13" fill="none" stroke="#39f7ff" stroke-width="1" opacity="0.22"/>

  <!-- Corner brackets — top-left -->
  <g stroke="#39f7ff" stroke-width="1.5" fill="none" opacity="0.7">
    <polyline points="12,32 12,12 32,12"/>
    <polyline points="268,32 268,12 248,12"/>
    <polyline points="12,388 12,408 32,408"/>
    <polyline points="268,388 268,408 248,408"/>
  </g>

  <!-- Center diamond -->
  <polygon points="150,168 174,210 150,252 126,210" fill="none" stroke="#39f7ff" stroke-width="1" opacity="0.28"/>
  <polygon points="150,182 164,210 150,238 136,210" fill="none" stroke="#39f7ff" stroke-width="0.5" opacity="0.18"/>

  <!-- Top & bottom accent lines -->
  <line x1="40" y1="22" x2="260" y2="22" stroke="#39f7ff" stroke-width="0.75" opacity="0.3"/>
  <line x1="40" y1="398" x2="260" y2="398" stroke="#39f7ff" stroke-width="0.75" opacity="0.3"/>

  <!-- Side dots -->
  <g fill="#39f7ff" opacity="0.35">
    <circle cx="10" cy="210" r="2"/>
    <circle cx="290" cy="210" r="2"/>
  </g>
</svg>
