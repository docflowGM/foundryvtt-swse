<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-back" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020b12"/>
      <stop offset="100%" stop-color="#040f1c"/>
    </linearGradient>
    <linearGradient id="stripe-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39f7ff" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#39f7ff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#39f7ff" stop-opacity="0.06"/>
    </linearGradient>
    <radialGradient id="back-glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#39f7ff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#39f7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="emblem-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39f7ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#39f7ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="300" height="420" rx="14" fill="url(#bg-back)"/>

  <!-- Dense horizontal scan lines (tighter pattern for back) -->
  <g opacity="0.05" stroke="#39f7ff" stroke-width="0.5">
    <line x1="0" y1="21" x2="300" y2="21"/>
    <line x1="0" y1="42" x2="300" y2="42"/>
    <line x1="0" y1="63" x2="300" y2="63"/>
    <line x1="0" y1="84" x2="300" y2="84"/>
    <line x1="0" y1="105" x2="300" y2="105"/>
    <line x1="0" y1="126" x2="300" y2="126"/>
    <line x1="0" y1="147" x2="300" y2="147"/>
    <line x1="0" y1="168" x2="300" y2="168"/>
    <line x1="0" y1="189" x2="300" y2="189"/>
    <line x1="0" y1="210" x2="300" y2="210"/>
    <line x1="0" y1="231" x2="300" y2="231"/>
    <line x1="0" y1="252" x2="300" y2="252"/>
    <line x1="0" y1="273" x2="300" y2="273"/>
    <line x1="0" y1="294" x2="300" y2="294"/>
    <line x1="0" y1="315" x2="300" y2="315"/>
    <line x1="0" y1="336" x2="300" y2="336"/>
    <line x1="0" y1="357" x2="300" y2="357"/>
    <line x1="0" y1="378" x2="300" y2="378"/>
    <line x1="0" y1="399" x2="300" y2="399"/>
  </g>

  <!-- Stripe overlay -->
  <rect width="300" height="420" rx="14" fill="url(#stripe-fade)"/>

  <!-- Subtle center glow -->
  <ellipse cx="150" cy="210" rx="110" ry="150" fill="url(#back-glow)"/>

  <!-- Border glow (inner) — dimmer than front -->
  <rect x="2" y="2" width="296" height="416" rx="13" fill="none" stroke="#39f7ff" stroke-width="1" opacity="0.14"/>

  <!-- Outer border -->
  <rect x="8" y="8" width="284" height="404" rx="10" fill="none" stroke="#39f7ff" stroke-width="0.5" opacity="0.08"/>

  <!-- Corner brackets -->
  <g stroke="#39f7ff" stroke-width="1.5" fill="none" opacity="0.5">
    <polyline points="12,32 12,12 32,12"/>
    <polyline points="268,32 268,12 248,12"/>
    <polyline points="12,388 12,408 32,408"/>
    <polyline points="268,388 268,408 248,408"/>
  </g>

  <!-- Central emblem glow -->
  <ellipse cx="150" cy="210" rx="60" ry="60" fill="url(#emblem-glow)"/>

  <!-- Aurebesh-style geometric emblem (stylized "P" for Pazaak) -->
  <!-- Outer ring -->
  <circle cx="150" cy="210" r="52" fill="none" stroke="#39f7ff" stroke-width="1" opacity="0.22"/>
  <circle cx="150" cy="210" r="46" fill="none" stroke="#39f7ff" stroke-width="0.5" opacity="0.12"/>

  <!-- Inner geometric star / compass rose -->
  <g stroke="#39f7ff" fill="none" opacity="0.3">
    <!-- 8-point star outline -->
    <polygon points="150,162 156,200 188,188 176,220 214,214 200,244 238,250 210,268 220,304 192,286 188,324 164,302 150,340 136,302 112,324 108,286 80,304 90,268 62,250 100,244 86,220 124,188 156,200" stroke-width="0.5" opacity="0.08"/>
    <!-- Simplified inner compass cross -->
    <line x1="150" y1="168" x2="150" y2="252" stroke-width="0.75" opacity="0.2"/>
    <line x1="108" y1="210" x2="192" y2="210" stroke-width="0.75" opacity="0.2"/>
    <line x1="121" y1="181" x2="179" y2="239" stroke-width="0.5" opacity="0.14"/>
    <line x1="179" y1="181" x2="121" y2="239" stroke-width="0.5" opacity="0.14"/>
  </g>

  <!-- Central diamond -->
  <polygon points="150,186 170,210 150,234 130,210" fill="none" stroke="#39f7ff" stroke-width="1" opacity="0.32"/>
  <polygon points="150,196 162,210 150,224 138,210" fill="none" stroke="#39f7ff" stroke-width="0.5" opacity="0.18"/>
  <!-- Diamond center dot -->
  <circle cx="150" cy="210" r="2.5" fill="#39f7ff" opacity="0.3"/>

  <!-- Top & bottom accent lines -->
  <line x1="40" y1="22" x2="260" y2="22" stroke="#39f7ff" stroke-width="0.75" opacity="0.2"/>
  <line x1="40" y1="398" x2="260" y2="398" stroke="#39f7ff" stroke-width="0.75" opacity="0.2"/>

  <!-- Side tick marks (decorative) -->
  <g stroke="#39f7ff" stroke-width="1" opacity="0.2">
    <line x1="2" y1="190" x2="8" y2="190"/>
    <line x1="2" y1="210" x2="10" y2="210"/>
    <line x1="2" y1="230" x2="8" y2="230"/>
    <line x1="292" y1="190" x2="298" y2="190"/>
    <line x1="290" y1="210" x2="298" y2="210"/>
    <line x1="292" y1="230" x2="298" y2="230"/>
  </g>

  <!-- Side dots -->
  <g fill="#39f7ff" opacity="0.22">
    <circle cx="10" cy="210" r="2"/>
    <circle cx="290" cy="210" r="2"/>
  </g>
</svg>
