<!-- system/templates/apps/store/gm-settings.html -->
<form>
  <div class="form-group">
    <label>{{localize 'SWSE.Store.GMSettings.BuyPriceMultiplier'}}</label>
    <input type="number" step="0.1" name="buyMultiplier" value="{{buyMultiplier}}" />
  </div>

  <div class="form-group">
    <label>{{localize 'SWSE.Store.GMSettings.SellPriceMultiplier'}}</label>
    <input type="number" step="0.1" name="sellMultiplier" value="{{sellMultiplier}}" />
  </div>

  <footer class="form-footer">
    <button type="submit">{{localize 'SWSE.Store.GMSettings.Save'}}</button>
  </footer>
</form>
