name: Temporary wire world NPC damage hydration

on:
  push:
    branches:
      - feat/npc-world-damage-hydration

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/npc-world-damage-hydration
      - name: Wire hydration hooks
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'index.js';
          let source = fs.readFileSync(path, 'utf8');
          const importMarker = 'import { installSwseFlagScopeCompatibility } from "./scripts/utils/flags/swse-flags.js";\n';
          const importLine = 'import { registerNpcDamageHydrationHooks } from "./scripts/engine/import/npc-damage-hydration-hooks.js";\n';
          if (!source.includes(importLine)) {
            if (!source.includes(importMarker)) throw new Error('import marker not found');
            source = source.replace(importMarker, importMarker + importLine);
          }
          const callMarker = '  registerCompendiumDirectoryClickRepair();\n';
          const callLine = '  registerNpcDamageHydrationHooks();\n';
          if (!source.includes(callLine)) {
            if (!source.includes(callMarker)) throw new Error('call marker not found');
            source = source.replace(callMarker, callMarker + callLine);
          }
          fs.writeFileSync(path, source);
          NODE
          node --check index.js
          node --check scripts/engine/import/npc-damage-hydration-hooks.js
      - name: Commit wiring
        run: |
          if git diff --quiet -- index.js; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.js
          git commit -m "feat: register world NPC damage hydration"
          git push origin HEAD:feat/npc-world-damage-hydration
