name: Temporary wire NPC bulk damage profiles

on:
  push:
    branches:
      - feat/wire-npc-bulk-damage

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/wire-npc-bulk-damage
      - name: Patch hydrator and add audit
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'scripts/engine/import/nonheroic-damage-profile-hydrator.js';
          let source = fs.readFileSync(path, 'utf8');

          const oldFiles = `  'data/nonheroic/nonheroic-weapon-damage-profiles.nh5-scavengers-guide-droids.json'\n]);`;
          const newFiles = `  'data/nonheroic/nonheroic-weapon-damage-profiles.nh5-scavengers-guide-droids.json',\n  'data/nonheroic/nonheroic-weapon-damage-profiles.bulk-lane-a-pass-1.json',\n  'data/nonheroic/nonheroic-weapon-damage-profiles.bulk-lane-a-pass-2.json',\n  'data/nonheroic/nonheroic-weapon-damage-profiles.bulk-lane-a-pass-3.json',\n  'data/nonheroic/nonheroic-weapon-damage-profiles.bulk-lane-a-pass-4.json',\n  'data/nonheroic/nonheroic-weapon-damage-profiles.bulk-lane-a-pass-5.json'\n]);`;
          if (!source.includes(oldFiles)) throw new Error('PROFILE_FILES insertion marker not found');
          source = source.replace(oldFiles, newFiles);

          const oldGate = `function isWireableProfile(profile) {\n  return WIREABLE_CONFIDENCE.has(profile?.confidence);\n}`;
          const newGate = `function isSafeBulkLaneAProfile(profile) {\n  const tags = new Set(asArray(profile?.tags).map((tag) => cleanText(tag).toLowerCase()));\n  const formulaMode = cleanText(profile?.formula?.mode);\n  const actorSlugs = asArray(profile?.match?.actorSlugs).map(slugifyStatblockName).filter(Boolean);\n  const rawIncludes = asArray(profile?.match?.rawIncludes).map(cleanText).filter(Boolean);\n  const components = asArray(profile?.components);\n  const riders = asArray(profile?.riders);\n  const attack = profile?.attack ?? {};\n  const area = profile?.area ?? {};\n\n  return profile?.confidence === 'manualRequired'\n    && tags.has('generated-candidate')\n    && profile?.source?.status === 'repo-raw-statblock-field; page review still required'\n    && actorSlugs.length > 0\n    && rawIncludes.length > 0\n    && !!cleanText(profile?.weapon?.uuid)\n    && ['melee', 'ranged'].includes(cleanText(profile?.weapon?.rowKind))\n    && !!cleanText(profile?.formula?.printed)\n    && ['base', 'base-plus-delta', 'base-plus-dice'].includes(formulaMode)\n    && profile?.delivery === 'weapon'\n    && profile?.attackShape === 'single-target'\n    && attack.isArea === false\n    && !area?.shape\n    && riders.length === 0\n    && components.length > 0\n    && components.every((component) => !!cleanText(component?.formula));\n}\n\nfunction hydrationPolicy(profile) {\n  if (WIREABLE_CONFIDENCE.has(profile?.confidence)) return 'source-verified';\n  if (isSafeBulkLaneAProfile(profile)) return 'safe-bulk-lane-a';\n  return null;\n}\n\nfunction isWireableProfile(profile) {\n  return hydrationPolicy(profile) !== null;\n}`;
          if (!source.includes(oldGate)) throw new Error('wireable gate marker not found');
          source = source.replace(oldGate, newGate);

          source = source.replace(
            `    statblockHydrationConfidence: profile.confidence ?? null,\n`,
            `    statblockHydrationConfidence: profile.confidence ?? null,\n    statblockHydrationPolicy: hydrationPolicy(profile),\n`
          );
          source = source.replace(
            `          confidence: profile.confidence ?? null,\n          reviewRequired: !!profile.reviewRequired,\n`,
            `          confidence: profile.confidence ?? null,\n          hydrationPolicy: hydrationPolicy(profile),\n          reviewRequired: !!profile.reviewRequired,\n`
          );
          source = source.replace(
            `        confidence: profile.confidence ?? null,\n        sourceWeaponUuid: weaponRef.uuid ?? null,\n`,
            `        confidence: profile.confidence ?? null,\n        hydrationPolicy: hydrationPolicy(profile),\n        sourceWeaponUuid: weaponRef.uuid ?? null,\n`
          );

          fs.writeFileSync(path, source);

          const audit = `# NPC Bulk Lane A Damage Runtime Activation\n\n## Scope\n\nThis change activates the five previously promoted Bulk Lane A profile files for NPC template-import hydration. It does not change their source-review confidence and does not mutate actor or compendium packs.\n\n## Activated data\n\n- Pass 1: 10 records\n- Pass 2: 25 records\n- Pass 3: 50 records\n- Pass 4: 100 records\n- Pass 5: 402 records\n- Total: 587 records\n\n## Runtime safety gate\n\nA Bulk Lane A record is wireable only when all of these remain true:\n\n- confidence is still manualRequired\n- tagged generated-candidate\n- source status identifies the repository raw statblock field\n- actor-slug and raw-row match evidence both exist\n- exact source weapon UUID exists\n- row kind is melee or ranged\n- formula mode is base, base-plus-delta, or base-plus-dice\n- delivery is weapon and attack shape is single-target\n- the row is not an area attack\n- no area shape exists\n- no riders exist\n- every damage component has an explicit formula\n\nThis keeps natural/unarmed, area, autofire, grenade, rider, condition, ambiguous, unmatched, and unclear-formula rows excluded.\n\n## Provenance\n\nHydrated items retain confidence: manualRequired and now record hydrationPolicy: safe-bulk-lane-a. Source-verified records record hydrationPolicy: source-verified. This allows runtime use without falsely claiming page-level source verification.\n\n## Boundaries\n\n- No printed attack bonus is applied to attack math.\n- No actor pack is rewritten.\n- No compendium pack is rewritten.\n- No rider execution or area geometry is added.\n- Existing verified NH1-NH5 behavior remains unchanged.\n`;
          fs.writeFileSync('docs/audits/nonheroic-bulk-lane-a-runtime-activation.md', audit);
          NODE
          node --check scripts/engine/import/nonheroic-damage-profile-hydrator.js
          node -e "JSON.parse(require('fs').readFileSync('data/nonheroic/nonheroic-weapon-damage-profiles.bulk-lane-a-pass-1.json','utf8')); JSON.parse(require('fs').readFileSync('data/nonheroic/nonheroic-weapon-damage-profiles.bulk-lane-a-pass-2.json','utf8')); JSON.parse(require('fs').readFileSync('data/nonheroic/nonheroic-weapon-damage-profiles.bulk-lane-a-pass-3.json','utf8')); JSON.parse(require('fs').readFileSync('data/nonheroic/nonheroic-weapon-damage-profiles.bulk-lane-a-pass-4.json','utf8')); JSON.parse(require('fs').readFileSync('data/nonheroic/nonheroic-weapon-damage-profiles.bulk-lane-a-pass-5.json','utf8'));"
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/engine/import/nonheroic-damage-profile-hydrator.js docs/audits/nonheroic-bulk-lane-a-runtime-activation.md
          git commit -m "feat: activate safe bulk NPC damage profiles"
          git push origin HEAD:feat/wire-npc-bulk-damage
