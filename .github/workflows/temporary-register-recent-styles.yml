name: Temporary manifest style registration

on:
  push:
    branches:
      - fix/register-recent-styles

permissions:
  contents: write

jobs:
  patch-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/register-recent-styles
      - name: Register recent styles
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'system.json';
          const source = fs.readFileSync(path, 'utf8');
          const marker = '    "styles/apps/force-alchemy-workbench.css",\n';
          const additions = marker +
            '    "styles/apps/force-tradition-picker.css",\n' +
            '    "styles/apps/theme-picker-immersive.css",\n';

          if (source.includes('"styles/apps/force-tradition-picker.css"') &&
              source.includes('"styles/apps/theme-picker-immersive.css"')) {
            process.exit(0);
          }
          if (!source.includes(marker)) {
            throw new Error('Expected style insertion marker was not found');
          }
          const updated = source.replace(marker, additions);
          JSON.parse(updated);
          fs.writeFileSync(path, updated);
          NODE
      - name: Commit manifest update
        run: |
          if git diff --quiet -- system.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add system.json
          git commit -m "fix: register recent application styles"
          git push origin HEAD:fix/register-recent-styles
